name = "dropinn-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "dropinn.tw/api/*", zone_name = "dropinn.tw" }
]

[[d1_databases]]
binding = "DB"
database_name = "dropinn-db"
database_id = "37c9fb59-20fc-42a6-8a88-3ec5fdad13bb"

[vars]
ENVIRONMENT = "production"

# 敏感資訊請用 wrangler secret put 設定，不要寫在這裡
# wrangler secret put ADMIN_LOGIN_ID
# wrangler secret put ADMIN_PASSWORD_HASH
# wrangler secret put SALT
# wrangler secret put RECAPTCHA_SECRET_KEY
# wrangler secret put RESEND_API_KEY
# wrangler secret put HOUSEKEEPING_PASSWORD   （房務日曆登入密碼）
# wrangler secret put ADMIN_NOTIFY_EMAIL      （管理員收信 Email）

# ── Cron Triggers ──────────────────────────────────────────────────
# 每小時整點：自動取消超過 48 小時的洽談中訂單
# 每天 UTC 04:00 (台灣時間 12:00)：發送入住前一天提醒信
[triggers]
crons = ["0 * * * *", "0 4 * * *"]
