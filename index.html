<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雫旅 Drop Inn | 澎湖花火節包棟 | 溫暖奶油風質感包棟民宿</title>
    <meta
      name="description"
      content="漫步澎湖花火節，入住雫旅 Drop Inn。我們提供溫暖舒適的奶油風包棟空間，在柔和光影中，找回旅行最純粹的放鬆與寧靜。"
    />
    <meta
      name="keywords"
      content="澎湖民宿, 澎湖花火節, 質感民宿, 包棟民宿, 奶油風, 雫旅, Drop Inn"
    />
    <!-- 先載入公開設定（GitHub Pages 有；本機有 config.js 時會再載入並覆蓋） -->
    <script src="config.public.js"></script>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

      :root {
        --cream: #fdfbf7;
        --stone: #5b5247;
        --warm-gray: #e5e1da;
      }

      body {
        font-family: 'Noto Sans TC', sans-serif;
        background-color: var(--cream);
        color: var(--stone);
        letter-spacing: 0.08em;
        overflow-x: hidden;
      }

      .serif {
        font-family: 'Noto Serif TC', serif;
      }

      html {
        font-size: 14px;
        scroll-behavior: smooth;
      }
      @media (min-width: 768px) {
        html { font-size: 15px; }
      }

      /* 黑白轉彩色動畫 */
      .hero-image {
        filter: grayscale(100%) brightness(0.4);
        animation: colorize 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        animation-delay: 4s;
      }

      @keyframes colorize {
        0% {
          filter: grayscale(100%) brightness(0.4);
        }

        100% {
          filter: grayscale(0%) brightness(1);
        }
      }

      /* 星空煙火背景 */
      .starry-firework-bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at bottom, #2c3e50 0%, #1a1a2e 50%, #0d0d1a 100%);
        overflow: hidden;
      }

      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }

        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      .firework-glow {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0;
        animation: fireworkBurst 4s ease-out infinite;
      }

      @keyframes fireworkBurst {
        0% {
          transform: scale(0.3);
          opacity: 0;
        }

        30% {
          transform: scale(1);
          opacity: 0.7;
        }

        100% {
          transform: scale(1.8);
          opacity: 0;
        }
      }

      /* 文字動畫 */
      .text-combined {
        opacity: 0;
        animation: combinedText 6s ease-in-out forwards;
        animation-delay: 0s;
      }

      @keyframes combinedText {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }

        15% {
          opacity: 1;
          transform: translateY(0);
        }

        70% {
          opacity: 1;
          transform: translateY(0);
        }

        100% {
          opacity: 0;
          transform: translateY(-20px);
        }
      }

      /* 按鈕動畫 */
      .btn-hero-centered {
        opacity: 0;
        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%);
        animation: fadeInCentered 2s ease-out forwards;
        animation-delay: 7s;
        z-index: 20 !important;
        pointer-events: auto !important;
      }

      @keyframes fadeInCentered {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.8);
        }

        to {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      /* 滑動淡入 */
      .fade-up {
        opacity: 0;
        transform: translateY(40px);
        transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .fade-up.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* 圖片樣式 */
      .cover-image {
        object-fit: cover;
        object-position: center;
        width: 100%;
        height: 100%;
      }

      /* 隱藏捲軸 */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Logo 反白 */
      .logo-invert {
        filter: brightness(0) invert(1);
      }

      /* 表單樣式 */
      input[type='date'],
      input[type='text'],
      input[type='tel'],
      input[type='email'],
      textarea {
        background: transparent !important;
        border-bottom: 1px solid var(--warm-gray) !important;
        border-radius: 0 !important;
        padding: 0.75rem 0 !important;
        outline: none;
      }

      input:focus,
      textarea:focus {
        border-color: var(--stone) !important;
      }

      /* 返回按鈕 */
      .back-button {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .back-button.visible {
        opacity: 1;
        pointer-events: auto;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* 成功動畫 */
      .success-check {
        animation: checkPop 0.6s ease-out forwards;
      }

      @keyframes checkPop {
        0% {
          transform: scale(0);
          opacity: 0;
        }

        50% {
          transform: scale(1.2);
        }

        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ==========================================
         Section 統一框架：標題固定頂部，箭頭固定底部
         ========================================== */
      .page-section {
        height: 100vh;
        min-height: 600px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 80px 2rem 40px;
        box-sizing: border-box;
        position: relative;
      }

      .page-section-header {
        text-align: center;
        flex-shrink: 0;
        padding-top: 1rem;
        padding-bottom: 0.5rem;
      }

      .page-section-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        overflow-y: auto;
      }

      .page-section-footer {
        flex-shrink: 0;
        text-align: center;
        min-height: 4rem;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 0;
      }

      /* ==========================================
         響應式：手機版
         ========================================== */
      @media (max-width: 640px) {
        .page-section {
          padding: 72px 1.25rem 32px;
          min-height: 100svh;
        }

        .page-section-content {
          overflow-y: auto;
        }
      }

      /* 中型視窗：避開右側工具列 */
      @media (min-width: 641px) and (max-width: 1024px) {
        .page-section {
          padding: 80px 4rem 40px 2rem;
        }

        .page-section-content {
          max-width: calc(100vw - 10rem);
        }
      }

      /* 大視窗：正常顯示 */
      @media (min-width: 1025px) {
        .page-section-content {
          max-width: 90%;
        }
      }

      .page-section.rules-section {
        min-height: 100vh;
        height: auto;
        justify-content: flex-start;
      }
      .page-section.rules-section .page-section-content {
        flex: none;
        justify-content: flex-start;
        padding-top: 1rem;
        padding-bottom: 2rem;
        overflow-y: visible;
      }
      /* 入住默契區箭頭稍往下，不貼太上面 */
      .page-section.rules-section .page-section-footer {
        padding-top: 1.5rem;
      }

      /* 手機版表單調整 */
      @media (max-width: 640px) {
        .form-grid-2 {
          grid-template-columns: 1fr !important;
        }

        .room-options {
          flex-direction: column;
        }
      }

      /* 捲動鎖定（整頁模式）— 隱藏右側捲軸 */
      html {
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar { display: none; }

      .page-section,
      section#hero {
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        animation: fadeIn 0.3s forwards;
      }

      /* 日曆可訂性標記 */
      .date-available {
        color: #10b981;
      }

      .date-booked {
        color: #ef4444;
        text-decoration: line-through;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ==========================================
      // 🔧 設定區
      // ==========================================
      const EASTER_EGGS_CONFIG = {
        timeGreeting: true,
        oceanSound: true,
        fireworkEffect: true,
        heroBackground: 'planC', // 'photo' | 'planA' | 'planB' | 'planC'
      };

      // 🟢 你的後端 API（請改成你的實際網址）
      // 優先使用 PUBLIC API（前台專用），若未設定則退回舊的 API_URL
      const API_URL = FRONTEND_CONFIG.API_URL_PUBLIC || FRONTEND_CONFIG.API_URL;
      const RECAPTCHA_SITE_KEY = FRONTEND_CONFIG.RECAPTCHA_SITE_KEY;

      // 日曆資料 cache（避免重複 fetch）
      let _cachedBookedDates = null;
      let _cacheTime = 0;

      // ==========================================
      // 🆕 即時空房日曆組件
      // ==========================================
      function AvailabilityCalendar() {
        const [bookedDates, setBookedDates] = useState([]);
        const [currentMonth, setCurrentMonth] = useState(new Date());
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          fetchBookedDates();
        }, []);

        const fetchBookedDates = async () => {
          const now = Date.now();
          // 5 分鐘 cache
          if (_cachedBookedDates && now - _cacheTime < 5 * 60 * 1000) {
            setBookedDates(_cachedBookedDates);
            setLoading(false);
            return;
          }
          try {
            setLoading(true);
            const response = await fetch(`${API_URL}?action=getBookedDates`);
            const data = await response.json();
            if (data.success) {
              _cachedBookedDates = data.dates || [];
              _cacheTime = now;
              setBookedDates(_cachedBookedDates);
            }
          } catch (e) {
            console.error('載入日曆失敗:', e);
            if (_cachedBookedDates) setBookedDates(_cachedBookedDates);
          }
          setLoading(false);
        };

        const getDateStr = (date) => {
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, '0');
          const d = String(date.getDate()).padStart(2, '0');
          return `${y}-${m}-${d}`;
        };

        const isBooked = (date) => bookedDates.includes(getDateStr(date));
        const isPast = (date) => {
          const t = new Date();
          t.setHours(0, 0, 0, 0);
          const d = new Date(date);
          d.setHours(0, 0, 0, 0);
          return d < t;
        };
        const isToday = (date) => getDateStr(date) === getDateStr(new Date());

        const renderCalendar = () => {
          const year = currentMonth.getFullYear();
          const month = currentMonth.getMonth();
          const startDayOfWeek = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const totalCells = Math.ceil((startDayOfWeek + daysInMonth) / 7) * 7;
          const cells = [];

          for (let i = 0; i < totalCells; i++) {
            const dayNumber = i - startDayOfWeek + 1;
            if (dayNumber < 1 || dayNumber > daysInMonth) {
              cells.push(<div key={i}></div>);
              continue;
            }
            const date = new Date(year, month, dayNumber);
            const booked = isBooked(date);
            const past = isPast(date);
            const today = isToday(date);

            cells.push(
              <div
                key={i}
                style={{
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'center',
                  justifyContent: 'center',
                  aspectRatio: '1',
                  borderRadius: '8px',
                  transition: 'all 0.2s',
                  background: booked && !past ? '#fef2f2' : !past ? 'white' : 'transparent',
                  border: today
                    ? '2px solid #a8a29e'
                    : booked && !past
                      ? '1px solid #fecaca'
                      : !past
                        ? '1px solid #f5f5f4'
                        : 'none',
                  opacity: past ? 0.22 : 1,
                }}
              >
                <span
                  style={{
                    fontSize: 'clamp(11px, 2.2vw, 14px)',
                    fontWeight: today ? '600' : booked && !past ? '500' : '300',
                    color:
                      booked && !past
                        ? '#dc2626'
                        : today
                          ? '#292524'
                          : past
                            ? '#c4b5a5'
                            : '#57534e',
                    lineHeight: 1,
                  }}
                >
                  {dayNumber}
                </span>
                {booked && !past && (
                  <span style={{ fontSize: '8px', color: '#ef4444', marginTop: '3px' }}>已訂</span>
                )}
                {today && !booked && (
                  <span style={{ fontSize: '8px', color: '#a8a29e', marginTop: '3px' }}>今</span>
                )}
              </div>
            );
          }
          return cells;
        };

        const prevMonth = () => {
          const today = new Date();
          const prev = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1);
          if (prev >= new Date(today.getFullYear(), today.getMonth(), 1)) setCurrentMonth(prev);
        };
        const nextMonth = () => {
          const next = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1);
          if (next.getFullYear() <= new Date().getFullYear() + 1) setCurrentMonth(next);
        };

        return (
          <div style={{ width: '100%', maxWidth: '440px', margin: '0 auto' }}>
            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                marginBottom: '12px',
              }}
            >
              <button
                onClick={prevMonth}
                style={{
                  padding: '6px 10px',
                  background: 'none',
                  border: 'none',
                  cursor: 'pointer',
                  color: '#c4b5a5',
                }}
              >
                <i className="fas fa-chevron-left" style={{ fontSize: '12px' }}></i>
              </button>
              <span
                className="serif"
                style={{
                  fontSize: 'clamp(15px, 3.5vw, 20px)',
                  color: '#57534e',
                  letterSpacing: '0.2em',
                }}
              >
                {currentMonth.getFullYear()} 年 {currentMonth.getMonth() + 1} 月
              </span>
              <button
                onClick={nextMonth}
                style={{
                  padding: '6px 10px',
                  background: 'none',
                  border: 'none',
                  cursor: 'pointer',
                  color: '#c4b5a5',
                }}
              >
                <i className="fas fa-chevron-right" style={{ fontSize: '12px' }}></i>
              </button>
            </div>

            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(7, 1fr)',
                gap: '3px',
                marginBottom: '3px',
              }}
            >
              {['日', '一', '二', '三', '四', '五', '六'].map((d, i) => (
                <div
                  key={i}
                  style={{
                    textAlign: 'center',
                    fontSize: '10px',
                    color: '#d4c4b5',
                    padding: '4px 0',
                    letterSpacing: '0.05em',
                  }}
                >
                  {d}
                </div>
              ))}
            </div>

            {loading ? (
              <div style={{ textAlign: 'center', padding: '30px 0', color: '#c4b5a5' }}>
                <i className="fas fa-spinner fa-spin" style={{ fontSize: '16px' }}></i>
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '3px' }}>
                {renderCalendar()}
              </div>
            )}

            <div
              style={{ display: 'flex', justifyContent: 'center', gap: '20px', marginTop: '16px' }}
            >
              <div
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '6px',
                  fontSize: '11px',
                  color: '#a8a29e',
                }}
              >
                <div
                  style={{
                    width: '12px',
                    height: '12px',
                    background: '#fef2f2',
                    border: '1px solid #fecaca',
                    borderRadius: '3px',
                  }}
                ></div>
                <span>已訂</span>
              </div>
              <div
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '6px',
                  fontSize: '11px',
                  color: '#a8a29e',
                }}
              >
                <div
                  style={{
                    width: '12px',
                    height: '12px',
                    background: 'white',
                    border: '1px solid #f5f5f4',
                    borderRadius: '3px',
                  }}
                ></div>
                <span>可訂</span>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        // ==========================================
        // 聯絡資訊
        // ==========================================
        const contacts = {
          instagram: 'https://www.instagram.com/dropinn.penghu/',
          facebook: 'https://www.facebook.com/search/top?q=%E9%9B%AB%E6%97%85',
          line: 'https://line.me/ti/p/@dropinn',
          googleMaps: 'https://maps.app.goo.gl/nEHQ418kdWpoH57e6',
          album: 'https://drive.google.com/drive/folders/1-6QhYRawcUvmzMfkTFRMzyMRpf53Kuh3?usp=drive_link',
        };

        // ==========================================
        // 訂房資料
        // ==========================================
        const [formData, setFormData] = useState({
          checkIn: '',
          checkOut: '',
          rooms: 3,
          extraBeds: 0,
          name: '',
          phone: '',
          email: '',
          notes: '',
        });

        const [isVisible, setIsVisible] = useState(false);
        const [showBackButton, setShowBackButton] = useState(false);
        const [greeting, setGreeting] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [bookingSuccess, setBookingSuccess] = useState(null);
        const [showPreview, setShowPreview] = useState(false);
        const [availability, setAvailability] = useState([]);

        const sectionRef = useRef(null);

        // ==========================================
        // 時段問候語
        // ==========================================
        useEffect(() => {
          if (!EASTER_EGGS_CONFIG.timeGreeting) return;
          const hour = new Date().getHours();
          let greetingText = '';
          if (hour >= 5 && hour < 12) {
            greetingText = '早安！這麼早就開始規劃行程，看來你真的很想出發喔 ✈️';
          } else if (hour >= 12 && hour < 18) {
            greetingText = '午安！工作累了嗎？偷偷看房子的你，需要來雫旅充個電 🔋';
          } else if (hour >= 18 && hour < 22) {
            greetingText = '晚安！犒賞一下忙碌的一天，給自己留個雫旅的位置吧 🌙';
          } else {
            greetingText = '嘿，半夜不睡覺在訂房的你，一定很期待旅行吧 ✨';
          }
          setGreeting(greetingText);
        }, []);

        // ==========================================
        // 滑動監聽
        // ==========================================
        useEffect(() => {
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) setIsVisible(true);
            },
            { threshold: 0.2 }
          );
          if (sectionRef.current) observer.observe(sectionRef.current);

          const handleScroll = () => {
            setShowBackButton(window.scrollY > window.innerHeight * 0.8);
          };
          window.addEventListener('scroll', handleScroll);
          return () => {
            observer.disconnect();
            window.removeEventListener('scroll', handleScroll);
          };
        }, []);

        // ==========================================
        // 計算晚數
        // ==========================================
        const getNights = () => {
          if (!formData.checkIn || !formData.checkOut) return 0;
          const diff = Math.ceil(
            (new Date(formData.checkOut) - new Date(formData.checkIn)) / 86400000
          );
          return diff > 0 ? diff : 0;
        };

        const nights = getNights();
        const isDateValid = nights >= 2;
        const isFullValid = isDateValid && formData.name && formData.phone;

        // ==========================================
        // 🔧 修正：包棟價格計算
        // ==========================================
        const getPackagePrice = (rooms) => {
          const prices = { 3: 10000, 4: 12000, 5: 15000 };
          return prices[rooms] || 10000;
        };

        const packagePrice = getPackagePrice(formData.rooms);
        const extraBedPrice = formData.extraBeds * 1000;
        const totalPrice = isFullValid ? (packagePrice + extraBedPrice) * nights : 0;

        // ==========================================
        // 平滑滾動
        // ==========================================
        const scrollTo = (id) => {
          const element = document.getElementById(id);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        };

        const goBack = () => {
          const scrollY = window.scrollY;
          const sectionIds = ['hero', 'narrative', 'rules', 'calendar', 'booking', 'contact'];
          const sections = sectionIds.map((id) => ({
            id,
            pos: id === 'hero' ? 0 : document.getElementById(id)?.offsetTop || 0,
          }));

          for (let i = sections.length - 1; i >= 0; i--) {
            if (scrollY >= sections[i].pos - 100) {
              if (i === 0) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
              } else {
                scrollTo(sections[i - 1].id);
              }
              return;
            }
          }
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ==========================================

            setShowPreview(true);

            console.warn('handlePreview 錯誤，直接顯示預覽:', error);

            const token = await new Promise((resolve) => {
              if (typeof grecaptcha === 'undefined') {
                alert('reCAPTCHA 載入失敗，請檢查網路連線');
                resolve(null);
                return;
              }
              grecaptcha.ready(() => {
                grecaptcha
                  .execute(RECAPTCHA_SITE_KEY, { action: 'submit' })
                  .then((token) => resolve(token));
              });
            });
            console.log('✅ 成功取得 Token:', token);

            console.log('📡 正在發送資料到 GAS:', API_URL);

            if (!token) {
              throw new Error('無法取得驗證 Token');
            }

            // 2. 送出資料給後端
            const response = await fetch(API_URL, {
              method: 'POST',

                action: 'createBooking',
                token: token,
                data: {

                  nights: nights,
                  packagePrice: packagePrice,
                  extraBedPrice: extraBedPrice,
                  totalPrice: totalPrice,
                  timestamp: new Date().toISOString(),

                orderID: data.orderID,
                email: formData.email,

                checkOut: '',
                rooms: 3,
                extraBeds: 0,
                name: '',
                phone: '',
                email: '',
                notes: '',

            } else {

            }

            console.error('送出失敗:', error);

                      />
                      <input
                        type="email"
                        placeholder="Email（選填）"
                        value={formData.email}
                        onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                        className="w-full text-sm"
                      />
                      <textarea
                        placeholder="備註 Notes"
                        value={formData.notes}
                        onChange={(e) => setFormData({ ...formData, notes: e.target.value })}
                        className="w-full text-sm h-20 resize-none"
                      />
                    </div>

                    {/* 價格預覽 */}
                    {isFullValid && (
                      <div className="py-6 text-center space-y-3">
                        <p className="text-xs text-stone-400 tracking-[0.4em]">
                          預估金額（{nights} 晚）
                        </p>
                        <div className="text-xs text-stone-500 tracking-wider space-y-1">
                          <div>
                            {formData.rooms} 間包棟 × {nights} 晚 = $
                            {(packagePrice * nights).toLocaleString()}
                          </div>
                          {formData.extraBeds > 0 && (
                            <div>
                              加床 {formData.extraBeds} 床 × {nights} 晚 = $
                              {(extraBedPrice * nights).toLocaleString()}
                            </div>
                          )}
                        </div>
                        <div className="serif text-4xl text-stone-600 font-light pt-2">
                          <span className="text-lg opacity-30 mr-2">TWD</span>
                          {totalPrice.toLocaleString()}
                        </div>
                      </div>
                    )}

                    {/* 送出按鈕 */}
                    <button
                      type="submit"
                      disabled={!isFullValid || isLoading}
                      className={`w-full py-4 text-xs tracking-[0.6em] transition-all duration-500 ${
                        !isFullValid || isLoading
                          ? 'bg-stone-100 text-stone-300 cursor-not-allowed'
                          : 'bg-stone-700 text-white hover:bg-black shadow-lg hover:shadow-xl'
                      }`}
                    >
                      {isLoading
                        ? '送出中...'
                        : !isDateValid
                          ? '請先選擇日期（至少兩晚）'
                          : !formData.name || !formData.phone
                            ? '請填寫姓名與電話'
                            : '確認預約'}
                    </button>

                    <p className="text-xs text-stone-400 text-center tracking-wider leading-relaxed pt-2">
                      © 2025 Drop Inn. All rights reserved.
                    </p>
                  </form>
                </div>
              </div>
              <div className="page-section-footer">
                <div className="h-6"></div>
              </div>
            </section>

            {/* ==================== 預覽確認頁面 ==================== */}
            {showPreview && (
              <div
                style={{
                  position: 'fixed',
                  inset: 0,
                  background: 'rgba(91, 82, 71, 0.5)',
                  backdropFilter: 'blur(8px)',
                  zIndex: 200,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  padding: '20px',
                  animation: 'fadeIn 0.25s ease',
                }}
              >
                <div
                  style={{
                    background: '#fdfbf7',
                    borderRadius: '16px',
                    maxWidth: '420px',
                    width: '100%',
                    boxShadow: '0 30px 80px rgba(91,82,71,0.25)',
                    overflow: 'hidden',
                  }}
                >
                  {/* Header */}
                  <div style={{ padding: '28px 28px 0', textAlign: 'center' }}>
                    <div
                      style={{
                        width: '1px',
                        height: '32px',
                        background: '#e5e1da',
                        margin: '0 auto 16px',
                      }}
                    ></div>
                    <h3
                      className="serif"
                      style={{
                        fontSize: '18px',
                        color: '#5b5247',
                        letterSpacing: '0.2em',
                        fontWeight: 300,
                      }}
                    >
                      確認您的預約
                    </h3>
                    <p
                      style={{
                        fontSize: '10px',
                        color: '#c4b5a5',
                        letterSpacing: '0.2em',
                        marginTop: '6px',
                      }}
                    >
                      RESERVATION SUMMARY
                    </p>
                  </div>

                  {/* 明細 */}
                  <div
                    style={{
                      margin: '20px 28px',
                      borderTop: '1px solid #e5e1da',
                      borderBottom: '1px solid #e5e1da',
                      padding: '16px 0',
                    }}
                  >
                    {[
                      { label: '入住', value: formData.checkIn },
                      { label: '退房', value: formData.checkOut },
                      { label: '住宿', value: `${nights} 晚` },
                      {
                        label: '房型',
                        value: `${formData.rooms} 間包棟${formData.extraBeds > 0 ? ` + ${formData.extraBeds} 加床` : ''}`,
                      },
                      { label: '姓名', value: formData.name },
                      { label: '電話', value: formData.phone },
                    ].map((row, i) => (
                      <div
                        key={i}
                        style={{
                          display: 'flex',
                          justifyContent: 'space-between',
                          alignItems: 'center',
                          padding: '8px 0',
                        }}
                      >
                        <span
                          style={{ fontSize: '11px', color: '#c4b5a5', letterSpacing: '0.1em' }}
                        >
                          {row.label}
                        </span>
                        <span
                          style={{ fontSize: '13px', color: '#5b5247', letterSpacing: '0.05em' }}
                        >
                          {row.value}
                        </span>
                      </div>
                    ))}
                  </div>

                  {/* 金額 */}
                  <div style={{ textAlign: 'center', padding: '4px 28px 20px' }}>
                    <p
                      style={{
                        fontSize: '10px',
                        color: '#c4b5a5',
                        letterSpacing: '0.2em',
                        marginBottom: '8px',
                      }}
                    >
                      預估金額
                    </p>
                    <p
                      className="serif"
                      style={{ fontSize: '32px', color: '#5b5247', fontWeight: 300 }}
                    >
                      <span style={{ fontSize: '14px', opacity: 0.4, marginRight: '6px' }}>
                        TWD
                      </span>
                      {totalPrice.toLocaleString()}
                    </p>
                    <p style={{ fontSize: '10px', color: '#c4b5a5', marginTop: '6px' }}>
                      實際金額以確認後為準
                    </p>
                  </div>

                  {/* 按鈕 */}
                  <div style={{ display: 'flex', gap: '0', borderTop: '1px solid #e5e1da' }}>
                    <button
                      onClick={() => setShowPreview(false)}
                      style={{
                        flex: 1,
                        padding: '16px',
                        background: 'none',
                        border: 'none',
                        borderRight: '1px solid #e5e1da',
                        color: '#a8a29e',
                        fontSize: '12px',
                        letterSpacing: '0.1em',
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                      }}
                    >
                      ← 返回修改
                    </button>
                    <button
                      onClick={handleSubmit}
                      style={{
                        flex: 1,
                        padding: '16px',
                        background: '#5b5247',
                        border: 'none',
                        color: 'white',
                        fontSize: '12px',
                        letterSpacing: '0.15em',
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                        transition: 'background 0.2s',
                      }}
                      onMouseEnter={(e) => (e.target.style.background = '#3d342c')}
                      onMouseLeave={(e) => (e.target.style.background = '#5b5247')}
                    >
                      確認送出 →
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ==================== 預約成功 Modal ==================== */}
            {bookingSuccess && (
              <div
                style={{
                  position: 'fixed',
                  inset: 0,
                  background: 'rgba(91, 82, 71, 0.5)',
                  backdropFilter: 'blur(8px)',
                  zIndex: 200,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  padding: '20px',
                  animation: 'fadeIn 0.3s ease',
                }}
              >
                <div
                  style={{
                    background: '#fdfbf7',
                    borderRadius: '16px',
                    maxWidth: '420px',
                    width: '100%',
                    boxShadow: '0 30px 80px rgba(91,82,71,0.25)',
                    overflow: 'hidden',
                    animation: 'checkPop 0.4s ease',
                  }}
                >
                  {/* Header */}
                  <div style={{ padding: '28px 28px 0', textAlign: 'center' }}>
                    <div
                      style={{
                        width: '48px',
                        height: '48px',
                        background: '#f0fdf4',
                        borderRadius: '50%',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        margin: '0 auto 16px',
                      }}
                    >
                      <i
                        className="fas fa-check"
                        style={{ color: '#16a34a', fontSize: '18px' }}
                      ></i>
                    </div>
                    <h3
                      className="serif"
                      style={{
                        fontSize: '18px',
                        color: '#5b5247',
                        letterSpacing: '0.2em',
                        fontWeight: 300,
                      }}
                    >
                      預約成功
                    </h3>
                    <p
                      style={{
                        fontSize: '10px',
                        color: '#c4b5a5',
                        letterSpacing: '0.2em',
                        marginTop: '6px',
                      }}
                    >
                      BOOKING CONFIRMED
                    </p>
                  </div>

                  {/* 訂單明細 */}
                  <div
                    style={{
                      margin: '20px 28px',
                      borderTop: '1px solid #e5e1da',
                      borderBottom: '1px solid #e5e1da',
                      padding: '16px 0',
                    }}
                  >
                    <div
                      style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        padding: '6px 0',
                      }}
                    >
                      <span style={{ fontSize: '11px', color: '#c4b5a5', letterSpacing: '0.1em' }}>
                        訂單編號
                      </span>
                      <span
                        style={{
                          fontSize: '12px',
                          color: '#5b5247',
                          letterSpacing: '0.1em',
                          fontWeight: 500,
                        }}
                      >
                        {bookingSuccess.orderID}
                      </span>
                    </div>
                    <div
                      style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        padding: '6px 0',
                      }}
                    >
                      <span style={{ fontSize: '11px', color: '#c4b5a5', letterSpacing: '0.1em' }}>
                        狀態
                      </span>
                      <span style={{ fontSize: '11px', color: '#a8a29e', letterSpacing: '0.05em' }}>
                        等待人工確認
                      </span>
                    </div>
                    {bookingSuccess.email && (
                      <div
                        style={{
                          display: 'flex',
                          justifyContent: 'space-between',
                          alignItems: 'center',
                          padding: '6px 0',
                        }}
                      >
                        <span
                          style={{ fontSize: '11px', color: '#c4b5a5', letterSpacing: '0.1em' }}
                        >
                          確認信
                        </span>
                        <span style={{ fontSize: '11px', color: '#a8a29e' }}>
                          {bookingSuccess.email}
                        </span>
                      </div>
                    )}
                  </div>

                  {/* 說明文字 */}
                  <div style={{ padding: '0 28px 20px', textAlign: 'center' }}>
                    <p
                      style={{
                        fontSize: '11px',
                        color: '#c4b5a5',
                        lineHeight: '1.8',
                        letterSpacing: '0.05em',
                      }}
                    >
                      我們會盡快透過 LINE 與您聯繫確認
                    </p>
                  </div>

                  {/* 按鈕 */}
                  <div style={{ display: 'flex', borderTop: '1px solid #e5e1da' }}>
                    <a
                      href={contacts.line}
                      target="_blank"
                      style={{
                        flex: 1,
                        padding: '16px',
                        background: '#00B900',
                        border: 'none',
                        color: 'white',
                        fontSize: '12px',
                        letterSpacing: '0.1em',
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                        textDecoration: 'none',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        gap: '8px',
                      }}
                    >
                      <i className="fab fa-line"></i> 聯繫雫旅
                    </a>
                    <button
                      onClick={() => {
                        setBookingSuccess(null);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                      }}
                      style={{
                        flex: 1,
                        padding: '16px',
                        background: 'none',
                        border: 'none',
                        borderLeft: '1px solid #e5e1da',
                        color: '#a8a29e',
                        fontSize: '12px',
                        letterSpacing: '0.1em',
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                      }}
                    >
                      返回首頁
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>

    <!-- 動態載入 reCAPTCHA -->
    <script>
      const recaptchaScript = document.createElement('script');
      recaptchaScript.src = `https://www.google.com/recaptcha/api.js?render=${FRONTEND_CONFIG.RECAPTCHA_SITE_KEY}`;
      document.head.appendChild(recaptchaScript);
    </script>
  </body>
</html>
