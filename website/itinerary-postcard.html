<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>雫旅 — 行程表 · 明信片</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#ece8e1; --paper:#f8f5ef; --ink:#2c2620; --muted:#8a7a6a; --line:rgba(181,171,160,.5); --blue:#5b7a99; --gold:#b8915a; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ background:var(--bg); color:var(--ink); font-family:'Noto Serif TC',serif; font-weight:300; padding:0 0 70px; -webkit-font-smoothing:antialiased; }
  .ver{ position:sticky; top:0; z-index:9; display:flex; gap:14px; justify-content:center; align-items:center; padding:10px; background:rgba(236,232,225,.95); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); font-size:12px; letter-spacing:.1em; }
  .ver span{ color:var(--muted); }
  .ver a{ color:var(--muted); text-decoration:none; padding:3px 10px; border-radius:14px; }
  .ver a.on{ background:#33352f; color:#f3efe8; }
  .sheet{ max-width:560px; margin:0 auto; padding:0 18px; }
  .cover{ text-align:center; padding:50px 20px 26px; }
  .cover h1{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:30px; letter-spacing:.05em; }
  .cover .zh{ font-size:12px; letter-spacing:.4em; color:var(--muted); margin-top:12px; }
  /* 每天分隔 */
  .dayhead{ display:flex; align-items:center; gap:12px; margin:26px 4px 14px; }
  .dayhead .n{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:30px; color:var(--gold); }
  .dayhead .t{ font-size:14px; letter-spacing:.08em; }
  .dayhead .d{ font-size:11px; color:var(--muted); letter-spacing:.14em; margin-left:auto; text-transform:uppercase; }
  /* 明信片卡 */
  .card{ position:relative; background:#fff; border-radius:14px; overflow:hidden; margin-bottom:14px;
    box-shadow:0 8px 24px -12px rgba(44,38,32,.22); border:1px solid rgba(181,171,160,.3); }
  .card .top{ height:84px; position:relative; }
  .meal .top{ background:linear-gradient(135deg,#d6e0c2,#92a878 60%,#4e6850); }
  .sea  .top{ background:linear-gradient(135deg,#b0c8cc,#5e8c92 60%,#244e58); }
  .place .top{ background:linear-gradient(135deg,#c2d4e6,#6e8eb2 60%,#2e567e); }
  /* 郵戳：水滴 */
  .stamp{ position:absolute; top:10px; right:12px; width:30px; height:30px; border:1px dashed rgba(255,255,255,.6); border-radius:6px; display:flex; align-items:center; justify-content:center; }
  .stamp svg{ width:13px; height:17px; }
  .time-chip{ position:absolute; left:14px; bottom:-13px; background:#fff; border:1px solid var(--line); border-radius:20px; padding:4px 12px; font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:.1em; color:var(--ink); }
  .card .body{ padding:20px 18px 16px; }
  .card .n{ font-size:18px; letter-spacing:.02em; }
  .card .a{ font-size:11.5px; color:var(--muted); letter-spacing:.06em; margin-top:3px; }
  .card .note{ font-size:12px; color:#6a5a45; font-style:italic; margin-top:9px; padding-top:9px; border-top:1px dashed var(--line); }
  .foot{ text-align:center; padding:30px 20px; font-size:12px; color:var(--muted); font-style:italic; letter-spacing:.1em; }
</style>
</head>
<body>
  <div class="ver"><span>版本</span><a href="/website/itinerary-mockup">精緻</a><a href="/website/itinerary-magazine">雜誌</a><a class="on" href="/website/itinerary-postcard">明信片</a></div>
  <div class="sheet">
    <div class="cover"><h1>A Drop, A Draft, A Drift</h1><div class="zh">雫　旅　漂　流　手　記</div></div>

    <div class="dayhead"><span class="n">1</span><span class="t">馬公市區・靈魂小吃</span><span class="d">07/01 Wed</span></div>
    <div class="card meal"><div class="top"><div class="stamp"><svg viewBox="0 0 16 26"><path d="M 8 1 C 8 9 15 11 15 17 A 7 7 0 1 1 1 17 C 1 11 8 9 8 1 Z" fill="rgba(255,255,255,.85)"/></svg></div><div class="time-chip">08:00</div></div>
      <div class="body"><div class="n">鐘記燒餅</div><div class="a">馬公 · 甕烤燒餅、干貝蔥蛋</div><div class="note">記得早起，旺季排很長。</div></div></div>
    <div class="card meal"><div class="top"><div class="stamp"><svg viewBox="0 0 16 26"><path d="M 8 1 C 8 9 15 11 15 17 A 7 7 0 1 1 1 17 C 1 11 8 9 8 1 Z" fill="rgba(255,255,255,.85)"/></svg></div><div class="time-chip">12:30</div></div>
      <div class="body"><div class="n">潮境 TideLand</div><div class="a">馬公 · 無菜單料理</div><div class="note">已訂位 12:30，兩位。</div></div></div>
    <div class="card place"><div class="top"><div class="stamp"><svg viewBox="0 0 16 26"><path d="M 8 1 C 8 9 15 11 15 17 A 7 7 0 1 1 1 17 C 1 11 8 9 8 1 Z" fill="rgba(255,255,255,.85)"/></svg></div><div class="time-chip">17:30</div></div>
      <div class="body"><div class="n">觀音亭海堤</div><div class="a">馬公 · 夕陽、西瀛虹橋</div></div></div>

    <div class="dayhead"><span class="n">2</span><span class="t">北環・海與風景</span><span class="d">07/02 Thu</span></div>
    <div class="card place"><div class="top"><div class="stamp"><svg viewBox="0 0 16 26"><path d="M 8 1 C 8 9 15 11 15 17 A 7 7 0 1 1 1 17 C 1 11 8 9 8 1 Z" fill="rgba(255,255,255,.85)"/></svg></div><div class="time-chip">11:00</div></div>
      <div class="body"><div class="n">通梁古榕 · 跨海大橋</div><div class="a">白沙 · 百年老榕、地標</div></div></div>
    <div class="card place"><div class="top"><div class="stamp"><svg viewBox="0 0 16 26"><path d="M 8 1 C 8 9 15 11 15 17 A 7 7 0 1 1 1 17 C 1 11 8 9 8 1 Z" fill="rgba(255,255,255,.85)"/></svg></div><div class="time-chip">15:00</div></div>
      <div class="body"><div class="n">大菓葉柱狀玄武岩</div><div class="a">西嶼 · 海蝕玄武岩</div><div class="note">退潮才有倒影，查潮汐。</div></div></div>

    <div class="foot">願你在澎湖，慢慢地迷路。</div>
  </div>
</body>
</html>
