<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>雫旅 — 線條 icon 配色</title>
<style>
  :root{ --bg:#ece8e1; --card:#f8f5ef; --ink:#3a342e; --muted:#8a7a6a; --border:rgba(181,171,160,.4); }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:#6a5a45;
    font-family:'Noto Serif TC',-apple-system,sans-serif;padding:0 0 80px;}
  .bar{position:sticky;top:0;z-index:5;background:rgba(236,232,225,.95);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .bar h1{font-size:16px;letter-spacing:.1em;margin:0;font-weight:500;color:#3a342e;}
  .bar label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;cursor:pointer;}
  .wrap{max-width:820px;margin:0 auto;padding:24px;}
  .hint{color:var(--muted);font-size:13px;line-height:1.95;margin:0 0 22px;}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:middle;margin:0 4px 0 2px;}
  .grp-label{font-size:11px;letter-spacing:.2em;margin:22px 0 10px;font-weight:500;}
  .grp{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
  .ic{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 10px 14px;text-align:center;}
  .ic svg{width:30px;height:30px;display:block;margin:0 auto 12px;}
  .ic .nm{font-size:12px;color:var(--muted);letter-spacing:.04em;}
  .sec{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin:36px 0 14px;}
  .ctx{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 26px;}
  .ctx .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(181,171,160,.2);color:var(--ink);font-size:14px;}
  .ctx .row:last-child{border-bottom:0;}
  .ctx svg{width:20px;height:20px;flex-shrink:0;}
  .ctx .lab{color:var(--muted);font-size:12px;min-width:84px;}
</style>
</head>
<body>
  <div class="bar">
    <h1>雫旅 · 線條 icon 配色</h1>
    <label><input type="checkbox" id="thin" checked /> 細線（1.3）</label>
  </div>
  <div class="wrap">
    <p class="hint">
      套用你定的配色系統（跳色僅 3 個）：
      <span class="swatch" style="background:#5b7a99"></span>藍＝海（水滴/海浪）、
      <span class="swatch" style="background:#a55a4f"></span>茜＝特別提醒、
      <span class="swatch" style="background:#b8915a"></span>金＝鑰匙／優惠；
      其餘 <span class="swatch" style="background:#8a7a6a"></span>霧棕通用，
      <span class="swatch" style="background:#6a5a45"></span>奶茶棕當文字色。<br>
      看順眼跟我說「就這樣」，我把 icon 實裝到網頁（drift／後台）；email 用到的再轉成圖片。金色／粗細想微調也可講。
    </p>

    <div id="grid"></div>

    <div class="sec">放進信件一行的樣子（情境示意）</div>
    <div class="ctx" id="ctx"></div>
  </div>

  <script src="/website/icon-preview.js"></script>
</body>
</html>
