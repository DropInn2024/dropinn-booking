<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>雫旅 — 線條 icon 預覽</title>
<style>
  :root{ --bg:#ece8e1; --card:#f8f5ef; --ink:#3a342e; --muted:#8a7a6a; --border:rgba(181,171,160,.4); --accent:#6a5a45; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Noto Serif TC',-apple-system,sans-serif;padding:0 0 80px;}
  .bar{position:sticky;top:0;z-index:5;background:rgba(236,232,225,.95);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .bar h1{font-size:16px;letter-spacing:.1em;margin:0;font-weight:500;}
  .bar label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;cursor:pointer;}
  .wrap{max-width:820px;margin:0 auto;padding:24px;}
  .hint{color:var(--muted);font-size:13px;line-height:1.9;margin:0 0 22px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
  .ic{background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:20px 10px 14px;text-align:center;color:var(--accent);}
  .ic svg{width:30px;height:30px;display:block;margin:0 auto 12px;}
  .ic .nm{font-size:12px;color:var(--muted);letter-spacing:.04em;}
  .sec{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin:34px 0 14px;}
  .ctx{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 26px;}
  .ctx .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(181,171,160,.2);color:var(--ink);font-size:14px;}
  .ctx .row:last-child{border-bottom:0;}
  .ctx svg{width:20px;height:20px;flex-shrink:0;color:var(--accent);}
  .ctx .lab{color:var(--muted);font-size:12px;min-width:84px;}
</style>
</head>
<body>
  <div class="bar">
    <h1>雫旅 · 線條 icon 預覽</h1>
    <label><input type="checkbox" id="thin" checked /> 細線（1.3）</label>
    <label>顏色
      <select id="col">
        <option value="#6a5a45">奶茶棕（accent）</option>
        <option value="#8a7a6a">霧棕（muted）</option>
        <option value="#5b7a99">海藍</option>
        <option value="#a55a4f">茜紅</option>
        <option value="#1a1210">墨黑</option>
      </select>
    </label>
  </div>
  <div class="wrap">
    <p class="hint">這是一套手繪感的細線 icon（雫旅調性：細描邊、圓角、單色）。<strong>SVG 在網頁（drift／後台）能直接用</strong>；若要放進 email，我會轉成圖片（Gmail 會擋內嵌 SVG）。看完跟我說要哪些、用在哪，或顏色粗細怎麼調。</p>

    <div class="sec">Icon set</div>
    <div class="grid" id="grid"></div>

    <div class="sec">放進信件一行的樣子（情境示意）</div>
    <div class="ctx" id="ctx"></div>
  </div>

  <script src="/website/icon-preview.js"></script>
</body>
</html>
