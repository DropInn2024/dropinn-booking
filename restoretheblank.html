<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雫旅｜restore the blank</title>
    <!-- 房務頁不需要 config.public.js（已改用 /api/housekeeping/* 驗證） -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg:      #ece8e1;
        --card:    #f8f5ef;
        --ink:     #1a1210;
        --muted:   #8a7a6a;
        --accent:  #b8795a;
        --border:  rgba(181, 171, 160, 0.25);
        --past:    #c4b8a8;
        --pending: #e0d8cc;
        --cross:   #b8b0a6;
        --select:  rgba(210, 195, 165, 0.5);
        --blocked: rgba(181, 171, 160, 0.35);
        --has-room: rgba(184, 121, 90, 0.12);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        letter-spacing: 0.1em;
        min-height: 100vh;
      }

      .serif {
        font-family: 'Noto Serif TC', serif;
      }

      .loader {
        border: 2px solid #e5e1da;
        border-top: 2px solid #5b5247;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── 今日卡片 ── */
      .date-card {
        background: var(--card);
        border: 1px solid #e5e1da;
        border-radius: 14px;
        padding: 18px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
      }
      .info-row + .info-row {
        border-top: 1px solid rgba(91, 82, 71, 0.1);
      }

      /* ── 月曆 ── */
      .calendar-card {
        background: var(--card);
        border: 1px solid #e5e1da;
        border-radius: 14px;
        overflow: hidden;
        padding: 12px 10px 18px;
      }

      .cal-header {
        padding: 12px 12px 8px;
      }

      .cal-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .nav-empty {
        display: none;
      }
      .month-label {
        text-align: center;
        padding: 6px 0;
      }
      .month-main {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: var(--ink);
        display: block;
      }
      .month-year {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        letter-spacing: 0.3em;
        color: var(--muted);
        display: block;
        margin-top: 4px;
      }
      .nav-arrow,
      .cal-nav-arrow,
      .cal-header .nav-arrow {
        all: unset;
        box-sizing: border-box;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        padding: 4px 10px;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.2s;
      }
      .nav-arrow:hover,
      .nav-arrow:active,
      .nav-arrow:focus,
      .cal-nav-arrow:hover,
      .cal-nav-arrow:active,
      .cal-nav-arrow:focus {
        color: var(--ink);
        outline: none;
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
        background: transparent;
      }

      .cal-weekday {
        text-align: center;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.1em;
        padding: 10px 4px 8px;
        border: none;
      }

      .cal-day {
        position: relative;
        text-align: center;
        padding: 10px 4px;
        font-size: 18px;
        cursor: default;
        min-height: 56px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 4px;
        border-radius: 8px;
      }

      .cal-day.empty {
        background: transparent;
      }
      .cal-day.today .day-num {
        background: #5b5247;
        color: white;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cal-day.other-month {
        opacity: 0.3;
      }

      .day-num {
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
      }

      /* 住中背景 */
      .cal-day.occupied {
        background: transparent;
      }
      .cal-day.occupied.today .day-num {
        background: #5b5247;
        color: white;
      }

      /* 退房清潔日 — 整格淺色 */
      .cal-day.clean {
        background: #e8e0d6;
      }
      /* 同進同出 — 莫蘭迪暖紅（dusty rose-red） */
      .cal-day.double {
        background: #c49090;
      }
      .cal-day.double .day-num {
        color: #4a1818;
      }
      .cal-day.double.today .day-num {
        background: #4a1818;
        color: white;
      }

      /* 當天需要整理的房間數 */
      .room-count {
        margin-top: 4px;
        font-size: 10px;
        color: #8a6a50;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      .cal-day.double .room-count {
        color: rgba(74, 24, 24, 0.75);
      }

      .note-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent, #b8795a);
        margin: 3px auto 0;
        flex-shrink: 0;
      }
      .cal-day.double .note-dot {
        background: rgba(74, 24, 24, 0.6);
      }

      /* 圖例 */
      .legend {
        display: flex;
        gap: 20px;
        padding: 14px 20px;
        margin-top: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #7b7065;
        letter-spacing: 0.05em;
      }
      .legend-swatch {
        width: 28px;
        height: 20px;
        border-radius: 5px;
        border: 1px solid rgba(91, 82, 71, 0.18);
        flex-shrink: 0;
      }
      .legend-swatch.clean { background: #e8e0d6; }
      .legend-swatch.double { background: #c49090; }
      .legend-desc {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .legend-desc strong {
        font-size: 11px;
        font-weight: 500;
        color: #5b5247;
      }
      .legend-desc span {
        display: none;
      }

      /* ── 今日+明日 統合卡片 ── */
      .task-unified {
        background: var(--card);
        border: 1px solid #e5e1da;
        border-radius: 14px;
        padding: 20px 22px;
      }
      .task-section-label {
        font-size: 11px;
        color: #c4b5a5;
        letter-spacing: 0.15em;
        margin-bottom: 12px;
      }
      .task-divider {
        height: 1px;
        background: #ede9e2;
        margin: 16px 0;
      }
      .task-tmr-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        flex-wrap: wrap;
      }
      .task-tmr-val {
        font-size: 13px;
        color: #a8a29e;
        letter-spacing: 0.06em;
        text-align: right;
      }
      /* 同進同出 強調 — 莫蘭迪暖紅 */
      .task-unified.is-double {
        border-color: #c49090;
        background: #faf3f3;
      }

      /* 日期點擊浮層卡片 */
      .day-info-card {
        display: none;
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 36px);
        max-width: 520px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.13);
        z-index: 500;
        padding: 22px 24px 24px;
        letter-spacing: 0.06em;
      }
      .day-info-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .day-info-date {
        font-family: 'Cormorant Garamond', serif;
        font-size: 18px;
        font-weight: 300;
        color: #5b5247;
        letter-spacing: 0.15em;
      }
      .day-info-type {
        font-size: 14px;
        color: #5b5247;
        letter-spacing: 0.12em;
        margin-left: 16px;
      }
      .day-info-close {
        all: unset;
        font-size: 20px;
        color: #c4b5a5;
        cursor: pointer;
        line-height: 1;
        padding: 4px 8px;
        -webkit-tap-highlight-color: transparent;
      }
      .day-info-body {
        font-size: 15px;
        color: #5b5247;
        line-height: 2;
        letter-spacing: 0.08em;
      }
      .day-info-hint {
        font-size: 12px;
        color: #c4b5a5;
        letter-spacing: 0.1em;
        margin-top: 6px;
      }
      .day-info-note-label {
        font-size: 10px;
        color: #c4b5a5;
        letter-spacing: 0.2em;
        margin-top: 14px;
        margin-bottom: 4px;
      }
      .day-info-note-item {
        font-size: 14px;
        color: #7a7065;
        letter-spacing: 0.06em;
        line-height: 2;
      }

      @media (max-width: 380px) {
        .cal-day {
          min-height: 38px;
          padding: 6px 1px;
        }
        .day-num {
          width: 22px;
          height: 22px;
          font-size: 11px;
        }
      }

      @media (min-width: 900px) {
        .calendar-card {
          padding: 14px 16px 20px;
        }
        .cal-grid {
          gap: 7px;
        }
        .cal-day {
          min-height: 64px;
          padding: 12px 5px;
        }
        .day-num {
          width: 30px;
          height: 30px;
          font-size: 14px;
        }
      }

      /* ── 登入覆蓋層 ── */
      .login-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-overlay.active { display: flex; }
      .login-card {
        background: var(--card);
        border: 1px solid #e5e1da;
        border-radius: 18px;
        padding: 36px 32px 30px;
        width: 100%;
        max-width: 340px;
        text-align: center;
      }
      .login-title {
        font-size: 20px;
        font-weight: 300;
        color: #5b5247;
        letter-spacing: 0.3em;
        margin-bottom: 4px;
      }
      .login-sub {
        font-size: 10px;
        color: #c4b5a5;
        letter-spacing: 0.25em;
        margin-bottom: 28px;
      }
      .login-input {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid #ddd8d1;
        border-radius: 10px;
        font-size: 15px;
        color: #5b5247;
        letter-spacing: 0.12em;
        outline: none;
        text-align: center;
        font-family: 'Noto Serif TC', serif;
        margin-bottom: 14px;
        transition: border-color 0.2s;
      }
      .login-input:focus { border-color: #b8795a; }
      .login-btn {
        width: 100%;
        padding: 12px;
        background: #5b5247;
        color: #f8f5ef;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        letter-spacing: 0.2em;
        cursor: pointer;
        font-family: 'Noto Serif TC', serif;
        transition: opacity 0.2s;
      }
      .login-btn:disabled { opacity: 0.5; cursor: default; }
      .login-error {
        font-size: 12px;
        color: #b91c1c;
        letter-spacing: 0.08em;
        margin-top: 12px;
        display: none;
      }

      /* 登出按鈕（header 右側） */
      .logout-btn {
        all: unset;
        box-sizing: border-box;
        font-size: 11px;
        color: #c4b5a5;
        cursor: pointer;
        letter-spacing: 0.12em;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.2s;
      }
      .logout-btn:hover { color: #8a7a6a; }
    </style>
  </head>

  <body>

    <!-- ── 登入覆蓋層 ── -->
    <div id="loginOverlay" class="login-overlay">
      <div class="login-card">
        <p class="login-title">雫旅房務</p>
        <p class="login-sub">HOUSEKEEPING</p>
        <input
          id="hkPassword"
          type="password"
          class="login-input"
          placeholder="請輸入密碼"
          onkeydown="onPasswordKeydown(event)"
          autocomplete="current-password"
        />
        <button id="loginBtn" class="login-btn" onclick="doLogin()">進入</button>
        <p id="loginError" class="login-error"></p>
      </div>
    </div>

    <div style="max-width: 560px; margin: 0 auto; padding: 28px 18px">
      <!-- Header -->
      <div style="text-align: center; margin-bottom: 24px; padding-top: 12px; position: relative;">
        <h1
          class="serif"
          style="font-size: 22px; color: #5b5247; letter-spacing: 0.3em; font-weight: 300"
        >
          雫旅房務日程
        </h1>
        <p style="font-size: 11px; color: #c4b5a5; letter-spacing: 0.2em; margin-top: 6px">
          HOUSEKEEPING
        </p>
        <button class="logout-btn" onclick="doLogout()" style="position:absolute; top:0; right:0; margin-top:4px;">
          登出
        </button>
      </div>

      <!-- 載入中 -->
      <div
        id="loading"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 80px 0;
          gap: 16px;
        "
      >
        <div class="loader"></div>
        <p style="font-size: 12px; color: #c4b5a5; letter-spacing: 0.1em">載入中...</p>
      </div>

      <!-- 主內容 -->
      <div id="content" style="display: none; flex-direction: column; gap: 14px">
        <!-- 今日日期 -->
        <div class="date-card">
          <div>
            <p style="font-size: 10px; color: #c4b5a5; letter-spacing: 0.15em; margin-bottom: 4px">
              TODAY
            </p>
            <h2
              class="serif"
              style="font-size: 16px; color: #5b5247; letter-spacing: 0.1em; font-weight: 300"
              id="todayDate"
            ></h2>
          </div>
          <button
            onclick="loadSchedule()"
            style="
              background: none;
              border: 1px solid #e5e1da;
              border-radius: 50%;
              width: 36px;
              height: 36px;
              cursor: pointer;
              color: #a8a29e;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            <i class="fas fa-sync-alt" style="font-size: 12px"></i>
          </button>
        </div>

        <!-- 任務區塊（動態渲染） -->
        <div id="taskSection"></div>

        <!-- 月曆 -->
        <div class="calendar-card">
          <div class="cal-header">
            <div class="cal-nav">
              <div class="nav-empty"></div>
              <button type="button" class="nav-arrow cal-nav-arrow" onclick="changeMonth(-1)" aria-label="上個月">←</button>
              <div class="month-label">
                <span class="month-main" id="calMonthMain">—</span>
                <span class="month-year" id="calYear">—</span>
              </div>
              <button type="button" class="nav-arrow cal-nav-arrow" onclick="changeMonth(1)" aria-label="下個月">→</button>
              <div class="nav-empty"></div>
            </div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
          <div class="legend">
            <div class="legend-item">
              <div class="legend-swatch clean"></div>
              <div class="legend-desc"><strong>單一退房</strong></div>
            </div>
            <div class="legend-item">
              <div class="legend-swatch double"></div>
              <div class="legend-desc"><strong>同進同出</strong></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 日期點擊浮層 -->
    <div id="dayInfoCard" class="day-info-card">
      <div class="day-info-header">
        <div style="display:flex; align-items:baseline; gap:0;">
          <span class="day-info-date" id="dayInfoDate">—</span>
          <span class="day-info-type" id="dayInfoType"></span>
        </div>
        <button class="day-info-close" onclick="document.getElementById('dayInfoCard').style.display='none'">×</button>
      </div>
      <div id="dayInfoBody"></div>
    </div>

    <script>
      // ==========================================
      // 房務日曆 — Cloudflare Worker API 版本
      // POST /api/housekeeping/login  →  JWT token
      // GET  /api/housekeeping/orders  →  訂單列表
      // ==========================================

      const TOKEN_KEY = 'hk_token';

      function getToken()   { return sessionStorage.getItem(TOKEN_KEY); }
      function setToken(t)  { sessionStorage.setItem(TOKEN_KEY, t); }
      function clearToken() { sessionStorage.removeItem(TOKEN_KEY); }

      // ── 登入覆蓋層 ──────────────────────────────────────────
      function showLogin(errorMsg) {
        document.getElementById('loginOverlay').classList.add('active');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'none';
        const errEl = document.getElementById('loginError');
        if (errorMsg) {
          errEl.textContent = errorMsg;
          errEl.style.display = 'block';
        } else {
          errEl.style.display = 'none';
        }
        setTimeout(() => document.getElementById('hkPassword').focus(), 100);
      }

      function hideLogin() {
        document.getElementById('loginOverlay').classList.remove('active');
      }

      async function doLogin() {
        const pwd  = document.getElementById('hkPassword').value;
        const btn  = document.getElementById('loginBtn');
        const errEl = document.getElementById('loginError');
        if (!pwd) return;
        btn.disabled = true;
        btn.textContent = '登入中…';
        errEl.style.display = 'none';
        try {
          const res  = await fetch('/api/housekeeping/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd }),
          });
          const data = await res.json().catch(() => ({ success: false, error: '回應格式錯誤' }));
          if (data.success && data.token) {
            setToken(data.token);
            document.getElementById('hkPassword').value = '';
            hideLogin();
            loadSchedule();
          } else {
            errEl.textContent = data.error || '密碼錯誤';
            errEl.style.display = 'block';
          }
        } catch (e) {
          errEl.textContent = '連線失敗，請稍後再試';
          errEl.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = '進入';
      }

      function onPasswordKeydown(e) {
        if (e.key === 'Enter') doLogin();
      }

      function doLogout() {
        clearToken();
        showLogin();
      }

      // ── 錯誤顯示 ────────────────────────────────────────────
      function showConfigError(message) {
        const loading = document.getElementById('loading');
        const content = document.getElementById('content');
        if (loading) {
          loading.innerHTML =
            '<p style="font-size:14px;color:#b91c1c;text-align:center;padding:20px;line-height:1.8;">' +
            (message || '無法連線') + '</p>';
          loading.style.display = 'flex';
        }
        if (content) content.style.display = 'none';
      }

      // ==========================================
      // 主邏輯
      // ==========================================

      let allOrders = [];
      let calYear, calMonth;

      window.onload = function () {
        if (getToken()) {
          loadSchedule();
        } else {
          showLogin();
        }
      };

      async function loadSchedule() {
        try {
          document.getElementById('loading').style.display = 'flex';
          document.getElementById('content').style.display = 'none';

          const token = getToken();
          if (!token) { showLogin(); return; }

          const res = await fetch('/api/housekeeping/orders', {
            headers: { Authorization: 'Bearer ' + token },
          });

          if (res.status === 401) {
            clearToken();
            showLogin('登入已過期，請重新登入');
            return;
          }

          const data = await res.json().catch(() => ({ success: false, error: '回應格式錯誤' }));
          if (!data.success) {
            showConfigError(data.error || '載入失敗');
            return;
          }

          // 過濾有效訂單（洽談中 or 已付訂）
          allOrders = (data.orders || []).filter(
            (o) => o && (o.status === '洽談中' || o.status === '已付訂')
          );

          const today = new Date();
          calYear  = today.getFullYear();
          calMonth = today.getMonth();

          // 今日日期
          const days = ['日', '一', '二', '三', '四', '五', '六'];
          document.getElementById('todayDate').textContent =
            `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日（星期${days[today.getDay()]}）`;

          renderTodayTasks(today);
          renderCalendar();

          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'flex';
        } catch (err) {
          console.error(err);
          showConfigError((err && err.message) ? err.message : '載入失敗');
        }
      }

      function formatDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }

      function renderTodayTasks(today) {
        const todayStr = formatDate(today);
        const checkouts = allOrders.filter((o) => o.checkOut === todayStr);
        const checkins  = allOrders.filter((o) => o.checkIn  === todayStr);
        const section   = document.getElementById('taskSection');
        const isDouble  = checkins.length > 0 && checkouts.length > 0;
        const totalRooms = checkouts.reduce((s, o) => s + (o.rooms || 0), 0);

        // Tomorrow data
        const tmr = new Date(today);
        tmr.setDate(tmr.getDate() + 1);
        const tmrStr      = formatDate(tmr);
        const tmrCheckouts = allOrders.filter((o) => o.checkOut === tmrStr);
        const tmrCheckins  = allOrders.filter((o) => o.checkIn  === tmrStr);
        const tmrRooms     = tmrCheckouts.reduce((s, o) => s + (o.rooms || 0), 0);
        const tmrInRooms   = tmrCheckins.reduce((s, o) => s + (o.rooms || 0), 0);
        const tmrIsDouble  = tmrCheckouts.length > 0 && tmrCheckins.length > 0;

        const notesHtml = '';

        // ── Today HTML ──
        const statusStyle = 'font-size:15px; color:#5b5247; letter-spacing:0.12em;';
        const hintStyle   = 'font-size:12px; color:#c4b5a5; letter-spacing:0.08em; margin-top:12px; line-height:2;';

        let todayHtml = '';
        if (checkouts.length === 0) {
          todayHtml = `
            <div style="padding:8px 0 4px; line-height:2;">
              <p style="${statusStyle} margin-bottom:4px;">今日無清潔任務</p>
              <p style="${hintStyle}">好好休息吧 ☕</p>
            </div>`;
        } else if (isDouble) {
          todayHtml = `
            <div>
              <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:12px;">
                <span style="${statusStyle} color:#b85a5a;">同進同出</span>
                <span style="font-size:11px; color:#c07878; letter-spacing:0.08em;">下一組客人約 15:50 辦理入住，要留意打掃時間喔～</span>
              </div>
              ${renderTaskRows(totalRooms)}
              ${notesHtml}
              <div style="margin-top:10px; padding-top:10px; border-top:1px solid rgba(91,82,71,0.07); display:flex; justify-content:space-between;">
                <span style="font-size:11px; color:#c4b5a5; letter-spacing:0.08em;">新客入住時間</span>
                <span style="font-size:11px; color:#a8a29e;">16:00 後</span>
              </div>
            </div>`;
        } else {
          todayHtml = `
            <div>
              <p style="${statusStyle} margin-bottom:12px;">單一退房</p>
              ${renderTaskRows(totalRooms)}
              ${notesHtml}
              <p style="${hintStyle}">時間充裕 打掃請多留意細節喔～</p>
            </div>`;
        }

        // ── Tomorrow HTML ──
        const tmrNoteItems = [...tmrCheckouts, ...tmrCheckins]
          .map(o => String(o.housekeepingNote || '').trim())
          .filter(t => t);
        let tmrCount = '';
        let tmrHint  = '';
        let tmrNotesHtml = '';
        if (tmrCheckouts.length === 0 && tmrCheckins.length === 0) {
          tmrCount = `<span style="color:#ddd6cc;">無入住退房安排</span>`;
        } else {
          const parts = [];
          if (tmrCheckouts.length > 0) parts.push(`退房 ${tmrRooms} 間`);
          if (tmrCheckins.length > 0) parts.push(`入住 ${tmrInRooms} 間`);
          tmrCount = parts.join('　');
          tmrHint = tmrIsDouble
            ? '下一組客人約 15:50 辦理入住，要留意打掃時間喔～'
            : tmrCheckouts.length > 0 ? '時間充裕 打掃請多留意細節喔～' : '';
          if (tmrNoteItems.length) {
            tmrNotesHtml = tmrNoteItems.map(n =>
              `<p style="font-size:11px; color:#9a9088; letter-spacing:0.05em; margin-top:3px;">${n}</p>`
            ).join('');
          }
        }

        section.innerHTML = `
          <div class="task-unified${isDouble ? ' is-double' : ''}">
            <div class="task-section-label">今日工事</div>
            ${todayHtml}
            <div class="task-divider"></div>
            <div class="task-section-label">明日預告</div>
            <div style="line-height:2;">
              <p style="font-size:15px; color:#5b5247; letter-spacing:0.08em;">${tmrCount}</p>
              ${tmrHint ? `<p style="font-size:12px; color:#c4b5a5; margin-top:4px; letter-spacing:0.08em;">${tmrHint}</p>` : ''}
            </div>
          </div>`;
      }

      function renderTaskRows(rooms) {
        return `
          <div class="info-row">
            <span style="font-size:13px; color:#7a7065;">需清潔房間</span>
            <span style="font-size:28px; font-weight:300; color:#5b5247; letter-spacing:0.05em;">${rooms} <span style="font-size:13px; color:#a8a29e;">間</span></span>
          </div>`;
      }

      // ── 月曆 ──
      function changeMonth(delta) {
        calMonth += delta;
        if (calMonth > 11) {
          calMonth = 0;
          calYear++;
        }
        if (calMonth < 0) {
          calMonth = 11;
          calYear--;
        }
        renderCalendar();
      }

      function renderCalendar() {
        var monthNames = [
          'January',
          'February',
          'March',
          'April',
          'May',
          'June',
          'July',
          'August',
          'September',
          'October',
          'November',
          'December',
        ];
        var mEl = document.getElementById('calMonthMain');
        var yEl = document.getElementById('calYear');
        if (mEl) mEl.textContent = monthNames[calMonth];
        if (yEl) yEl.textContent = String(calYear);

        const today = new Date();
        const todayStr = formatDate(today);

        const dateMap = {};

        allOrders.forEach((order) => {
          const start = new Date(order.checkIn);
          const end = new Date(order.checkOut);

          const cur = new Date(start);
          while (cur < end) {
            const ds = formatDate(cur);
            if (!dateMap[ds])
              dateMap[ds] = { checkin: false, checkout: false, occupied: false, checkoutRooms: 0 };
            if (ds === order.checkIn) dateMap[ds].checkin = true;
            if (ds === order.checkOut) dateMap[ds].checkout = true;
            if (ds !== order.checkIn && ds !== order.checkOut) dateMap[ds].occupied = true;
            cur.setDate(cur.getDate() + 1);
          }
          const checkoutStr = order.checkOut;
          if (!dateMap[checkoutStr])
            dateMap[checkoutStr] = {
              checkin: false,
              checkout: false,
              occupied: false,
              checkoutRooms: 0,
            };
          dateMap[checkoutStr].checkout = true;
          const rooms = Number(order.rooms) || 0;
          dateMap[checkoutStr].checkoutRooms = (dateMap[checkoutStr].checkoutRooms || 0) + rooms;
          const hkNote = String(order.housekeepingNote || '').trim();
          if (hkNote) {
            if (!dateMap[checkoutStr].notes) dateMap[checkoutStr].notes = [];
            dateMap[checkoutStr].notes.push(hkNote);
          }
        });

        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        let html = weekdays.map((d) => `<div class="cal-weekday">${d}</div>`).join('');

        for (let i = 0; i < firstDay; i++) {
          html += `<div class="cal-day empty"></div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const ds = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const info = dateMap[ds] || {};
          const isToday = ds === todayStr;

          let classes = 'cal-day';
          if (isToday) classes += ' today';
          if (info.checkin && info.checkout) {
            classes += ' double';
          } else if (info.checkout) {
            classes += ' clean';
          } else if (info.occupied) {
            classes += ' occupied';
          }

          const roomsToClean = info.checkoutRooms || 0;

          const hasNotes = info.notes && info.notes.length > 0;
          const isClickable = roomsToClean > 0 || hasNotes;
          const clickable = isClickable ? ' style="cursor:pointer;" onclick="showDayCleaningInfo(\'' + ds + '\',' + roomsToClean + ',' + (info.checkin && info.checkout ? 'true' : 'false') + ')"' : '';
          html += `
                  <div class="${classes}"${clickable}>
                    <div class="day-num">${d}</div>
                    ${hasNotes ? `<div class="note-dot"></div>` : ''}
                  </div>`;
        }

        document.getElementById('calGrid').innerHTML = html;
      }

      function showDayCleaningInfo(ds, rooms, isDouble) {
        const el = document.getElementById('dayInfoCard');
        if (!el) return;

        // 日期格式：04 / 16
        const parts = ds.split('-');
        const dateLabel = parts[1] + ' / ' + parts[2];
        const typeText = rooms > 0 ? (isDouble ? '同進同出' : '單一退房') : '';

        const dayOrders = allOrders.filter((o) => o && o.checkOut === ds);
        const notes = [...new Set(dayOrders.map((o) => String(o.housekeepingNote || '').trim()).filter((t) => t))];

        document.getElementById('dayInfoDate').textContent = dateLabel;
        document.getElementById('dayInfoType').textContent = typeText ? '　' + typeText : '';

        let bodyHtml = '';
        if (rooms > 0) {
          const hint = isDouble ? '下一組客人約 15:50 辦理入住' : '時間充裕 打掃請多留意細節喔～';
          bodyHtml += `<p class="day-info-body">需清潔 ${rooms} 間</p>`;
          bodyHtml += `<p class="day-info-hint">${hint}</p>`;
        }
        if (notes.length) {
          bodyHtml += `<p class="day-info-note-label">進住注意事項</p>`;
          bodyHtml += notes.map((n) => `<p class="day-info-note-item">${n}</p>`).join('');
        }
        if (!bodyHtml) {
          bodyHtml = `<p class="day-info-body" style="color:#c4b5a5;">當日無訂單</p>`;
        }

        document.getElementById('dayInfoBody').innerHTML = bodyHtml;
        el.style.display = 'block';
      }
    </script>
  </body>
</html>
