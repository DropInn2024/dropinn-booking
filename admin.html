<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雫旅訂房管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 由 GAS 注入設定（用 window 避免與 config.template.js 重複宣告） -->
    <script>window.FRONTEND_CONFIG = <?!= configJson ?>;</script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

      :root {
        --cream: #fdfbf7;
        --stone: #5b5247;
        --warm-gray: #e5e1da;
        --stone-light: #f5f3ef;
      }

      body {
        font-family: 'Noto Sans TC', sans-serif;
        background: var(--cream);
        color: var(--stone);
        letter-spacing: 0.04em;
      }

      .serif {
        font-family: 'Noto Serif TC', serif;
      }

      /* Header */
      header {
        background: white;
        border-bottom: 1px solid var(--warm-gray);
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(91, 82, 71, 0.4);
        backdrop-filter: blur(4px);
        z-index: 1000;
        overflow-y: auto;
      }

      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Status badges */
      .status-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        letter-spacing: 0.08em;
        font-weight: 400;
      }

      .status-待確認 {
        background: #fef9ec;
        color: #92700a;
        border: 1px solid #f0dfa0;
      }
      .status-預定中, .status-已付訂, .status-已預訂, .status-已成立 {
        background: #edf7f0;
        color: #1a5c34;
        border: 1px solid #a8dbb8;
      }
      .status-已取消 {
        background: #fdf0f0;
        color: #8c2020;
        border: 1px solid #e8b8b8;
      }
      .status-已完成 {
        background: var(--stone-light);
        color: #888;
        border: 1px solid var(--warm-gray);
      }

      /* Tab */
      .tab {
        cursor: pointer;
        padding: 10px 20px;
        border-bottom: 2px solid transparent;
        transition: all 0.3s;
        font-size: 13px;
        letter-spacing: 0.06em;
        color: #a8a29e;
      }

      .tab.active {
        border-bottom-color: var(--stone);
        color: var(--stone);
        font-weight: 500;
      }

      /* Loader */
      .loader {
        border: 2px solid var(--warm-gray);
        border-top: 2px solid var(--stone);
        border-radius: 50%;
        width: 32px;
        height: 32px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Table */
      table {
        border-collapse: collapse;
      }
      thead th {
        font-weight: 400;
        font-size: 11px;
        letter-spacing: 0.1em;
        color: #b8b0a8;
      }
      tbody tr:hover {
        background: var(--stone-light);
      }

      /* Form inputs */
      input,
      select,
      textarea {
        font-family: 'Noto Sans TC', sans-serif;
        font-size: 13px;
        color: var(--stone);
        border: 1px solid var(--warm-gray) !important;
        border-radius: 6px !important;
        padding: 8px 12px !important;
        transition: border-color 0.2s;
        background: white;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #a8a29e !important;
      }

      /* Buttons */
      .btn-primary {
        background: var(--stone);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 12px;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: background 0.2s;
        font-family: 'Noto Sans TC', sans-serif;
      }

      .btn-primary:hover {
        background: #3d342c;
      }

      .btn-outline {
        background: white;
        color: var(--stone);
        border: 1px solid var(--warm-gray);
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 12px;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Noto Sans TC', sans-serif;
      }

      .btn-outline:hover {
        border-color: var(--stone);
      }

      /* Cards */
      .card {
        background: white;
        border: 1px solid var(--warm-gray);
        border-radius: 10px;
      }

      /* 訂房一覽月曆（置中、大格子、顯示姓名與已訂/未付訂） */
      .booking-cal-wrap {
        background: white;
        border: 1px solid var(--warm-gray);
        border-radius: 10px;
        padding: 20px 24px;
        margin-bottom: 20px;
        max-width: 560px;
        margin-left: auto;
        margin-right: auto;
      }
      .booking-cal-wrap .cal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .booking-cal-wrap .cal-title {
        font-family: var(--serif);
        font-size: 15px;
        color: #57534e;
        letter-spacing: 0.2em;
      }
      .booking-cal-wrap .cal-nav-btn {
        padding: 6px 10px;
        background: none;
        border: none;
        cursor: pointer;
        color: #c4b5a5;
      }
      .booking-cal-wrap .cal-nav-btn:hover { color: #78716c; }
      .booking-cal-wrap .cal-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        margin-bottom: 4px;
      }
      .booking-cal-wrap .cal-weekday {
        text-align: center;
        font-size: 11px;
        color: #d4c4b5;
        padding: 4px 0;
        letter-spacing: 0.05em;
      }
      .booking-cal-wrap .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .booking-cal-wrap .cal-day {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 56px;
        padding: 4px 2px;
        border-radius: 8px;
        transition: all 0.2s;
        font-size: 14px;
        font-weight: 300;
      }
      .booking-cal-wrap .cal-day .cal-day-num { line-height: 1.2; }
      .booking-cal-wrap .cal-day .cal-day-names {
        font-size: 9px;
        line-height: 1.3;
        margin-top: 2px;
        max-height: 24px;
        overflow: hidden;
        text-align: center;
        word-break: break-all;
        color: inherit;
        opacity: 0.9;
      }
      .booking-cal-wrap .cal-day .cal-day-labels { font-size: 8px; margin-top: 2px; }
      .booking-cal-wrap .cal-day.empty { background: transparent; border: none; min-height: 0; padding: 0; }
      .booking-cal-wrap .cal-day.past {
        background: transparent;
        border: none;
        opacity: 0.22;
        color: #c4b5a5;
      }
      .booking-cal-wrap .cal-day.today {
        background: white;
        border: 2px solid #a8a29e;
        color: #292524;
        font-weight: 600;
      }
      .booking-cal-wrap .cal-day.booked {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        font-weight: 500;
      }
      .booking-cal-wrap .cal-day.unpaid {
        background: #fffbeb;
        border: 1px solid #fde68a;
        color: #b45309;
        font-weight: 500;
      }
      .booking-cal-wrap .cal-day.booked.unpaid {
        background: linear-gradient(135deg, #fef2f2 45%, #fffbeb 55%);
        border-color: #fcd34d;
      }
      .booking-cal-wrap .cal-day.free {
        background: white;
        border: 1px solid #f5f5f4;
        color: #57534e;
      }
      .booking-cal-wrap .cal-day:not(.empty) { cursor: pointer; }
      .booking-cal-wrap .cal-day:not(.empty):hover { opacity: 0.9; }
      #bookingCalDayPopover {
        display: none;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 24px;
        max-width: 320px;
        width: calc(100% - 32px);
        background: white;
        border: 1px solid #e5e1da;
        border-radius: 12px;
        padding: 14px 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        z-index: 100;
      }
      #bookingCalDayPopover.show { display: block; }
      #bookingCalDayPopover .popover-title { font-size: 13px; color: #57534e; margin-bottom: 8px; }
      #bookingCalDayPopover .popover-list { font-size: 12px; color: #78716c; max-height: 120px; overflow-y: auto; }
      #bookingCalDayPopover .popover-close { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: #a8a29e; }
      .booking-cal-wrap .cal-legend {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 16px;
        font-size: 11px;
        color: #a8a29e;
      }
      .booking-cal-wrap .cal-legend span { display: flex; align-items: center; gap: 6px; }
      .booking-cal-wrap .cal-legend .dot {
        width: 12px; height: 12px;
        border-radius: 3px;
      }
      .booking-cal-wrap .cal-legend .dot.booked { background: #fef2f2; border: 1px solid #fecaca; }
      .booking-cal-wrap .cal-legend .dot.unpaid { background: #fffbeb; border: 1px solid #fde68a; }
      .booking-cal-wrap .cal-legend .dot.free { background: white; border: 1px solid #f5f5f4; }

      /* Calendar tool section */
      .calendar-tool {
        background: white;
        border: 1px solid var(--warm-gray);
        border-radius: 10px;
        padding: 20px 24px;
        margin-bottom: 20px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .hide-mobile {
          display: none !important;
        }
        .max-w-7xl {
          padding-left: 16px !important;
          padding-right: 16px !important;
        }
        .overflow-x-auto {
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
  </head>

  <body>
    <!-- 主容器 -->
    <div class="min-h-screen">
      <!-- Header -->
      <header>
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
          <div>
            <h1 class="serif text-xl text-stone-700 tracking-[0.2em]">雫旅管理後台</h1>
            <p class="text-xs text-stone-400 mt-0.5 tracking-widest">DROP INN ADMIN</p>
          </div>
          <div class="flex gap-3">
            <button onclick="openAddModal()" class="btn-primary flex items-center gap-2">
              <i class="fas fa-plus text-xs"></i>
              <span>新增訂單</span>
            </button>
            <button onclick="loadOrders()" class="btn-outline flex items-center gap-2">
              <i class="fas fa-sync-alt text-xs"></i>
              <span>重新整理</span>
            </button>
          </div>
        </div>
      </header>

      <!-- 主內容 -->
      <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- 載入中 -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
          <div class="loader"></div>
          <p class="mt-4 text-stone-500">載入中...</p>
        </div>

        <!-- 訂單列表 -->
        <div id="content" style="display: none">
          <!-- 📅 訂房一覽月曆（與訂房網頁同款：已訂/可訂一目了然） -->
          <div class="booking-cal-wrap">
            <h2 class="serif text-base text-stone-600 tracking-[0.15em] flex items-center gap-2 mb-3">
              <i class="fas fa-calendar-check text-stone-400 text-sm"></i>
              訂房一覽
            </h2>
            <p class="text-xs text-stone-400 mb-4 tracking-wide">已訂（預定中）／未付訂（待確認）皆顯示，點格子可看當日訂單</p>
            <div class="cal-head">
              <button type="button" class="cal-nav-btn" id="bookingCalPrev" aria-label="上個月">
                <i class="fas fa-chevron-left" style="font-size: 12px"></i>
              </button>
              <span class="cal-title" id="bookingCalTitle">— 年 — 月</span>
              <button type="button" class="cal-nav-btn" id="bookingCalNext" aria-label="下個月">
                <i class="fas fa-chevron-right" style="font-size: 12px"></i>
              </button>
            </div>
            <div class="cal-weekdays">
              <div class="cal-weekday">日</div>
              <div class="cal-weekday">一</div>
              <div class="cal-weekday">二</div>
              <div class="cal-weekday">三</div>
              <div class="cal-weekday">四</div>
              <div class="cal-weekday">五</div>
              <div class="cal-weekday">六</div>
            </div>
            <div class="cal-grid" id="bookingCalGrid"></div>
            <div class="cal-legend">
              <span><div class="dot booked"></div>已訂</span>
              <span><div class="dot unpaid"></div>未付訂</span>
              <span><div class="dot free"></div>可訂</span>
            </div>
            <div id="bookingCalDayPopover">
              <button type="button" class="popover-close" onclick="closeBookingCalPopover()" aria-label="關閉">×</button>
              <div class="popover-title" id="bookingCalDayPopoverTitle">—</div>
              <div class="popover-list" id="bookingCalDayPopoverList"></div>
            </div>
          </div>

          <!-- 📅 日曆管理工具列（Google Calendar，僅管理員使用） -->
          <div class="calendar-tool">
            <div class="flex items-center justify-between mb-4">
              <div>
                <h2
                  class="serif text-base text-stone-600 tracking-[0.15em] flex items-center gap-2"
                >
                  <i class="fas fa-calendar-alt text-stone-400 text-sm"></i>
                  日曆管理
                </h2>
                <p class="text-xs text-stone-400 mt-1 tracking-wide">Google Calendar 同步狀態</p>
              </div>
              <div id="calendarStats" class="flex gap-6 text-sm">
                <div class="text-center">
                  <div class="text-xl font-light text-stone-600" id="publicCount">—</div>
                  <div class="text-xs text-stone-400 tracking-wider mt-0.5">公開日曆</div>
                </div>
                <div class="text-center">
                  <div class="text-xl font-light text-stone-600" id="housekeepingCount">—</div>
                  <div class="text-xs text-stone-400 tracking-wider mt-0.5">房務日曆</div>
                </div>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              <button
                onclick="getCalendarStats()"
                class="btn-outline flex items-center gap-1.5 text-xs"
              >
                <i class="fas fa-chart-bar text-stone-400"></i> 查看統計
              </button>
              <button
                onclick="confirmRebuildCalendars()"
                class="btn-outline flex items-center gap-1.5 text-xs"
              >
                <i class="fas fa-sync-alt text-stone-400"></i> 重建日曆
              </button>
              <button
                onclick="confirmClearCalendars()"
                style="border-color: #f8b8b8; color: #b84040"
                class="btn-outline flex items-center gap-1.5 text-xs"
              >
                <i class="fas fa-trash-alt"></i> 清空日曆
              </button>
              <button
                onclick="confirmCleanupOldYear()"
                class="btn-outline flex items-center gap-1.5 text-xs"
              >
                <i class="fas fa-broom text-stone-400"></i> 清理去年
              </button>
              <a
                href="https://calendar.google.com/calendar/u/0/r"
                target="_blank"
                class="btn-outline flex items-center gap-1.5 text-xs"
              >
                <i class="fas fa-external-link-alt text-stone-400"></i> 打開日曆
              </a>
            </div>
            <div id="calendarMessage" class="mt-3 p-3 rounded-lg text-xs hidden">
              <div class="flex items-start gap-2">
                <i class="fas fa-info-circle mt-0.5"></i>
                <div>
                  <div class="font-medium" id="messageTitle"></div>
                  <div class="opacity-80 mt-0.5" id="messageContent"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- ==========================================
     JavaScript 函數（加到 <script> 區塊內）
     ========================================== -->

          <script>
            /**
             * 📊 查看日曆統計
             */
            async function getCalendarStats() {
              try {
                showCalendarMessage('載入中...', '正在查詢日曆統計', 'info');

                // 呼叫 GAS API
                const statsUrl = `${API_URL}?action=getCalendarStats${
                  ADMIN_API_KEY ? '&adminKey=' + encodeURIComponent(ADMIN_API_KEY) : ''
                }`;
                const response = await fetch(statsUrl, {
                  method: 'GET',
                });

                const result = await response.json();

                if (result.success) {
                  // 更新統計數字
                  document.getElementById('publicCount').textContent = result.publicCount || 0;
                  document.getElementById('housekeepingCount').textContent =
                    result.housekeepingCount || 0;

                  showCalendarMessage(
                    '統計查詢完成',
                    `公開日曆：${result.publicCount} 個事件｜房務日曆：${result.housekeepingCount} 個事件｜總計：${result.total} 個事件`,
                    'success'
                  );
                } else {
                  showCalendarMessage('查詢失敗', result.error, 'error');
                }
              } catch (error) {
                console.error('查詢統計失敗:', error);
                showCalendarMessage('查詢失敗', error.message, 'error');
              }
            }

            /**
             * 🔄 重建日曆（確認）
             */
            function confirmRebuildCalendars() {
              if (
                confirm(
                  '⚠️ 確定要重建所有日曆嗎？\n\n這會：\n1. 清空所有日曆事件\n2. 重新讀取所有訂單\n3. 重新建立日曆事件\n\n過程需要 1-2 分鐘，請耐心等待。'
                )
              ) {
                rebuildCalendars();
              }
            }

            /**
             * 🔄 重建日曆（執行）
             */
            async function rebuildCalendars() {
              try {
                showCalendarMessage('重建中...', '正在清空並重建所有日曆，請勿關閉視窗', 'info');

                // 呼叫 GAS API
                const response = await fetch(API_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    action: 'rebuildCalendars',
                    adminKey: ADMIN_API_KEY || undefined,
                  }),
                });

                const result = await response.json();

                if (result.success) {
                  showCalendarMessage(
                    '重建完成！',
                    `成功：${result.successCount} 筆｜拒絕：${result.rejectedCount} 筆`,
                    'success'
                  );

                  // 重新查詢統計
                  setTimeout(() => getCalendarStats(), 1000);
                } else {
                  showCalendarMessage('重建失敗', result.error, 'error');
                }
              } catch (error) {
                console.error('重建日曆失敗:', error);
                showCalendarMessage('重建失敗', error.message, 'error');
              }
            }

            /**
             * 🗑️ 清空日曆（確認）
             */
            function confirmClearCalendars() {
              if (
                confirm(
                  '⚠️⚠️⚠️ 危險操作！\n\n確定要清空所有日曆事件嗎？\n\n這會刪除過去3年到未來3年的所有事件，無法復原！\n\n建議使用「重建日曆」功能，而不是清空。'
                )
              ) {
                if (confirm('再次確認：真的要清空所有日曆嗎？')) {
                  clearCalendars();
                }
              }
            }

            /**
             * 🗑️ 清空日曆（執行）
             */
            async function clearCalendars() {
              try {
                showCalendarMessage('清空中...', '正在刪除所有日曆事件', 'info');

                // 呼叫 GAS API
                const response = await fetch(API_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    action: 'clearCalendars',
                    adminKey: ADMIN_API_KEY || undefined,
                  }),
                });

                const result = await response.json();

                if (result.success) {
                  showCalendarMessage(
                    '清空完成',
                    `已刪除 ${result.deletedCount} 個事件`,
                    'success'
                  );

                  // 重新查詢統計
                  setTimeout(() => getCalendarStats(), 1000);
                } else {
                  showCalendarMessage('清空失敗', result.error, 'error');
                }
              } catch (error) {
                console.error('清空日曆失敗:', error);
                showCalendarMessage('清空失敗', error.message, 'error');
              }
            }

            /**
             * 🧹 清理去年事件（確認）
             */
            function confirmCleanupOldYear() {
              const currentYear = new Date().getFullYear();
              const targetYear = currentYear - 1;

              if (
                confirm(`確定要清理 ${targetYear} 年的日曆事件嗎？\n\n這會刪除去年的所有事件。`)
              ) {
                cleanupOldYear();
              }
            }

            /**
             * 🧹 清理去年事件（執行）
             */
            async function cleanupOldYear() {
              try {
                showCalendarMessage('清理中...', '正在清理去年的日曆事件', 'info');

                // 呼叫 GAS API
                const response = await fetch(API_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    action: 'cleanupOldYear',
                    adminKey: ADMIN_API_KEY || undefined,
                  }),
                });

                const result = await response.json();

                if (result.success) {
                  showCalendarMessage(
                    '清理完成',
                    `已刪除 ${result.year} 年的 ${result.deletedCount} 個事件`,
                    'success'
                  );

                  // 重新查詢統計
                  setTimeout(() => getCalendarStats(), 1000);
                } else {
                  if (result.reason === '非執行月份') {
                    showCalendarMessage(
                      '提醒',
                      '清理功能只在每年2月執行，其他月份無法執行',
                      'warning'
                    );
                  } else {
                    showCalendarMessage('清理失敗', result.error, 'error');
                  }
                }
              } catch (error) {
                console.error('清理失敗:', error);
                showCalendarMessage('清理失敗', error.message, 'error');
              }
            }

            /**
             * 💬 顯示日曆訊息
             */
            function showCalendarMessage(title, content, type = 'info') {
              const messageDiv = document.getElementById('calendarMessage');
              const titleDiv = document.getElementById('messageTitle');
              const contentDiv = document.getElementById('messageContent');

              titleDiv.textContent = title;
              contentDiv.textContent = content;

              // 移除舊的樣式
              messageDiv.classList.remove(
                'bg-blue-100',
                'text-blue-800',
                'bg-green-100',
                'text-green-800',
                'bg-red-100',
                'text-red-800',
                'bg-yellow-100',
                'text-yellow-800',
                'hidden'
              );

              // 加入新的樣式
              if (type === 'success') {
                messageDiv.classList.add('bg-green-100', 'text-green-800');
              } else if (type === 'error') {
                messageDiv.classList.add('bg-red-100', 'text-red-800');
              } else if (type === 'warning') {
                messageDiv.classList.add('bg-yellow-100', 'text-yellow-800');
              } else {
                messageDiv.classList.add('bg-blue-100', 'text-blue-800');
              }

              // 顯示訊息
              messageDiv.classList.remove('hidden');

              // 5秒後自動隱藏（除非是錯誤）
              if (type !== 'error') {
                setTimeout(() => {
                  messageDiv.classList.add('hidden');
                }, 5000);
              }
            }

            // 頁面載入時自動查詢統計
            window.addEventListener('load', function () {
              setTimeout(() => getCalendarStats(), 1000);
            });
          </script>

    <script>
      // ==========================================
      // 全域變數
      // ==========================================
      let allOrders = [];
      let currentOrder = null;
      const API_URL = FRONTEND_CONFIG.API_URL;
      const ADMIN_API_KEY = FRONTEND_CONFIG.ADMIN_API_KEY || '';

      // 訂房一覽月曆（與訂房網頁同款）
      let bookingCalCurrentMonth = (function () {
        var d = new Date();
        d.setDate(1);
        d.setHours(0, 0, 0, 0);
        return d;
      })();
      // ==========================================
      // 初始化
      // ==========================================
      window.onload = function () {
        loadOrders();
      };

      // ==========================================
      // 載入訂單
      // ==========================================
      async function loadOrders() {
        try {
          document.getElementById('loading').style.display = 'flex';
          document.getElementById('content').style.display = 'none';

          const url = `${API_URL}?action=getAllOrders${ADMIN_API_KEY ? '&adminKey=' + encodeURIComponent(ADMIN_API_KEY) : ''}`;
          const response = await fetch(url);
          const contentType = (response.headers.get('content-type') || '').toLowerCase();
          const text = await response.text();

          if (!response.ok) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            alert('載入訂單失敗：HTTP ' + response.status + '\n\n請確認 Admin API 部署的「誰可以存取」為「任何人」。');
            return;
          }

          if (contentType.indexOf('html') !== -1) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            alert('後端回傳了網頁而非資料，請：\n1. 在 GAS「部署」→「管理部署作業」→ Admin API → 編輯 →「誰可以存取」改為「任何人」\n2. 用瀏覽器「新分頁」直接開此網址，勿用嵌入式預覽');
            return;
          }

          var data;
          try {
            data = JSON.parse(text);
          } catch (e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            console.error('後端回傳非 JSON:', text.slice(0, 300));
            alert('後端回傳格式錯誤。請開 F12 → Console 查看「後端回傳非 JSON」的內容，或確認 GAS 試算表已正確連結。');
            return;
          }

          if (Array.isArray(data)) {
            allOrders = data;
          } else if (data && data.success === false && data.error) {
            allOrders = [];
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            alert('後端錯誤：' + data.error + '\n\n若為 SHEET_ID 未設定，請到 GAS「專案設定」→「指令碼屬性」新增 SHEET_ID（試算表 ID）。');
            return;
          } else {
            allOrders = [];
          }

          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';
          filterOrders();
          fetchBookingCalendarAndRender();
          // 退房日已過的預定中訂單自動標記為已完成（背景執行，不阻塞畫面）
          fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'markCompletedOrders', adminKey: ADMIN_API_KEY || undefined }),
          }).catch(function () {});
        } catch (error) {
          console.error('載入訂單失敗:', error);
          alert('載入訂單失敗：' + (error.message || error) + '\n\n請用 F12 → Network 檢查 getAllOrders 請求的狀態與回應。');
        }
      }

      // ==========================================
      // 篩選訂單
      // ==========================================
      function filterOrders() {
        const statusFilter = document.getElementById('filterStatus').value;
        const searchText = document.getElementById('searchInput').value.toLowerCase();

        let filtered = allOrders;

        // 狀態篩選（預定中 = 預定中 + 舊狀態 已付訂/已預訂/已成立）
        if (statusFilter) {
          if (statusFilter === '預定中') {
            filtered = filtered.filter((order) => ['預定中', '已付訂', '已預訂', '已成立'].includes(order.status));
          } else {
            filtered = filtered.filter((order) => order.status === statusFilter);
          }
        }

        // 搜尋篩選
        if (searchText) {
          filtered = filtered.filter(
            (order) =>
              order.orderID.toLowerCase().includes(searchText) ||
              order.name.toLowerCase().includes(searchText) ||
              order.phone.includes(searchText)
          );
        }

        // 更新總數
        document.getElementById('totalCount').textContent = filtered.length;

        // 渲染表格
        renderOrderTable(filtered);
      }

      // ==========================================
      // 訂房一覽月曆（用 allOrders 顯示已訂/未付訂與訂單人姓名）
      // ==========================================
      function fetchBookingCalendarAndRender() {
        if (!window._bookingCalBound) {
          document.getElementById('bookingCalPrev').onclick = prevBookingMonth;
          document.getElementById('bookingCalNext').onclick = nextBookingMonth;
          window._bookingCalBound = true;
        }
        renderBookingCalendar();
      }

      function getBookingCalDateStr(date) {
        var y = date.getFullYear();
        var m = String(date.getMonth() + 1).padStart(2, '0');
        var d = String(date.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + d;
      }

      function prevBookingMonth() {
        var prev = new Date(bookingCalCurrentMonth.getFullYear(), bookingCalCurrentMonth.getMonth() - 1, 1);
        var todayStart = new Date();
        todayStart.setDate(1);
        todayStart.setHours(0, 0, 0, 0);
        if (prev >= todayStart) {
          bookingCalCurrentMonth = prev;
          renderBookingCalendar();
        }
      }

      function nextBookingMonth() {
        var next = new Date(bookingCalCurrentMonth.getFullYear(), bookingCalCurrentMonth.getMonth() + 1, 1);
        if (next.getFullYear() <= new Date().getFullYear() + 1) {
          bookingCalCurrentMonth = next;
          renderBookingCalendar();
        }
      }

      function renderBookingCalendar() {
        var titleEl = document.getElementById('bookingCalTitle');
        var gridEl = document.getElementById('bookingCalGrid');
        if (!titleEl || !gridEl) return;

        var year = bookingCalCurrentMonth.getFullYear();
        var month = bookingCalCurrentMonth.getMonth();
        titleEl.textContent = year + ' 年 ' + (month + 1) + ' 月';

        var startDayOfWeek = new Date(year, month, 1).getDay();
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var totalCells = Math.ceil((startDayOfWeek + daysInMonth) / 7) * 7;
        var todayStr = getBookingCalDateStr(new Date());
        var todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);
        // 日曆顯示：待確認=未付訂，預定中=已付訂金（含舊資料 已付訂/已預訂/已成立）
        var validStatuses = ['待確認', '預定中', '已付訂', '已預訂', '已成立'];
        var paidStatuses = ['預定中', '已付訂', '已預訂', '已成立'];

        function ordersOnDate(dateStr) {
          return allOrders.filter(function (o) {
            if (!validStatuses.includes(o.status)) return false;
            return dateStr >= o.checkIn && dateStr < o.checkOut;
          });
        }
        function paidOnDate(dateStr) {
          return ordersOnDate(dateStr).filter(function (o) { return paidStatuses.indexOf(o.status) !== -1; });
        }
        function unpaidOnDate(dateStr) {
          return ordersOnDate(dateStr).filter(function (o) { return o.status === '待確認'; });
        }

        var html = '';
        for (var i = 0; i < totalCells; i++) {
          var dayNumber = i - startDayOfWeek + 1;
          if (dayNumber < 1 || dayNumber > daysInMonth) {
            html += '<div class="cal-day empty"></div>';
            continue;
          }
          var date = new Date(year, month, dayNumber);
          var dateStr = getBookingCalDateStr(date);
          var past = date < todayStart;
          var today = dateStr === todayStr;
          var paid = paidOnDate(dateStr);
          var unpaid = unpaidOnDate(dateStr);
          var hasPaid = paid.length > 0;
          var hasUnpaid = unpaid.length > 0;

          var classes = 'cal-day';
          if (past) classes += ' past';
          else if (today) classes += ' today';
          if (hasPaid) classes += ' booked';
          if (hasUnpaid) classes += ' unpaid';
          if (!hasPaid && !hasUnpaid && !past) classes += ' free';

          var names = (paid.concat(unpaid)).map(function (o) { return (o.name || '').trim() || '—'; });
          var namesText = names.length ? names.slice(0, 3).join('、') : '';
          if (names.length > 3) namesText += '…';
          var namesHtml = namesText ? '<div class="cal-day-names">' + escapeHtml(namesText) + '</div>' : '';

          var labels = [];
          if (hasPaid && !past) labels.push('<span class="cal-day-labels">已訂</span>');
          if (hasUnpaid && !past) labels.push('<span class="cal-day-labels">未付訂</span>');
          if (today && !hasPaid && !hasUnpaid) labels.push('<span class="cal-day-labels">今</span>');
          var labelHtml = labels.length ? labels.join('') : '';

          html += '<div class="' + classes + '" data-date="' + dateStr + '" onclick="showBookingDayInfo(\'' + dateStr + '\')">' +
            '<span class="cal-day-num">' + dayNumber + '</span>' + namesHtml + labelHtml + '</div>';
        }
        gridEl.innerHTML = html;
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function showBookingDayInfo(dateStr) {
        // 含預定中與舊狀態（已付訂/已預訂/已成立）
        var validStatuses = ['待確認', '預定中', '已付訂', '已預訂', '已成立'];
        var onThatDay = allOrders.filter(function (o) {
          if (!validStatuses.includes(o.status)) return false;
          return dateStr >= o.checkIn && dateStr < o.checkOut;
        });
        var titleEl = document.getElementById('bookingCalDayPopoverTitle');
        var listEl = document.getElementById('bookingCalDayPopoverList');
        var popEl = document.getElementById('bookingCalDayPopover');
        if (!titleEl || !listEl || !popEl) return;
        titleEl.textContent = dateStr + '：' + (onThatDay.length ? onThatDay.length + ' 筆訂單' : '無訂單');
        if (onThatDay.length === 0) {
          listEl.innerHTML = '<span class="text-stone-400">當日無入住訂單</span>';
        } else {
          listEl.innerHTML = onThatDay.map(function (o) {
            var note = o.checkIn === dateStr ? '入住' : (o.checkOut === dateStr ? '退房' : '住中');
            return '<div class="py-1">' + o.orderID + ' · ' + (o.name || '') + ' · ' + note + '</div>';
          }).join('');
        }
        popEl.classList.add('show');
      }

      function closeBookingCalPopover() {
        var pop = document.getElementById('bookingCalDayPopover');
        if (pop) pop.classList.remove('show');
      }

      // ==========================================
      // 渲染訂單表格
      // ==========================================
      function renderOrderTable(orders) {
        const tbody = document.getElementById('orderTableBody');
        const emptyState = document.getElementById('emptyState');

        if (orders.length === 0) {
          tbody.innerHTML = '';
          emptyState.style.display = 'block';
          return;
        }

        emptyState.style.display = 'none';

        tbody.innerHTML = orders
          .map((order) => {
            const nights = Math.ceil(
              (new Date(order.checkOut) - new Date(order.checkIn)) / (1000 * 60 * 60 * 24)
            );

            return `
          <tr class="hover:bg-stone-50 transition">
            <td class="px-6 py-4 text-sm font-mono text-stone-600">${order.orderID}</td>
            <td class="px-6 py-4">
              <div class="text-sm font-medium text-stone-700">${order.name}</div>
              <div class="text-xs text-stone-400">${order.phone}</div>
            </td>
            <td class="px-6 py-4 text-sm text-stone-600">${order.checkIn}</td>
            <td class="px-6 py-4 text-sm text-stone-600">${order.checkOut}</td>
            <td class="px-6 py-4 text-sm text-stone-600">${order.rooms} 間 (${nights} 晚)</td>
            <td class="px-6 py-4 text-sm font-medium text-stone-700">NT$ ${order.totalPrice.toLocaleString()}</td>
            <td class="px-6 py-4">
              <span class="status-badge status-${order.status}">${order.status}</span>
            </td>
            <td class="px-6 py-4">
              <button onclick="viewOrder('${order.orderID}')" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                查看詳情
              </button>
            </td>
          </tr>
        `;
          })
          .join('');
      }

      // ==========================================
      // 查看訂單詳情
      // ==========================================
      async function viewOrder(orderID) {
        // 直接從已載入的 allOrders 找，不需要再打 API
        const order = allOrders.find((o) => o.orderID === orderID);
        if (order) {
          currentOrder = order;
          renderOrderDetail(order);
          document.getElementById('orderModal').classList.add('active');
        } else {
          alert('找不到訂單，請重新整理頁面');
        }
      }

      // ==========================================
      // 儲存訂單
      // ==========================================
      async function saveOrder() {
        if (!currentOrder) return;

        const updates = {
          checkIn: document.getElementById('editCheckIn').value,
          checkOut: document.getElementById('editCheckOut').value,
          rooms: parseInt(document.getElementById('editRooms').value),
          extraBeds: parseInt(document.getElementById('editExtraBeds').value),
          paidDeposit: parseInt(document.getElementById('editPaidDeposit').value) || 0,
          internalNotes: document.getElementById('editInternalNotes').value,
          status: document.getElementById('editStatus').value,
        };

        // 計算新的總金額和尾款
        // 計算新的總金額和尾款
        const nights = Math.ceil(
          (new Date(updates.checkOut) - new Date(updates.checkIn)) / (1000 * 60 * 60 * 24)
        );

        // ✅ [修正開始] 改用包棟階梯式計價
        const WHOLE_HOUSE_RATES = {
          3: 10000, // 3房包棟一晚價格
          4: 12000, // 4房包棟一晚價格
          5: 15000, // 5房包棟一晚價格
        };

        // 取得包棟房價，如果找不到對應房間數，預設用 10000 (防呆)
        const basePrice = WHOLE_HOUSE_RATES[updates.rooms] || 10000;

        // 加床費用：每床 $1000
        const extraPrice = updates.extraBeds * 1000;

        // 新的總金額公式： (包棟價 + 加床費) * 晚數
        updates.totalPrice = (basePrice + extraPrice) * nights;
        // ✅ [修正結束]

        updates.remainingBalance = updates.totalPrice - updates.paidDeposit;

        try {
          // 更新訂單並同步日曆
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'updateOrderAndSync',
              orderID: currentOrder.orderID,
              updates,
              adminKey: ADMIN_API_KEY || undefined,
            }),
          });

          const text = await response.text();
          if (!response.ok) {
            console.error('儲存失敗 HTTP:', response.status, text.slice(0, 300));
            alert('儲存失敗（' + response.status + '），請重試或檢查後台權限');
            return;
          }
          let result;
          try {
            result = JSON.parse(text);
          } catch (parseErr) {
            console.error('儲存失敗：回傳非 JSON', text.slice(0, 300));
            alert('儲存失敗：伺服器回傳異常，請重試或聯繫技術人員');
            return;
          }

          if (result.success) {
            // 處理通知
            const notifyEmail = document.getElementById('notifyEmail').checked;
            const notifyLine = document.getElementById('notifyLine').checked;

            if (notifyEmail && currentOrder.email) {
              await sendEmailNotification(currentOrder.orderID);
            }

            if (notifyLine) {
              await showLineNotification(currentOrder.orderID);
            } else {
              alert('✅ 訂單已更新並同步日曆');
              closeModal();
              loadOrders();
            }
          } else {
            alert('更新失敗：' + (result.error || '未知錯誤'));
          }
        } catch (error) {
          console.error('儲存失敗:', error);
          alert('儲存失敗，請重試（若為網路或連線問題，請檢查網址與權限）');
        }
      }

      // ==========================================
      // 發送 Email 通知
      // ==========================================
      async function sendEmailNotification(orderID) {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'sendNotificationEmail', orderID }),
          });

          const result = await response.json();

          if (result.success) {
            console.log('✅ Email 已發送');
          } else {
            console.log('⚠️ Email 發送失敗:', result.error);
          }
        } catch (error) {
          console.error('Email 發送錯誤:', error);
        }
      }

      // ==========================================
      // 顯示 LINE 通知文字
      // ==========================================
      async function showLineNotification(orderID) {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'generateNotification',
              orderID,
              changeType: '訂單更新',
              adminKey: ADMIN_API_KEY || undefined,
            }),
          });

          const result = await response.json();

          if (result.success) {
            // 複製到剪貼簿
            navigator.clipboard.writeText(result.lineText);

            alert('✅ 訂單已儲存並同步日曆\n\nLINE 通知文字已複製到剪貼簿\n請貼到 LINE 傳給客人');

            closeModal();
            loadOrders();
          }
        } catch (error) {
          console.error('生成通知失敗:', error);
          alert('✅ 訂單已儲存\n但通知文字生成失敗');
          closeModal();
          loadOrders();
        }
      }

      // ==========================================
      // 關閉彈窗
      // ==========================================
      function openAddModal() {
        // 清空欄位
        ['addName', 'addPhone', 'addEmail', 'addCheckIn', 'addCheckOut', 'addNotes'].forEach(
          (id) => {
            document.getElementById(id).value = '';
          }
        );
        document.getElementById('addDeposit').value = '0';
        document.getElementById('addRooms').value = '3';
        document.getElementById('addExtraBeds').value = '0';
        document.getElementById('addStatus').value = '待確認';
        document.getElementById('addError').classList.add('hidden');
        document.getElementById('addModal').classList.add('active');
      }

      function closeAddModal() {
        document.getElementById('addModal').classList.remove('active');
      }

      async function submitAddOrder() {
        const name = document.getElementById('addName').value.trim();
        const phone = document.getElementById('addPhone').value.trim();
        const checkIn = document.getElementById('addCheckIn').value;
        const checkOut = document.getElementById('addCheckOut').value;
        const errEl = document.getElementById('addError');

        if (!name || !phone || !checkIn || !checkOut) {
          errEl.textContent = '請填寫姓名、電話、入住及退房日期';
          errEl.classList.remove('hidden');
          return;
        }
        if (checkOut <= checkIn) {
          errEl.textContent = '退房日期必須晚於入住日期';
          errEl.classList.remove('hidden');
          return;
        }
        errEl.classList.add('hidden');

        const rooms = parseInt(document.getElementById('addRooms').value);
        const extraBeds = parseInt(document.getElementById('addExtraBeds').value);
        const paidDeposit = parseInt(document.getElementById('addDeposit').value) || 0;
        const status = document.getElementById('addStatus').value;
        const notes = document.getElementById('addNotes').value.trim();

        const prices = { 3: 10000, 4: 12000, 5: 15000 };
        const nights = Math.ceil((new Date(checkOut) - new Date(checkIn)) / 86400000);
        const packagePrice = prices[rooms] || 10000;
        const extraBedPrice = extraBeds * 1000;
        const totalPrice = (packagePrice + extraBedPrice) * nights;
        const remainingBalance = totalPrice - paidDeposit;

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              action: 'createBooking',
              token: 'ADMIN_BYPASS',
              data: {
                name,
                phone,
                email: document.getElementById('addEmail').value.trim(),
                checkIn,
                checkOut,
                rooms,
                extraBeds,
                notes,
                nights,
                packagePrice,
                extraBedPrice,
                totalPrice,
                paidDeposit,
                remainingBalance,
                status,
                timestamp: new Date().toISOString(),
              },
            }),
          });
          const result = await response.json();
          if (result.success) {
            closeAddModal();
            await loadOrders();
            alert(`✅ 訂單已建立：${result.orderID}`);
          } else {
            errEl.textContent = result.error || result.message || '建立失敗';
            errEl.classList.remove('hidden');
          }
        } catch (e) {
          errEl.textContent = '網路錯誤：' + e.message;
          errEl.classList.remove('hidden');
        }
      }

      function closeModal() {
        document.getElementById('orderModal').classList.remove('active');
        currentOrder = null;
      }

      // 點擊背景關閉
      document.getElementById('orderModal').addEventListener('click', function (e) {
        if (e.target === this) {
          closeModal();
        }
      });
    </script>
