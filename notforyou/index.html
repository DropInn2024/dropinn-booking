<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>雫旅｜notforyou</title>
    <script src="/config.public.js"></script>
    <script>
      window.FRONTEND_CONFIG =
        window.FRONTEND_CONFIG || (typeof FRONTEND_CONFIG !== 'undefined' ? FRONTEND_CONFIG : {});
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg:      #ece8e1;
        --card:    #f8f5ef;
        --ink:     #1a1210;
        --muted:   #8a7a6a;
        --accent:  #b8795a;
        --border:  rgba(181, 171, 160, 0.25);
        --past:    #c4b8a8;
        --pending: #e0d8cc;
        --cross:   #b8b0a6;
        --select:  rgba(210, 195, 165, 0.5);
        --blocked: rgba(181, 171, 160, 0.35);
        --has-room: rgba(184, 121, 90, 0.12);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        letter-spacing: 0.08em;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        width: 90%;
        max-width: 340px;
        text-align: center;
      }

      /* 品牌 */
      .brand {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.3em;
        color: var(--ink);
        margin-bottom: 8px;
      }
      .brand-sub {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        letter-spacing: 0.5em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 52px;
      }

      /* 表單 */
      .field {
        position: relative;
        margin-bottom: 32px;
        text-align: left;
      }
      label {
        display: block;
        font-family: 'Cormorant Garamond', serif;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 12px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 15px;
        color: var(--ink);
        letter-spacing: 0.15em;
        outline: none;
        transition: border-color 0.3s;
        -webkit-appearance: none;
        appearance: none;
      }
      input:focus {
        border-bottom-color: var(--ink);
      }
      input::selection {
        background: rgba(184, 121, 90, 0.28);
        color: var(--ink);
      }
      input::-moz-selection {
        background: rgba(184, 121, 90, 0.28);
        color: var(--ink);
      }

      .pw-toggle {
        position: absolute;
        right: 0;
        bottom: 13px;
        background: none;
        border: none;
        cursor: pointer;
        font-family: 'Cormorant Garamond', serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--muted);
        -webkit-tap-highlight-color: transparent;
        outline: none;
        transition: color 0.2s;
      }
      .pw-toggle:hover {
        color: var(--ink);
      }

      /* 按鈕 */
      .btn {
        width: 100%;
        padding: 15px;
        background: var(--card);
        color: var(--ink);
        border: 1px solid rgba(181, 171, 160, 0.45);
        border-radius: 12px;
        font-family: 'Noto Serif TC', serif;
        font-size: 13px;
        letter-spacing: 0.2em;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        -webkit-tap-highlight-color: transparent;
        outline: none;
        margin-top: 8px;
      }
      .btn:hover {
        background: rgba(181, 171, 160, 0.15);
        border-color: var(--ink);
      }
      .btn:disabled {
        background: rgba(181, 171, 160, 0.2);
        color: var(--muted);
        cursor: default;
      }

      /* 提示 */
      .notice {
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.1em;
        line-height: 2;
        min-height: 20px;
        margin-top: 14px;
        text-align: center;
      }

    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">Not for you.</div>
      <div class="brand-sub">填滿空白的人</div>

      <div class="field">
        <label>Account</label>
        <input type="text" id="loginId" placeholder="帳號" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••" autocomplete="current-password" />
        <button type="button" class="pw-toggle" id="pwToggle">SHOW</button>
      </div>

      <button class="btn" id="btnEnter">踏進雫旅</button>
      <p class="notice" id="notice"></p>

    </div>

    <script>
      (function () {
        var API_URL =
          (window.FRONTEND_CONFIG &&
            (window.FRONTEND_CONFIG.API_URL_ADMIN || window.FRONTEND_CONFIG.API_URL)) ||
          '';

        var loginEl = document.getElementById('loginId');
        var pwEl = document.getElementById('password');
        var btn = document.getElementById('btnEnter');
        var notice = document.getElementById('notice');
        var toggle = document.getElementById('pwToggle');

        toggle.addEventListener('click', function () {
          if (pwEl.type === 'password') {
            pwEl.type = 'text';
            toggle.textContent = 'HIDE';
          } else {
            pwEl.type = 'password';
            toggle.textContent = 'SHOW';
          }
        });

        [loginEl, pwEl].forEach(function (el) {
          el.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') btn.click();
          });
        });

        btn.addEventListener('click', function () {
          var id = (loginEl.value || '').trim();
          var pw = pwEl.value || '';
          if (!id || !pw) {
            showNotice('請輸入帳號與密碼');
            return;
          }
          if (!API_URL) {
            showNotice('設定檔尚未載入，請重新整理');
            return;
          }

          setLoading(true);
          fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'adminLogin', loginId: id, password: pw }),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              setLoading(false);
              if (!data || !data.success || !data.token) {
                showNotice(data && data.message ? data.message : '帳號或密碼錯誤');
                pwEl.select();
                return;
              }
              sessionStorage.setItem('admin_key', data.token);
              window.location.replace('/notforyou/home');
            })
            .catch(function () {
              setLoading(false);
              showNotice('連線失敗，請稍後再試');
            });
        });

        function setLoading(on) {
          btn.disabled = on;
          btn.textContent = on ? '驗證中…' : '踏進雫旅';
        }
        function showNotice(msg) {
          notice.textContent = msg;
        }

        if (sessionStorage.getItem('admin_key')) {
          window.location.replace('/notforyou/home');
        }
      })();
    </script>
  </body>
</html>
