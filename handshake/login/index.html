<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雫旅｜島嶼同路人</title>
    <script src="/config.public.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg:      #ece8e1;
        --card:    #f8f5ef;
        --ink:     #1a1210;
        --muted:   #8a7a6a;
        --accent:  #b8795a;
        --border:  rgba(181, 171, 160, 0.25);
        --past:    #c4b8a8;
        --pending: #e0d8cc;
        --cross:   #b8b0a6;
        --select:  rgba(210, 195, 165, 0.5);
        --blocked: rgba(181, 171, 160, 0.35);
        --has-room: rgba(184, 121, 90, 0.12);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        letter-spacing: 0.1em;
        line-height: 2;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 480px;
        margin: 0 auto;
        padding: 80px 24px;
      }

      /* 頁首 */
      .page-header {
        text-align: center;
        margin-bottom: 52px;
      }
      h1 {
        font-size: 22px;
        font-weight: 300;
        letter-spacing: 0.25em;
        margin-bottom: 10px;
        color: var(--ink);
      }
      .sub {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.5em;
        text-transform: uppercase;
      }

      /* 分頁 */
      .tabs {
        display: flex;
        justify-content: center;
        gap: 40px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 40px;
        padding-bottom: 10px;
      }
      .tabs a {
        font-size: 13px;
        letter-spacing: 0.2em;
        color: var(--muted);
        text-decoration: none;
        cursor: pointer;
        position: relative;
        transition: color 0.3s;
      }
      .tabs a.active {
        color: var(--ink);
      }
      .tabs a.active::after {
        content: '';
        position: absolute;
        bottom: -11px;
        left: 0;
        width: 100%;
        height: 1px;
        background: var(--ink);
      }

      /* 表單 */
      .form-group {
        margin-bottom: 28px;
        text-align: left;
      }
      label {
        display: block;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.25em;
        margin-bottom: 8px;
        font-family: 'Cormorant Garamond', serif;
        text-transform: uppercase;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 12px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 14px;
        color: var(--ink);
        outline: none;
        letter-spacing: 0.1em;
        transition: border-bottom-color 0.3s;
        -webkit-appearance: none;
        appearance: none;
      }
      input:focus {
        border-bottom-color: var(--ink);
      }

      .pw-row {
        position: relative;
      }
      .pw-toggle {
        position: absolute;
        right: 0;
        top: 12px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.2em;
        font-family: 'Cormorant Garamond', serif;
        -webkit-tap-highlight-color: transparent;
        outline: none;
        transition: color 0.3s;
      }
      .pw-toggle:hover {
        color: var(--ink);
      }

      /* 按鈕 */
      .btn {
        display: block;
        width: 100%;
        margin-top: 36px;
        padding: 15px;
        background: var(--card);
        color: var(--ink);
        border: 1px solid rgba(181, 171, 160, 0.45);
        border-radius: 12px;
        font-family: 'Noto Serif TC', serif;
        font-size: 13px;
        letter-spacing: 0.2em;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }
      .btn:hover {
        background: rgba(181, 171, 160, 0.15);
        border-color: var(--ink);
      }
      .btn:disabled {
        background: rgba(181, 171, 160, 0.2);
        color: var(--muted);
        cursor: default;
      }

      .notice {
        text-align: center;
        font-size: 12px;
        color: var(--accent);
        margin-top: 14px;
        letter-spacing: 0.1em;
        line-height: 2;
        min-height: 20px;
      }
      .message {
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        margin-top: 12px;
        letter-spacing: 0.08em;
        line-height: 2;
      }
      .back-link {
        display: block;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--muted);
        text-decoration: none;
        margin-top: 52px;
        transition: color 0.3s;
      }
      .back-link:hover {
        color: var(--ink);
      }

      /* 申請等待畫面 */
      .pending-box {
        display: none;
        text-align: center;
        padding: 40px 20px;
      }
      .pending-icon {
        font-family: 'Cormorant Garamond', serif;
        font-size: 40px;
        color: var(--muted);
        margin-bottom: 20px;
        opacity: 0.4;
        line-height: 1;
      }
      .pending-title {
        font-size: 16px;
        font-weight: 300;
        letter-spacing: 0.2em;
        margin-bottom: 12px;
        color: var(--ink);
      }
      .pending-desc {
        font-size: 13px;
        color: var(--muted);
        line-height: 2.4;
        letter-spacing: 0.08em;
      }
      .pending-back {
        display: inline-block;
        margin-top: 32px;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--muted);
        cursor: pointer;
        background: none;
        border: none;
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
        font-family: inherit;
        transition:
          color 0.3s,
          border-bottom-color 0.3s;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }
      .pending-back:hover {
        color: var(--ink);
        border-bottom-color: var(--border);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1>島嶼同路人</h1>
        <p class="sub">The Handshake</p>
      </div>

      <div id="authScreen">
        <div class="tabs">
          <a class="active" data-tab="login">合作愉快</a>
          <a data-tab="register">開啟合作</a>
        </div>

        <div id="loginForm">
          <div class="form-group">
            <label>Agency Code</label>
            <input type="text" id="loginId" placeholder="輸入登入代碼" autocomplete="username" />
          </div>
          <div class="form-group pw-row">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••"
              autocomplete="current-password"
            />
            <button type="button" class="pw-toggle" data-target="password">SHOW</button>
          </div>
          <button type="button" class="btn" id="btnLogin">進入後台</button>
          <p id="loginNotice" class="notice"></p>
        </div>

        <div id="registerForm" style="display: none">
          <div class="form-group">
            <label>Set Agency Code</label>
            <input
              type="text"
              id="regLoginId"
              placeholder="設定一組登入代碼"
              autocomplete="username"
            />
          </div>
          <div class="form-group pw-row">
            <label>Set Password</label>
            <input
              type="password"
              id="regPassword"
              placeholder="設定密碼"
              autocomplete="new-password"
            />
            <button type="button" class="pw-toggle" data-target="regPassword">SHOW</button>
          </div>
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="regDisplayName" placeholder="您的民宿名稱" />
          </div>
          <button type="button" class="btn" id="btnRegister">申請加入</button>
          <p class="message">申請送出後，雫旅確認後即可登入使用。</p>
          <p id="registerNotice" class="notice"></p>
        </div>

        <a href="/handshake" class="back-link">← 回到空房日曆</a>
      </div>

      <div class="pending-box" id="pendingScreen">
        <div class="pending-icon">✦</div>
        <h2 class="pending-title">申請已送出</h2>
        <p class="pending-desc">
          我們收到你的申請了。<br />
          確認夥伴關係後會通知你，<br />
          再回來登入就可以開始使用。
        </p>
        <button type="button" class="pending-back" id="btnBackToLogin">← 返回登入</button>
      </div>
    </div>

    <script src="/handshake/login/app.js"></script>
  </body>
</html>
