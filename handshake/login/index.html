<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雫旅 Drop Inn — 同業登入</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* 基礎色 */
        --bg: #f9f8f6;
        --ink: #28201a;
        --muted: #7a7065;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.3);
        --past: #d2cbc3;

        /* 日曆狀態 */
        --pending: #e8e1d7;
        --blocked: rgba(181, 171, 160, 0.4);
        --has-room: rgba(184, 121, 90, 0.15);
        --cross: #b8b0a6;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <p>建置中</p>
  </body>
</html>
