<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>雫旅｜可用日曆</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ece8e1;
        --card: #f8f5ef;
        --ink: #1a1210;
        --muted: #8a7a6a;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.25);
        --past: #c4b8a8;
        --cross: #b8b0a6;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'Noto Serif TC', serif;
        min-height: 100dvh;
        padding-bottom: 60px;
      }

      /* ── Header ── */
      .page-header {
        text-align: center;
        padding: 52px 24px 24px;
      }
      .page-header .brand {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.3em;
        margin-bottom: 12px;
      }
      .page-header h1 {
        font-family: 'Noto Serif TC', serif;
        font-size: 18px;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 0.15em;
        margin-bottom: 6px;
      }
      .page-header .subtitle {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.1em;
        line-height: 1.8;
      }

      /* ── Loading / Error ── */
      #loadingState {
        text-align: center;
        padding: 60px 24px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.1em;
      }
      #errorState {
        display: none;
        text-align: center;
        padding: 60px 24px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.1em;
      }

      /* ── Property cards ── */
      #calendarWrap {
        padding: 0 16px;
        max-width: 480px;
        margin: 0 auto;
        flex-direction: column;
        gap: 32px;
      }
      .prop-card {
        background: var(--card);
        border-radius: 16px;
        padding: 24px 20px 20px;
        border: 1px solid var(--border);
      }
      .prop-name {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.2em;
        margin-bottom: 16px;
        text-align: center;
      }

      /* ── Month nav ── */
      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .cal-nav-btn {
        background: none;
        border: none;
        font-size: 18px;
        color: var(--muted);
        cursor: pointer;
        padding: 8px 14px;
        -webkit-tap-highlight-color: transparent;
        outline: none;
        font-family: 'Cormorant Garamond', serif;
      }
      .cal-nav-btn:hover { color: var(--ink); }
      .month-label {
        text-align: center;
        line-height: 1.3;
      }
      .month-main {
        display: block;
        font-family: 'Cormorant Garamond', serif;
        font-size: 20px;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 0.05em;
      }
      .month-year {
        display: block;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.2em;
      }

      /* ── Calendar grid ── */
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .cal-cell {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 400;
        border-radius: 4px;
        position: relative;
        color: var(--ink);
      }
      .cal-cell.header {
        font-family: 'Noto Serif TC', serif;
        font-size: 0;
        color: var(--muted);
        font-weight: 300;
        aspect-ratio: auto;
        padding: 8px 0;
        min-height: auto;
      }
      .cal-cell.header::after { font-size: 11px; }
      .cal-cell.header:nth-child(1)::after { content: '日'; }
      .cal-cell.header:nth-child(2)::after { content: '一'; }
      .cal-cell.header:nth-child(3)::after { content: '二'; }
      .cal-cell.header:nth-child(4)::after { content: '三'; }
      .cal-cell.header:nth-child(5)::after { content: '四'; }
      .cal-cell.header:nth-child(6)::after { content: '五'; }
      .cal-cell.header:nth-child(7)::after { content: '六'; }
      .cal-cell.weekend { color: var(--accent); }
      .cal-cell.past { color: var(--past); opacity: 0.5; }
      .cal-cell.blocked {
        background: transparent;
        color: transparent !important;
        position: relative;
      }
      .cal-cell.blocked::before,
      .cal-cell.blocked::after {
        content: '';
        position: absolute;
        left: 50%; top: 50%;
        width: 52%; height: 1.5px;
        background: var(--cross);
        border-radius: 1px;
      }
      .cal-cell.blocked::before { transform: translate(-50%, -50%) rotate(45deg); }
      .cal-cell.blocked::after  { transform: translate(-50%, -50%) rotate(-45deg); }
      .cal-cell.available {
        background: transparent;
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 16px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
      .legend-dot {
        width: 14px; height: 14px;
        border-radius: 3px;
        border: 1px solid rgba(181,171,160,0.5);
        flex-shrink: 0;
      }
      .legend-cross {
        width: 14px; height: 14px;
        position: relative;
        flex-shrink: 0;
      }
      .legend-cross::before,
      .legend-cross::after {
        content: '';
        position: absolute;
        left: 50%; top: 50%;
        width: 10px; height: 1.5px;
        background: var(--cross);
        border-radius: 1px;
      }
      .legend-cross::before { transform: translate(-50%,-50%) rotate(45deg); }
      .legend-cross::after  { transform: translate(-50%,-50%) rotate(-45deg); }

      /* ── Notice ── */
      .notice-box {
        background: rgba(181,171,160,0.12);
        border-radius: 12px;
        padding: 16px 20px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.08em;
        line-height: 1.9;
        text-align: center;
        margin-top: 32px;
        max-width: 480px;
        margin-left: auto;
        margin-right: auto;
      }

      @media (min-width: 640px) {
        #calendarWrap { padding: 0 24px; }
      }
    </style>
  </head>
  <body>
    <div class="page-header">
      <div class="brand">DROPINN × 島嶼同路人</div>
      <h1 id="agencyTitle">— 載入中 —</h1>
      <p class="subtitle" id="agencySubtitle"></p>
    </div>

    <div id="loadingState">載入中…</div>
    <div id="errorState">找不到此日曆，請確認連結是否正確。</div>

    <div id="calendarWrap" style="display:none"></div>

    <div class="notice-box" id="noticeBox" style="display:none;">
      包棟最少兩晚 ✦ 以上日期為參考資訊<br>
      確認訂房請聯繫業者洽詢
    </div>

    <script src="/handshake/cal/app.js"></script>
  </body>
</html>
