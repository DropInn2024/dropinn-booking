<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>雫旅｜島嶼同路人</title>
    <script src="/config.public.js"></script>
    <script>
      window.FRONTEND_CONFIG =
        window.FRONTEND_CONFIG || (typeof FRONTEND_CONFIG !== 'undefined' ? FRONTEND_CONFIG : {});
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ece8e1;
        --card: #f8f5ef;
        --ink: #1a1210;
        --muted: #8a7a6a;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.25);
        --past: #c4b8a8;
        --pending: #e0d8cc;
        --cross: #b8b0a6;
        --select: rgba(210, 195, 165, 0.5);
        --blocked: rgba(181, 171, 160, 0.35);
        --has-room: rgba(184, 121, 90, 0.12);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        letter-spacing: 0.1em;
        line-height: 2;
        -webkit-font-smoothing: antialiased;
        padding-top: 64px;
        padding-bottom: 120px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
      }

      /* Top bar */
      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: rgba(248, 245, 239, 0.96);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }
      .top-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .top-brand {
        font-family: 'Cormorant Garamond', serif;
        font-size: 15px;
        font-weight: 300;
        letter-spacing: 0.25em;
        color: var(--ink);
        white-space: nowrap;
      }
      /* 舊 ID 保留給 JS，隱藏顯示 */
      .top-agency-name {
        display: none;
      }
      .top-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
      }
      .top-divider {
        width: 1px;
        height: 14px;
        background: var(--border);
      }
      .header-btn {
        background: none;
        border: none;
        font-family: 'Noto Serif TC', serif;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.15em;
        cursor: pointer;
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
        transition:
          color 0.3s,
          border-bottom-color 0.3s;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }
      .header-btn:hover {
        color: var(--ink);
        border-bottom-color: var(--border);
      }

      /* ⋯ 選單 */
      .prop-menu-btn {
        all: unset;
        box-sizing: border-box;
        font-size: 18px;
        color: var(--muted);
        cursor: pointer;
        padding: 0 4px;
        letter-spacing: 0.05em;
        line-height: 1;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.2s;
      }
      .prop-menu-btn:hover {
        color: var(--ink);
      }
      .prop-dropdown {
        position: fixed;
        top: 56px;
        right: 24px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        z-index: 300;
        display: none;
        flex-direction: column;
        min-width: 120px;
        overflow: hidden;
      }
      .prop-dropdown.show {
        display: flex;
      }
      .prop-dropdown-item {
        all: unset;
        box-sizing: border-box;
        padding: 14px 20px;
        font-family: 'Noto Serif TC', serif;
        font-size: 13px;
        letter-spacing: 0.15em;
        color: var(--ink);
        cursor: pointer;
        transition: background 0.2s;
        -webkit-tap-highlight-color: transparent;
        border-bottom: 1px solid var(--border);
      }
      .prop-dropdown-item:last-child {
        border-bottom: none;
      }
      .prop-dropdown-item:hover {
        background: rgba(181, 171, 160, 0.1);
      }
      .prop-dropdown-item.danger {
        color: var(--accent);
      }
      .prop-dropdown-agency {
        padding: 14px 20px 12px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        font-weight: 300;
        letter-spacing: 0.18em;
        color: var(--ink);
        pointer-events: none;
      }
      .prop-dropdown-divider {
        height: 1px;
        background: var(--border);
      }

      /* Overlay / Modal */
      .prop-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(249, 248, 246, 0.92);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 400;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .prop-overlay.show {
        display: flex;
      }
      .prop-modal {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 32px 28px;
        width: 90%;
        max-width: 340px;
        text-align: center;
      }
      .prop-modal-label {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        letter-spacing: 0.2em;
        color: var(--ink);
        margin-bottom: 20px;
        font-weight: 300;
      }
      .prop-modal-input {
        width: 100%;
        padding: 12px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
        letter-spacing: 0.15em;
        outline: none;
        text-align: center;
        margin-bottom: 28px;
        transition: border-bottom-color 0.3s;
      }
      .prop-modal-input:focus {
        border-bottom-color: var(--ink);
      }
      .prop-modal-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 24px;
      }
      .prop-modal-option {
        all: unset;
        box-sizing: border-box;
        padding: 12px 16px;
        font-family: 'Noto Serif TC', serif;
        font-size: 14px;
        letter-spacing: 0.1em;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s;
        -webkit-tap-highlight-color: transparent;
        text-align: left;
      }
      .prop-modal-option:hover {
        background: rgba(181, 171, 160, 0.1);
      }
      .prop-modal-option.selected {
        border-color: var(--ink);
        background: rgba(181, 171, 160, 0.12);
      }
      .prop-modal-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .prop-modal-btn {
        all: unset;
        box-sizing: border-box;
        padding: 12px 28px;
        font-family: 'Noto Serif TC', serif;
        font-size: 13px;
        letter-spacing: 0.2em;
        cursor: pointer;
        border-radius: 12px;
        transition:
          background 0.2s,
          color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .prop-modal-btn.primary {
        background: var(--ink);
        color: var(--bg);
      }
      .prop-modal-btn.primary:hover {
        background: var(--accent);
      }
      .prop-modal-btn.secondary {
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .prop-modal-btn.secondary:hover {
        border-color: var(--ink);
        color: var(--ink);
      }
      .prop-modal-btn.danger {
        background: transparent;
        color: var(--accent);
        border: 1px solid rgba(184, 121, 90, 0.4);
      }
      .prop-modal-btn.danger:hover {
        background: rgba(184, 121, 90, 0.08);
      }

      /* Select */
      select {
        width: auto;
        padding: 8px 35px 8px 10px;
        border: none;
        background: transparent;
        font-family: inherit;
        font-size: 20px;
        color: var(--ink);
        outline: none;
        text-align: center;
        letter-spacing: 0.15em;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2328201a%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
        background-repeat: no-repeat;
        background-position: right 10px center;
        background-size: 12px auto;
        -webkit-tap-highlight-color: transparent;
      }

      /* 頁首 */
      .page-header {
        text-align: center;
        padding: 40px 0 0;
        margin-bottom: 0;
      }
      h1 {
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.35em;
        margin-bottom: 0;
        color: var(--ink);
      }
      .welcome-bar {
        text-align: center;
        margin-bottom: 40px;
        padding: 16px 0 32px;
      }
      .welcome-divider {
        width: 1px;
        height: 36px;
        background: linear-gradient(to bottom, var(--muted), transparent);
        margin: 16px auto 16px;
        opacity: 0.35;
      }
      .welcome-desc {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.15em;
        font-weight: 300;
        line-height: 2;
      }

      /* 下拉 */
      .property-switch {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      /* 視圖切換 */
      .view-container {
        display: none;
        animation: fadeIn 0.4s ease;
      }
      .view-container.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 月份導覽 */
      .cal-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }
      .nav-empty {
        display: none;
      }
      .month-label {
        text-align: center;
        padding: 6px 0;
      }
      .month-main {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: var(--ink);
        display: block;
      }
      .month-year {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        letter-spacing: 0.3em;
        color: var(--muted);
        display: block;
        margin-top: 3px;
      }
      .cal-nav button,
      #youPrev,
      #youNext,
      #andPrev,
      #andNext,
      #mePrev,
      #meNext {
        all: unset;
        box-sizing: border-box;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        padding: 4px 10px;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        transition: color 0.2s;
      }
      .cal-nav button:hover,
      .cal-nav button:focus,
      #youPrev:hover,
      #youPrev:focus,
      #youNext:hover,
      #youNext:focus,
      #andPrev:hover,
      #andPrev:focus,
      #andNext:hover,
      #andNext:focus,
      #mePrev:hover,
      #mePrev:focus,
      #meNext:hover,
      #meNext:focus {
        color: var(--ink);
        outline: none;
      }

      /* 日曆格 */
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        max-width: 500px;
        margin: 0 auto 24px;
      }
      .cal-cell {
        aspect-ratio: 1/1;
        min-height: 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 400;
        font-family: 'Cormorant Garamond', serif;
        position: relative;
        transition: background 0.2s;
        border-radius: 4px;
        background: transparent;
        color: var(--ink);
      }
      .cal-cell.interactive {
        cursor: pointer;
      }
      .cal-cell.header {
        cursor: default;
        font-size: 0;
        color: var(--muted);
        font-family: 'Noto Serif TC', serif;
        font-weight: 300;
        min-height: auto;
        aspect-ratio: auto;
        padding: 10px 0;
      }
      .cal-cell.header::after {
        font-size: 12px;
      }
      #grid-you .cal-cell:nth-child(1)::after,
      #grid-and .cal-cell:nth-child(1)::after,
      #grid-me .cal-cell:nth-child(1)::after {
        content: '日';
      }
      #grid-you .cal-cell:nth-child(2)::after,
      #grid-and .cal-cell:nth-child(2)::after,
      #grid-me .cal-cell:nth-child(2)::after {
        content: '一';
      }
      #grid-you .cal-cell:nth-child(3)::after,
      #grid-and .cal-cell:nth-child(3)::after,
      #grid-me .cal-cell:nth-child(3)::after {
        content: '二';
      }
      #grid-you .cal-cell:nth-child(4)::after,
      #grid-and .cal-cell:nth-child(4)::after,
      #grid-me .cal-cell:nth-child(4)::after {
        content: '三';
      }
      #grid-you .cal-cell:nth-child(5)::after,
      #grid-and .cal-cell:nth-child(5)::after,
      #grid-me .cal-cell:nth-child(5)::after {
        content: '四';
      }
      #grid-you .cal-cell:nth-child(6)::after,
      #grid-and .cal-cell:nth-child(6)::after,
      #grid-me .cal-cell:nth-child(6)::after {
        content: '五';
      }
      #grid-you .cal-cell:nth-child(7)::after,
      #grid-and .cal-cell:nth-child(7)::after,
      #grid-me .cal-cell:nth-child(7)::after {
        content: '六';
      }
      .cal-cell.empty {
        background: transparent;
      }
      .cal-cell.past {
        color: var(--past);
        opacity: 0.6;
      }
      .weekend {
        color: var(--accent);
      }

      /* YOU：選取 / 關房 */
      .cal-cell.interactive:hover:not(.blocked):not(.past) {
        background: var(--select);
      }
      .cal-cell.selected {
        background: var(--select) !important;
        font-weight: 500;
      }
      .cal-cell.blocked {
        background: transparent;
        color: transparent !important;
        position: relative;
      }
      .cal-cell.blocked::before,
      .cal-cell.blocked::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 50%;
        height: 1.5px;
        background: var(--cross);
        border-radius: 1px;
      }
      .cal-cell.blocked::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .cal-cell.blocked::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      /* & ：部分可提供 / 全滿 */
      .cal-cell.has-room {
        background: var(--has-room);
      }
      .cal-cell.and-interactive {
        cursor: pointer;
      }
      .cal-cell.and-interactive:hover {
        opacity: 0.85;
      }
      .cal-cell.all-full {
        background: transparent;
        color: transparent !important;
        position: relative;
      }
      .cal-cell.all-full::before,
      .cal-cell.all-full::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 50%;
        height: 1.5px;
        background: var(--cross);
        border-radius: 1px;
      }
      .cal-cell.all-full::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .cal-cell.all-full::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      /* ME：雫旅洽談中 / 已訂 */
      .cal-cell.shizuku-pending {
        background: var(--pending);
        color: #5a4a3a;
      }
      .cal-cell.shizuku-booked {
        background: transparent;
        color: transparent !important;
        position: relative;
      }
      .cal-cell.shizuku-booked::before,
      .cal-cell.shizuku-booked::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 50%;
        height: 1.5px;
        background: var(--cross);
        border-radius: 1px;
      }
      .cal-cell.shizuku-booked::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .cal-cell.shizuku-booked::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      /* 圖例 */
      .legend-box {
        display: flex;
        justify-content: center;
        gap: 24px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.12em;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .l-box {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        border: 1px solid rgba(181, 171, 160, 0.4);
        flex-shrink: 0;
      }
      .l-x {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        flex-shrink: 0;
        position: relative;
      }
      .l-x::before,
      .l-x::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 8px;
        height: 1.2px;
        background: var(--cross);
        border-radius: 1px;
      }
      .l-x::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .l-x::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      /* & 視角：日期查詢工具 */
      .and-query-wrap {
        max-width: 500px;
        margin: 0 auto 24px;
        background: rgba(181, 171, 160, 0.06);
        border-radius: 12px;
        padding: 16px 20px;
      }
      .and-query-label {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .and-query-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .and-query-date {
        flex: 1;
        min-width: 140px;
        padding: 8px 10px;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 14px;
        color: var(--ink);
        outline: none;
        letter-spacing: 0.1em;
        transition: border-bottom-color 0.3s;
      }
      .and-query-date:focus {
        border-bottom-color: var(--ink);
      }
      .and-query-btn {
        all: unset;
        box-sizing: border-box;
        padding: 8px 20px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.15em;
        color: var(--muted);
        cursor: pointer;
        transition:
          color 0.2s,
          border-color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .and-query-btn:hover {
        color: var(--ink);
        border-color: var(--ink);
      }
      .and-query-result {
        margin-top: 14px;
      }
      .and-query-result-title {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .and-result-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid rgba(181, 171, 160, 0.15);
        font-size: 13px;
      }
      .and-result-item:last-child {
        border-bottom: none;
      }
      .and-result-available {
        color: var(--ink);
      }
      .and-result-blocked {
        color: var(--muted);
        text-decoration: line-through;
      }
      .and-result-tag {
        font-size: 10px;
        letter-spacing: 0.12em;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .tag-available {
        background: rgba(184, 121, 90, 0.1);
        color: var(--accent);
      }
      .tag-blocked {
        background: rgba(181, 171, 160, 0.12);
        color: var(--muted);
      }

      /* & 視角：日期 Popover */
      .and-day-popover {
        display: none;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 100px;
        max-width: 320px;
        width: calc(100% - 32px);
        background: var(--card);
        border-radius: 16px;
        padding: 16px 18px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        z-index: 150;
      }
      .and-day-popover.show {
        display: block;
      }
      .and-popover-title {
        font-size: 13px;
        color: var(--ink);

        var dropdownNameEl = document.getElementById('propDropdownAgency');
        if (dropdownNameEl) dropdownNameEl.textContent = agencyName;

        var currentYear = new Date().getFullYear();
        var currentMonth = new Date().getMonth();
        var currentView = 'you';
        var selectedDates = new Set();

        // 資料快取
        var youProperties = [];
        var youCurrentPropId = '';
        var youBlocksCache = {}; // propId → Set<dateStr>
        var andData = null; // { properties, blocksByProperty }
        var meData = null; // { booked: Set, pending: Set }

        // ── API 工具 ──────────────────────────────────────────
        function apiPost(action, extra) {
          var body = Object.assign({ action: action, token: TOKEN }, extra || {});
          return fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(body),
          }).then(function (r) {
            return r.json();
          });
        }

        // ── Toast ─────────────────────────────────────────────
        function showToast(msg, dur) {
          var t = document.getElementById('toast');
          t.textContent = msg;
          t.classList.add('show');
          setTimeout(function () {
            t.classList.remove('show');
          }, dur || 2500);
        }

        // ── 日期工具 ──────────────────────────────────────────
        function dateStr(y, m, d) {
          return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        }
        function today0() {
          var t = new Date();
          t.setHours(0, 0, 0, 0);
          return t;
        }

        // ── 更新月份標題 ──────────────────────────────────────
        function updateTitles() {
          var m = MONTHS[currentMonth],
            y = currentYear;
          ['you', 'and', 'me'].forEach(function (v) {
            var mm = document.getElementById(v + 'MonthMain');
            var my = document.getElementById(v + 'MonthYear');
            if (mm) mm.textContent = m;
            if (my) my.textContent = String(y);
          });
        }

        // ── 顯示/隱藏 loading ─────────────────────────────────
        function showLoading(view, on) {
          var l = document.getElementById(view + 'Loading');
          var g = document.getElementById('grid-' + view);
          if (l) l.style.display = on ? 'flex' : 'none';
          if (g) g.style.display = on ? 'none' : 'grid';
        }

        // ============================================================
        // YOU 視角
        // ============================================================
        function initYou() {
          showLoading('you', true);
          apiPost('agencyGetProperties')
            .then(function (data) {
              if (!data.success) {
                showToast('無法載入棟別');
                showLoading('you', false);
                return;
              }
              youProperties = data.properties || [];
              var sel = document.getElementById('propertySelect');
              sel.innerHTML = '';
              youProperties.forEach(function (p) {
                var opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.name;
                sel.appendChild(opt);
              });
              if (youProperties.length) {
                youCurrentPropId = youProperties[0].id;
                sel.value = youCurrentPropId;
                loadYouBlocks(youCurrentPropId);
              } else {
                showLoading('you', false);
              }
            })
            .catch(function () {
              showToast('連線失敗');
              showLoading('you', false);
            });
        }

        function loadYouBlocks(propId) {
          showLoading('you', true);
          apiPost('agencyGetBlocks', { propertyId: propId })
            .then(function (data) {
              if (!data.success) {
                showToast('無法載入房況');
                showLoading('you', false);
                return;
              }
              youBlocksCache[propId] = new Set(data.blocks || []);
              showLoading('you', false);
              renderYou();
            })
            .catch(function () {
              showToast('連線失敗');
              showLoading('you', false);
            });
        }

        function renderYou() {
          var grid = document.getElementById('grid-you');
          if (!grid) return;
          var blocks = youBlocksCache[youCurrentPropId] || new Set();
          var y = currentYear,
            m = currentMonth;
          var firstDay = new Date(y, m, 1).getDay();
          var daysInMonth = new Date(y, m + 1, 0).getDate();
          var todayObj = today0();
          var html = '';

          WEEKDAYS.forEach(function (d) {
            var we = d === 'SUN' || d === 'SAT' ? ' weekend' : '';
            html += '<div class="cal-cell header' + we + '">' + d + '</div>';
          });
          for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
          for (var d = 1; d <= daysInMonth; d++) {
            var dateObj = new Date(y, m, d);
            var ds = dateStr(y, m, d);
            var we = dateObj.getDay() === 0 || dateObj.getDay() === 6 ? ' weekend' : '';
            var cls = 'cal-cell' + we;
            var onclick = '';
            if (dateObj < todayObj) {
              cls += ' past';
            } else {
              cls += ' interactive';
              if (selectedDates.has(ds)) cls += ' selected';
              if (blocks.has(ds)) cls += ' blocked';
              onclick = 'onclick="window._youToggle(this,\'' + ds + '\')"';
            }
            html +=
              '<div class="' + cls + '" data-date="' + ds + '" ' + onclick + '>' + d + '</div>';
          }
          grid.innerHTML = html;
        }

        window._youToggle = function (el, ds) {
          if (currentView !== 'you') return;
          var blocks = youBlocksCache[youCurrentPropId] || new Set();
          if (blocks.has(ds)) return; // 已關房的不能選
          if (selectedDates.has(ds)) {
            selectedDates.delete(ds);
            el.classList.remove('selected');
          } else {
            selectedDates.add(ds);
            el.classList.add('selected');
          }
          updateFab();
        };

        document.getElementById('propertySelect').addEventListener('change', function () {
          youCurrentPropId = this.value;
          selectedDates.clear();
          updateFab();
          if (!youBlocksCache[youCurrentPropId]) loadYouBlocks(youCurrentPropId);
          else renderYou();
        });

        // FAB
        function updateFab() {
          var fab = document.getElementById('selectionFab');
          document.getElementById('selCount').textContent = selectedDates.size;
          fab.classList.toggle('show', selectedDates.size > 0 && currentView === 'you');
        }
        function clearSel() {
          selectedDates.clear();
          document.querySelectorAll('#grid-you .cal-cell.selected').forEach(function (el) {
            el.classList.remove('selected');
          });
          updateFab();
        }
        document.getElementById('btnClearSel').addEventListener('click', clearSel);

        document.getElementById('btnBlock').addEventListener('click', function () {
          if (!selectedDates.size || !youCurrentPropId) return;
          var dates = Array.from(selectedDates);
          var done = 0,
            total = dates.length;
          dates.forEach(function (ds) {
            apiPost('agencySetBlock', { propertyId: youCurrentPropId, date: ds }).then(
              function (data) {
                if (data.success) {
                  if (!youBlocksCache[youCurrentPropId])
                    youBlocksCache[youCurrentPropId] = new Set();
                  youBlocksCache[youCurrentPropId].add(ds);
                }
                done++;
                if (done === total) {
                  clearSel();
                  renderYou();
                  showToast('已設為無法提供');
                }
              }
            );
          });
        });

        document.getElementById('btnRestore').addEventListener('click', function () {
          if (!selectedDates.size || !youCurrentPropId) return;
          var dates = Array.from(selectedDates);
          var done = 0,
            total = dates.length;
          dates.forEach(function (ds) {
            // agencySetBlock 是 toggle，再打一次就是恢復
            apiPost('agencySetBlock', { propertyId: youCurrentPropId, date: ds }).then(
              function (data) {
                if (data.success) {
                  if (youBlocksCache[youCurrentPropId]) youBlocksCache[youCurrentPropId].delete(ds);
                }
                done++;
                if (done === total) {
                  clearSel();
                  renderYou();
                  showToast('已恢復空房');
                }
              }
            );
          });
        });

        // ============================================================
        // & 視角
        // ============================================================
        function initAnd() {
          if (andData) {
            renderAnd();
            return;
          }
          showLoading('and', true);
          apiPost('agencyGetPartnerCalendar')
            .then(function (data) {
              if (!data.success) {
                showToast('無法載入同業資料');
                showLoading('and', false);
                return;
              }
              andData = data;
              showLoading('and', false);
              renderAnd();
            })
            .catch(function () {
              showToast('連線失敗');
              showLoading('and', false);
            });
        }

        function renderAnd() {
          var grid = document.getElementById('grid-and');
          if (!grid || !andData) return;
          var y = currentYear,
            m = currentMonth;
          var firstDay = new Date(y, m, 1).getDay();
          var daysInMonth = new Date(y, m + 1, 0).getDate();
          var todayObj = today0();
          var props = andData.properties || [];
          var byProp = andData.blocksByProperty || {};
          var html = '';

          WEEKDAYS.forEach(function (d) {
            var we = d === 'SUN' || d === 'SAT' ? ' weekend' : '';
            html += '<div class="cal-cell header' + we + '">' + d + '</div>';
          });
          for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
          for (var d = 1; d <= daysInMonth; d++) {
            var dateObj = new Date(y, m, d);
            var ds = dateStr(y, m, d);
            var we = dateObj.getDay() === 0 || dateObj.getDay() === 6 ? ' weekend' : '';
            var cls = 'cal-cell' + we;
            var onclick = '';
            if (dateObj < todayObj) {
              cls += ' past';
            } else if (props.length === 0) {
              cls += ' and-interactive';
              onclick = 'onclick="window._andShowDay(\'' + ds + '\')"';
            } else {
              var availCount = 0,
                blockedCount = 0;
              props.forEach(function (p) {
                var blocks = byProp[String(p.propertyId)] || [];
                if (blocks.indexOf(ds) !== -1) blockedCount++;
                else availCount++;
              });
              cls += ' and-interactive';
              if (blockedCount === props.length) cls += ' all-full';
              else if (availCount > 0 && blockedCount > 0) cls += ' has-room';
              onclick = 'onclick="window._andShowDay(\'' + ds + '\')"';
            }
            html +=
              '<div class="' + cls + '" data-date="' + ds + '" ' + onclick + '>' + d + '</div>';
          }
          grid.innerHTML = html;
        }

        window._andShowDay = function (ds) {
          if (!andData) return;
          var props = andData.properties || [];
          var byProp = andData.blocksByProperty || {};
          var available = [],
            blocked = [];
          props.forEach(function (p) {
            var blocks = byProp[String(p.propertyId)] || [];
            var info = { agency: p.agencyName, property: p.propertyName };
            if (blocks.indexOf(ds) !== -1) blocked.push(info);
            else available.push(info);
          });

          var pop = document.getElementById('andDayPopover');
          var title = document.getElementById('andPopoverTitle');
          var list = document.getElementById('andPopoverList');
          title.textContent = ds + '　可提供包棟';
          var html = '';
          if (available.length) {
            available.forEach(function (i) {
              html +=
                '<div class="and-popover-item"><span class="and-result-available">✅ ' +
                i.agency +
                '・' +
                i.property +
                '</span><span class="and-result-tag tag-available">可包棟</span></div>';
            });
          } else if (!props.length) {
            html =
              '<div style="color:var(--muted);font-size:12px;padding:8px 0">尚無可見同業資料</div>';
          } else {
            html =
              '<div style="color:var(--muted);font-size:12px;padding:8px 0">此日期無可包棟民宿</div>';
          }
          list.innerHTML = html;
          pop.classList.add('show');
        };

        document.getElementById('btnCloseAndPopover').addEventListener('click', function () {
          document.getElementById('andDayPopover').classList.remove('show');
        });

        // 查詢包棟 overlay
        document.getElementById('btnAndQueryOpen').addEventListener('click', function () {
          document.getElementById('propDropdown').classList.remove('show');
          document.getElementById('andQueryResult').style.display = 'none';
          document.getElementById('andQueryDate').value = '';
          document.getElementById('andQueryOverlay').classList.add('show');
        });
        document.getElementById('btnAndQueryClose').addEventListener('click', function () {
          document.getElementById('andQueryOverlay').classList.remove('show');
        });

        // & 日期查詢工具
        document.getElementById('btnAndQuery').addEventListener('click', function () {
          var ds = document.getElementById('andQueryDate').value;
          if (!ds) {
            showToast('請選擇日期');
            return;
          }
          if (!andData) {
            showToast('資料載入中，請稍後再試');
            return;
          }
          var props = andData.properties || [];
          var byProp = andData.blocksByProperty || {};
          var available = [];
          props.forEach(function (p) {
            var blocks = byProp[String(p.propertyId)] || [];
            if (blocks.indexOf(ds) === -1) available.push(p.agencyName + '・' + p.propertyName);
          });

          var resultDiv = document.getElementById('andQueryResult');
          var titleEl = document.getElementById('andQueryTitle');
          var listEl = document.getElementById('andQueryList');
          titleEl.textContent = ds + '　可包棟';
          var html = '';
          if (available.length) {
            available.forEach(function (n) {
              html +=
                '<div class="and-result-item"><span class="and-result-available">✅ ' +
                n +
                '</span><span class="and-result-tag tag-available">可包棟</span></div>';
            });
          } else if (!props.length) {
            html = '<div style="color:var(--muted);font-size:13px;padding:8px 0">尚無可見同業資料</div>';
          } else {
            html = '<div style="color:var(--muted);font-size:13px;padding:8px 0">此日期無可包棟民宿</div>';
          }
          listEl.innerHTML = html;
          resultDiv.style.display = 'block';
        });

        // ============================================================
        // ME 視角
        // ============================================================
        function initMe() {
          if (meData) {
            renderMe();
            return;
          }
          showLoading('me', true);
          apiPost('agencyGetPartnerCalendar')
            .then(function (data) {
              if (!data.success) {
                showToast('無法載入雫旅資料');
                showLoading('me', false);
                return;
              }
              meData = {
                booked: new Set(data.shizukuBooked || []),
                pending: new Set(data.shizukuPending || []),
              };
              showLoading('me', false);
              renderMe();
            })
            .catch(function () {
              showToast('連線失敗');
              showLoading('me', false);
            });
        }

        function renderMe() {
          var grid = document.getElementById('grid-me');
          if (!grid || !meData) return;
          var y = currentYear,
            m = currentMonth;
          var firstDay = new Date(y, m, 1).getDay();
          var daysInMonth = new Date(y, m + 1, 0).getDate();
          var todayObj = today0();
          var html = '';

          WEEKDAYS.forEach(function (d) {
            var we = d === 'SUN' || d === 'SAT' ? ' weekend' : '';
            html += '<div class="cal-cell header' + we + '">' + d + '</div>';
          });
          for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
          for (var d = 1; d <= daysInMonth; d++) {
            var dateObj = new Date(y, m, d);
            var ds = dateStr(y, m, d);
            var we = dateObj.getDay() === 0 || dateObj.getDay() === 6 ? ' weekend' : '';
            var cls = 'cal-cell' + we;
            if (dateObj < todayObj) cls += ' past';
            else if (meData.booked.has(ds)) cls += ' shizuku-booked';
            else if (meData.pending.has(ds)) cls += ' shizuku-pending';
            html += '<div class="' + cls + '" data-date="' + ds + '">' + d + '</div>';
          }
          grid.innerHTML = html;
        }

        // ============================================================
        // 月份導航
        // ============================================================
        function prevMonth() {
          currentMonth--;
          if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
          }
          clearSel();
          updateTitles();
          renderCurrent();
        }
        function nextMonth() {
          currentMonth++;
          if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
          }
          clearSel();
          updateTitles();
          renderCurrent();
        }
        function renderCurrent() {
          if (currentView === 'you') renderYou();
          else if (currentView === 'and') renderAnd();
          else renderMe();
        }
        ['you', 'and', 'me'].forEach(function (v) {
          document.getElementById(v + 'Prev').addEventListener('click', prevMonth);
          document.getElementById(v + 'Next').addEventListener('click', nextMonth);
        });

        // ============================================================
        // 視角切換
        // ============================================================
        function switchView(viewId) {
          currentView = viewId;
          ['you', 'and', 'me'].forEach(function (v) {
            document.getElementById('view-' + v).classList.toggle('active', v === viewId);
            var nb = v === 'and' ? 'navAnd' : 'nav' + v.charAt(0).toUpperCase() + v.slice(1);
            document.getElementById(nb).classList.toggle('active', v === viewId);
          });
          clearSel();
          document.getElementById('andDayPopover').classList.remove('show');
          if (viewId === 'and' && !andData) initAnd();
          else if (viewId === 'me' && !meData) initMe();
          else renderCurrent();
        }
        document.getElementById('navYou').addEventListener('click', function () {
          switchView('you');
        });
        document.getElementById('navAnd').addEventListener('click', function () {
          switchView('and');
        });
        document.getElementById('navMe').addEventListener('click', function () {
          switchView('me');
        });

        // ============================================================
        // ⋯ 棟別管理
        // ============================================================
        var dropdown = document.getElementById('propDropdown');
        var overlay = document.getElementById('propOverlay');
        var modalLabel = document.getElementById('propModalLabel');
        var modalInput = document.getElementById('propModalInput');
        var modalList = document.getElementById('propModalList');
        var btnConfirm = document.getElementById('btnModalConfirm');
        var btnCancel = document.getElementById('btnModalCancel');
        var currentModalMode = '',
          selectedPropId = '';

        document.getElementById('btnPropMenu').addEventListener('click', function (e) {
          e.stopPropagation();
          dropdown.classList.toggle('show');
        });
        document.addEventListener('click', function () {
          dropdown.classList.remove('show');
        });

        function openModal(mode) {
          dropdown.classList.remove('show');
          currentModalMode = mode;
          selectedPropId = '';
          modalInput.style.display = 'none';
          modalList.innerHTML = '';
          modalList.style.display = 'none';
          btnConfirm.className = 'prop-modal-btn primary';
          btnConfirm.textContent = '確認';

          if (mode === 'add') {
            modalLabel.textContent = '新增民宿棟別';
            modalInput.value = '';
            modalInput.placeholder = '例如：海風 A 棟';
            modalInput.style.display = 'block';
            setTimeout(function () {
              modalInput.focus();
            }, 100);
          } else if (mode === 'rename') {
            modalLabel.textContent = '選擇要修改的棟別';
            buildPropList(function (id, name) {
              selectedPropId = id;
              modalLabel.textContent = '新的名稱';
              modalList.style.display = 'none';
              modalInput.value = name;
              modalInput.style.display = 'block';
              setTimeout(function () {
                modalInput.focus();
              }, 100);
            });
          } else if (mode === 'delete') {
            modalLabel.textContent = '選擇要刪除的棟別';
            btnConfirm.className = 'prop-modal-btn danger';
            btnConfirm.textContent = '刪除';
            buildPropList(function (id) {
              selectedPropId = id;
            });
          }
          overlay.classList.add('show');
        }

        function buildPropList(onSelect) {
          modalList.innerHTML = '';
          modalList.style.display = 'flex';
          youProperties.forEach(function (p) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'prop-modal-option';
            btn.textContent = p.name;
            btn.addEventListener('click', function () {
              document.querySelectorAll('.prop-modal-option').forEach(function (b) {
                b.classList.remove('selected');
              });
              btn.classList.add('selected');
              onSelect(p.id, p.name);
            });
            modalList.appendChild(btn);
          });
        }

        function closeModal() {
          overlay.classList.remove('show');
          currentModalMode = '';
          selectedPropId = '';
        }
        document.getElementById('btnAddProp').addEventListener('click', function () {
          openModal('add');
        });
        document.getElementById('btnRenameProp').addEventListener('click', function () {
          openModal('rename');
        });
        document.getElementById('btnDeleteProp').addEventListener('click', function () {
          openModal('delete');
        });
        btnCancel.addEventListener('click', closeModal);
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeModal();
        });

        btnConfirm.addEventListener('click', function () {
          if (currentModalMode === 'add') {
            var name = modalInput.value.trim();
            if (!name) {
              modalInput.focus();
              return;
            }
            btnConfirm.disabled = true;
            apiPost('agencyAddProperty', { propertyName: name })
              .then(function (data) {
                btnConfirm.disabled = false;
                if (!data.success) {
                  showToast(data.message || '新增失敗');
                  return;
                }
                showToast('已新增「' + name + '」');
                closeModal();
                // 重新載入棟別清單
                youBlocksCache = {};
                initYou();
              })
              .catch(function () {
                btnConfirm.disabled = false;
                showToast('連線失敗');
              });
          } else if (currentModalMode === 'rename') {
            if (!selectedPropId) return;
            var name = modalInput.value.trim();
            if (!name) {
              modalInput.focus();
              return;
            }
            btnConfirm.disabled = true;
            apiPost('agencyUpdateProperty', { propertyId: selectedPropId, propertyName: name })
              .then(function (data) {
                btnConfirm.disabled = false;
                if (!data.success) {
                  showToast(data.message || '修改失敗');
                  return;
                }
                showToast('已更新名稱');
                closeModal();
                youBlocksCache = {};
                initYou();
              })
              .catch(function () {
                btnConfirm.disabled = false;
                showToast('連線失敗');
              });
          } else if (currentModalMode === 'delete') {
            if (!selectedPropId) return;
            btnConfirm.disabled = true;
            // agencyDeleteProperty（GAS 已有此函式，但 doPost 路由需確認）
            apiPost('agencyDeleteProperty', { propertyId: selectedPropId })
              .then(function (data) {
                btnConfirm.disabled = false;
                if (!data.success) {
                  showToast(data.message || '刪除失敗');
                  return;
                }
                showToast('已刪除');
                closeModal();
                youBlocksCache = {};
                initYou();
              })
              .catch(function () {
                btnConfirm.disabled = false;
                showToast('連線失敗');
              });
          }
        });

        modalInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') btnConfirm.click();
          if (e.key === 'Escape') closeModal();
        });

        // ============================================================
        // Info Modal / 登出
        // ============================================================
        document.getElementById('btnInfoMenu').addEventListener('click', function () {
          document.getElementById('propDropdown').classList.remove('show');
          document.getElementById('infoModal').classList.add('show');
        });
        document.getElementById('btnCloseModal').addEventListener('click', function () {
          document.getElementById('infoModal').classList.remove('show');
        });
        function doLogout() {
          sessionStorage.removeItem('agency_token');
          sessionStorage.removeItem('agency_api_url');
          sessionStorage.removeItem('agency_name');
          window.location.replace('/handshake/login');
        }
        document.getElementById('btnLogoutMenu').addEventListener('click', doLogout);

        // ============================================================
        // 初始化
        // ============================================================
        updateTitles();
        initYou();
      })();
    </script>
  </body>
</html>
