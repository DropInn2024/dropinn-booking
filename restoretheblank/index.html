<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>雫旅｜房務</title>
    <script src="/config.public.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ece8e1;
        --card: #f8f5ef;
        --ink: #1a1210;
        --muted: #8a7a6a;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.3);
        --checkout: rgba(164, 181, 197, 0.70);
        --checkin:  rgba(219, 217, 210, 0.90);
        --both:     rgba(230, 124, 115, 0.60);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        letter-spacing: 0.08em;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
      }

      /* ── 登入畫面 ──────────────────────────────────────────────── */
      .login-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 1000;
        padding: 40px 24px;
      }
      .login-screen.hidden { display: none; }
      .login-logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.4em;
        margin-bottom: 8px;
        color: var(--ink);
      }
      .login-sub {
        font-size: 11px;
        letter-spacing: 0.35em;
        color: var(--muted);
        margin-bottom: 48px;
      }
      .login-input {
        width: 100%;
        max-width: 280px;
        padding: 14px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
        letter-spacing: 0.15em;
        outline: none;
        text-align: center;
        margin-bottom: 32px;
        transition: border-bottom-color 0.3s;
      }
      .login-input:focus { border-bottom-color: var(--ink); }
      .login-btn {
        all: unset;
        box-sizing: border-box;
        padding: 14px 48px;
        background: var(--ink);
        color: var(--bg);
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 0.25em;
        cursor: pointer;
        border-radius: 12px;
        transition: background 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .login-btn:hover { background: var(--accent); }
      .login-err {
        margin-top: 16px;
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.1em;
      }

      /* ── 主畫面 ────────────────────────────────────────────────── */
      .app { display: none; }
      .app.show { display: block; }
      #dayDetail.show { display: flex !important; }

      .top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(248, 245, 239, 0.96);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
      }
      .top-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        letter-spacing: 0.25em;
        color: var(--ink);
      }
      .top-logout {
        all: unset;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 1px solid transparent;
        transition: color 0.2s, border-bottom-color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .top-logout:hover { color: var(--ink); border-bottom-color: var(--border); }

      .container { max-width: 640px; margin: 0 auto; padding: 24px 20px 80px; }

      /* ── 月份導航 ──────────────────────────────────────────────── */
      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .cal-nav-btn {
        all: unset;
        box-sizing: border-box;
        font-size: 20px;
        color: var(--muted);
        cursor: pointer;
        transition: color 0.2s;
        -webkit-tap-highlight-color: transparent;
        padding: 8px 12px;
      }
      .cal-nav-btn:hover { color: var(--ink); }
      .month-title { text-align: center; }
      .month-main {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: var(--ink);
        display: block;
      }
      .month-year {
        font-size: 12px;
        letter-spacing: 0.3em;
        color: var(--muted);
        display: block;
        margin-top: 2px;
      }

      /* ── 日曆格 ────────────────────────────────────────────────── */
      .cal-header-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        margin-bottom: 3px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }
      .cal-header-cell {
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--muted);
        padding: 6px 0;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        max-width: 600px;
        margin: 0 auto 16px;
      }
      .cal-cell {
        border-radius: 6px;
        padding: 7px 4px 6px;
        min-height: 60px;
        position: relative;
        background: rgba(255,255,255,0.4);
        border: 1px solid transparent;
        transition: background 0.15s;
        overflow: hidden;
      }
      .cal-cell.empty { background: transparent; border-color: transparent; }
      .cal-cell.past  { opacity: 0.42; }
      .cal-cell.has-checkout { background: var(--checkout); border-color: rgba(164,181,197,0.90); }
      .cal-cell.has-checkin  { background: var(--checkin);  border-color: rgba(160,155,145,0.55); }
      .cal-cell.has-both     { background: var(--both);     border-color: rgba(230,124,115,0.85); }
      .cal-cell[data-action="showDayDetail"] { cursor: pointer; }
      .cal-cell[data-action="showDayDetail"]:active { filter: brightness(0.93); }
      .cal-day-num {
        font-family: 'Cormorant Garamond', serif;
        font-size: 17px;
        font-weight: 300;
        color: var(--ink);
        display: block;
        margin-bottom: 3px;
        line-height: 1;
      }
      .cal-cell.weekend .cal-day-num { color: var(--accent); }
      .cal-event {
        font-size: 10px;
        letter-spacing: 0.04em;
        line-height: 1.45;
        margin-bottom: 1px;
        white-space: nowrap;
      }
      .ev-checkout { color: #1a2e40; font-weight: 600; }
      .ev-checkin  { color: #3a3028; font-weight: 600; }
      /* 星號備注提示 */
      .ev-star {
        color: var(--accent);
        font-size: 9px;
        margin-left: 2px;
        vertical-align: top;
      }

      /* ── 圖例（日曆下方）──────────────────────────────────────── */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 20px;
        justify-content: center;
        margin-bottom: 32px;
        font-size: 11px;
        color: var(--ink);
        letter-spacing: 0.08em;
      }
      .legend-item { display: flex; align-items: center; gap: 6px; }
      .l-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

      /* ── 今日詳情區塊 ───────────────────────────────────────────── */
      .today-section {
        background: var(--card);
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 24px;
        border: 1px solid var(--border);
      }
      .today-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .today-msg {
        font-size: 13px;
        color: var(--muted);
        padding: 8px 0 4px;
        letter-spacing: 0.06em;
        line-height: 1.9;
      }
      .order-card {
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        font-size: 13px;
      }
      .order-card:last-child { border-bottom: none; }
      .order-card-title { font-weight: 500; color: var(--ink); margin-bottom: 4px; }
      .order-card-detail { color: var(--muted); font-size: 12px; line-height: 1.8; }
      .tag {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 99px;
        font-size: 10px;
        letter-spacing: 0.1em;
        margin-left: 6px;
      }
      .tag-checkout { background: var(--checkout); color: #1a2e40; font-weight: 600; }
      .tag-checkin  { background: var(--checkin);  color: #3a3028; font-weight: 600; }

      /* ── loading ────────────────────────────────────────────────── */
      .loading-wrap {
        display: flex; align-items: center; justify-content: center;
        padding: 60px; color: var(--muted); font-size: 13px; letter-spacing: 0.15em;
      }

      /* ── 手機 ────────────────────────────────────────────────────── */
      @media (max-width: 480px) {
        .cal-cell { min-height: 54px; padding: 6px 3px 5px; }
        .cal-day-num { font-size: 15px; }
        .cal-event { font-size: 9px; }
        .container { padding: 16px 12px 60px; }
      }
    </style>
  </head>
  <body>
    <!-- ── 登入畫面 ──────────────────────────────────────────────── -->
    <div class="login-screen" id="loginScreen">
      <div class="login-logo">雫旅</div>
      <div class="login-sub">RESTORE THE BLANK</div>
      <input type="password" class="login-input" id="loginPwd" placeholder="請輸入房務密碼" autocomplete="current-password" />
      <button class="login-btn" id="loginBtn">進入</button>
      <div class="login-err" id="loginErr"></div>
    </div>

    <!-- ── 主畫面 ────────────────────────────────────────────────── -->
    <div class="app" id="app">
      <div class="top-bar">
        <span class="top-title">房務日曆</span>
        <button class="top-logout" id="logoutBtn">登出</button>
      </div>

      <div class="container">
        <!-- 今日摘要 -->
        <div class="today-section" id="todaySection">
          <div class="today-title" id="todayTitle">今日</div>
          <div id="todayContent"><div class="loading-wrap">載入中…</div></div>
        </div>

        <!-- 月份導航 -->
        <div class="cal-nav">
          <button class="cal-nav-btn" id="prevBtn">←</button>
          <div class="month-title">
            <span class="month-main" id="monthMain">—</span>
            <span class="month-year" id="monthYear">—</span>
          </div>
          <button class="cal-nav-btn" id="nextBtn">→</button>
        </div>

        <!-- 日曆 -->
        <div class="cal-header-row" id="calHeader"></div>
        <div id="calLoading" class="loading-wrap">載入中…</div>
        <div class="cal-grid" id="calGrid" style="display:none"></div>

        <!-- 圖例（日曆下方）-->
        <div class="legend" id="calLegend">
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--checkout);border:1px solid rgba(164,181,197,0.90)"></div>
            退房
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--checkin);border:1px solid rgba(160,155,145,0.55)"></div>
            入住
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--both);border:1px solid rgba(230,124,115,0.85)"></div>
            退房＋入住
          </div>
          <div class="legend-item">
            <span style="color:var(--accent);font-size:12px;line-height:1;">★</span>
            備注（點日期查看）
          </div>
        </div>
      </div>
    </div>

    <!-- 日期詳情彈窗 -->
    <div id="dayDetail" style="display:none;position:fixed;inset:0;background:rgba(26,18,16,0.35);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:24px;">
      <div style="background:var(--card);border-radius:16px;border:1px solid var(--border);padding:28px 24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;position:relative;">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;">
          <span id="dayDetailDate" style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:0.2em;"></span>
          <button id="dayDetailClose" type="button" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:0;">✕</button>
        </div>
        <div id="dayDetailBody"></div>
      </div>
    </div>

    <script src="/restoretheblank/app.js"></script>
  </body>
</html>
