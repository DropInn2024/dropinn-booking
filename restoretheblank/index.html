<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>雫旅｜房務</title>
    <script src="/config.public.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ece8e1;
        --card: #f8f5ef;
        --ink: #1a1210;
        --muted: #8a7a6a;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.3);
        --checkout: rgba(184, 121, 90, 0.35);
        --checkin: rgba(90, 150, 184, 0.28);
        --both: rgba(145, 100, 60, 0.40);
        --pending: rgba(210, 200, 185, 0.85);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        letter-spacing: 0.08em;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
      }

      /* ── 登入畫面 ──────────────────────────────────────────────── */
      .login-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 1000;
        padding: 40px 24px;
      }
      .login-screen.hidden { display: none; }
      .login-logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.4em;
        margin-bottom: 8px;
        color: var(--ink);
      }
      .login-sub {
        font-size: 11px;
        letter-spacing: 0.35em;
        color: var(--muted);
        margin-bottom: 48px;
      }
      .login-input {
        width: 100%;
        max-width: 280px;
        padding: 14px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
        letter-spacing: 0.15em;
        outline: none;
        text-align: center;
        margin-bottom: 32px;
        transition: border-bottom-color 0.3s;
      }
      .login-input:focus { border-bottom-color: var(--ink); }
      .login-btn {
        all: unset;
        box-sizing: border-box;
        padding: 14px 48px;
        background: var(--ink);
        color: var(--bg);
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 0.25em;
        cursor: pointer;
        border-radius: 12px;
        transition: background 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .login-btn:hover { background: var(--accent); }
      .login-err {
        margin-top: 16px;
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.1em;
      }

      /* ── 主畫面 ────────────────────────────────────────────────── */
      .app { display: none; }
      .app.show { display: block; }
      #dayDetail.show { display: flex !important; }

      .top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(248, 245, 239, 0.96);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
      }
      .top-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        letter-spacing: 0.25em;
        color: var(--ink);
      }
      .top-logout {
        all: unset;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 1px solid transparent;
        transition: color 0.2s, border-bottom-color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .top-logout:hover { color: var(--ink); border-bottom-color: var(--border); }

      .container { max-width: 640px; margin: 0 auto; padding: 24px 20px 80px; }

      /* ── 月份導航 ──────────────────────────────────────────────── */
      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }
      .cal-nav-btn {
        all: unset;
        box-sizing: border-box;
        font-size: 18px;
        color: var(--muted);
        cursor: pointer;
        transition: color 0.2s;
        -webkit-tap-highlight-color: transparent;
        padding: 8px;
      }
      .cal-nav-btn:hover { color: var(--ink); }
      .month-title {
        text-align: center;
        min-width: 160px;
      }
      .month-main {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: var(--ink);
        display: block;
      }
      .month-year {
        font-size: 12px;
        letter-spacing: 0.3em;
        color: var(--muted);
        display: block;
        margin-top: 2px;
      }

      /* ── 日曆格 ────────────────────────────────────────────────── */
      .cal-header-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        margin-bottom: 3px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }
      .cal-header-cell {
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--muted);
        padding: 6px 0;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        max-width: 600px;
        margin: 0 auto 32px;
      }
      .cal-cell {
        border-radius: 6px;
        padding: 8px 4px;
        min-height: 64px;
        position: relative;
        background: rgba(255,255,255,0.4);
        border: 1px solid transparent;
        transition: background 0.15s;
      }
      .cal-cell.empty { background: transparent; border-color: transparent; }
      .cal-cell.past { opacity: 0.45; }
      .cal-cell.has-checkout { background: var(--checkout); border-color: rgba(184,121,90,0.55); }
      .cal-cell.has-checkin  { background: var(--checkin);  border-color: rgba(90,150,184,0.50); }
      .cal-cell.has-both     { background: var(--both);     border-color: rgba(145,100,60,0.60); }
      .cal-cell.has-pending  { border-left: 3px solid rgba(181,171,160,0.6); }
      .cal-day-num {
        font-family: 'Cormorant Garamond', serif;
        font-size: 18px;
        font-weight: 300;
        color: var(--ink);
        display: block;
        margin-bottom: 4px;
      }
      .cal-cell.weekend .cal-day-num { color: var(--accent); }
      .cal-event {
        font-size: 10px;
        letter-spacing: 0.05em;
        line-height: 1.5;
        color: var(--ink);
        margin-bottom: 2px;
      }
      .ev-checkout { color: #8a4a20; font-weight: 500; }
      .ev-checkin  { color: #1a5a7a; font-weight: 500; }
      .ev-pending  { color: #5a4a3a; }
      .ev-note {
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        display: block;
        margin-top: 3px;
        padding: 1px 4px;
        background: rgba(184, 121, 90, 0.1);
        border-radius: 3px;
        border-left: 2px solid var(--accent);
      }
      /* 手機版：備注縮成小圓點，顏色提示有備注 */
      .has-note .cal-day-num::after {
        content: '';
        display: inline-block;
        width: 5px;
        height: 5px;
        background: var(--accent);
        border-radius: 50%;
        margin-left: 3px;
        vertical-align: middle;
        flex-shrink: 0;
      }

      /* ── 圖例 ──────────────────────────────────────────────────── */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        margin-bottom: 32px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
      .legend-item { display: flex; align-items: center; gap: 6px; }
      .l-swatch {
        width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
      }

      /* ── 今日詳情區塊 ───────────────────────────────────────────── */
      .today-section {
        background: var(--card);
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 24px;
        border: 1px solid var(--border);
      }
      .today-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .order-card {
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        font-size: 13px;
      }
      .order-card:last-child { border-bottom: none; }
      .order-card-title {
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .order-card-detail { color: var(--muted); font-size: 12px; line-height: 1.8; }
      .tag {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 99px;
        font-size: 10px;
        letter-spacing: 0.1em;
        margin-left: 6px;
      }
      .tag-checkout { background: var(--checkout); color: #7a3a10; font-weight: 500; }
      .tag-checkin  { background: var(--checkin);  color: #0a4a6a; font-weight: 500; }
      .tag-pending  { background: rgba(181,171,160,0.25); color: #4a3a2a; }

      /* ── loading ────────────────────────────────────────────────── */
      .loading-wrap {
        display: flex; align-items: center; justify-content: center;
        padding: 60px; color: var(--muted); font-size: 13px; letter-spacing: 0.15em;
      }

      /* ── 手機 ────────────────────────────────────────────────────── */
      @media (max-width: 480px) {
        .cal-cell { min-height: 54px; padding: 6px 3px; }
        .cal-day-num { font-size: 15px; }
        .cal-event { font-size: 9px; }
        /* ev-note 改為小圓點提示，點擊日格可在今日摘要區看到備注內容 */
        .ev-note { font-size: 8px; white-space: normal; line-height: 1.3; }
        .container { padding: 16px 12px 60px; }
      }
    </style>
  </head>
  <body>
    <!-- ── 登入畫面 ──────────────────────────────────────────────── -->
    <div class="login-screen" id="loginScreen">
      <div class="login-logo">雫旅</div>
      <div class="login-sub">RESTORE THE BLANK</div>
      <input type="password" class="login-input" id="loginPwd" placeholder="請輸入房務密碼" autocomplete="current-password" />
      <button class="login-btn" id="loginBtn">進入</button>
      <div class="login-err" id="loginErr"></div>
    </div>

    <!-- ── 主畫面 ────────────────────────────────────────────────── -->
    <div class="app" id="app">
      <div class="top-bar">
        <span class="top-title">房務日曆</span>
        <button class="top-logout" id="logoutBtn">登出</button>
      </div>

      <div class="container">
        <!-- 今日摘要 -->
        <div class="today-section" id="todaySection">
          <div class="today-title" id="todayTitle">今日</div>
          <div id="todayContent"><div class="loading-wrap">載入中…</div></div>
        </div>

        <!-- 月份導航 -->
        <div class="cal-nav">
          <button class="cal-nav-btn" id="prevBtn">←</button>
          <div class="month-title">
            <span class="month-main" id="monthMain">—</span>
            <span class="month-year" id="monthYear">—</span>
          </div>
          <button class="cal-nav-btn" id="nextBtn">→</button>
        </div>

        <!-- 圖例 -->
        <div class="legend">
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--checkout);border:1px solid rgba(184,121,90,0.3)"></div>
            退房（清潔）
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--checkin);border:1px solid rgba(90,150,184,0.25)"></div>
            入住
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--both);border:1px solid rgba(145,100,60,0.35)"></div>
            退房＋入住
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:rgba(181,171,160,0.1);border-left:3px solid rgba(181,171,160,0.6)"></div>
            洽談中
          </div>
        </div>

        <!-- 日曆 -->
        <div class="cal-header-row" id="calHeader"></div>
        <div id="calLoading" class="loading-wrap">載入中…</div>
        <div class="cal-grid" id="calGrid" style="display:none"></div>
      </div>
    </div>

    <!-- 日期詳情彈窗 -->
    <div id="dayDetail" style="display:none;position:fixed;inset:0;background:rgba(26,18,16,0.35);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:24px;">
      <div style="background:var(--card);border-radius:16px;border:1px solid var(--border);padding:28px 24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;position:relative;">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;">
          <span id="dayDetailDate" style="font-size:18px;font-weight:300;letter-spacing:0.2em;"></span>
          <button id="dayDetailClose" type="button" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:0;">✕</button>
        </div>
        <div id="dayDetailBody"></div>
      </div>
    </div>

    <script src="/restoretheblank/app.js"></script>
  </body>
</html>
