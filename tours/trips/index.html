<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行程 ｜ 雫旅 Drop Inn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<style>
.filter-wrap{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.cat-select{min-width:180px;padding:9px 32px 9px 16px;border-radius:12px;border:1px solid rgba(181,171,160,.45);background-color:transparent;
  background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b5f56' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 12px center;appearance:none;-webkit-appearance:none;
  font-family:'Noto Serif TC',serif;color:var(--ink);font-size:13px;letter-spacing:.1em;text-align:center;cursor:pointer}
.cat-select:focus{outline:none;border-color:var(--accent)}
.cat-head{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.18em;color:#4a3f35;margin:28px 0 14px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* 分類 chips（快速切換）*/
.cat-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:760px}
.cat-chip{font-family:'Noto Serif TC',serif;font-size:13px;padding:7px 16px;border-radius:99px;border:1px solid rgba(181,171,160,.45);background:var(--card);color:var(--ink);cursor:pointer;letter-spacing:.06em;transition:.2s;white-space:nowrap}
.cat-chip:hover{border-color:var(--accent)}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* 分類入口磚 */
.cat-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.cat-tile{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 20px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:7px;min-height:118px}
.cat-tile:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 28px rgba(106,90,69,.1)}
.cat-tile h3{font-family:'Noto Serif TC',serif;font-size:18px;margin:0;color:var(--ink);font-weight:500}
.cat-tile .cnt{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--accent);letter-spacing:.12em}
.cat-tile .d{font-size:12px;color:var(--muted);line-height:1.65;margin-top:auto}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--accent);cursor:pointer;margin-bottom:16px;letter-spacing:.06em}
.back-link:hover{text-decoration:underline}
/* detail overlay */
.t-ov{position:fixed;inset:0;background:rgba(26,18,16,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.t-ov.on{display:flex}
.t-card{background:var(--bg);border-radius:18px;max-width:520px;width:100%;max-height:86vh;overflow-y:auto;padding:26px;box-shadow:0 20px 60px rgba(74,63,53,.25)}
.t-card h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;letter-spacing:.03em;margin-bottom:4px}
.t-card .vd{font-size:12px;color:var(--muted);letter-spacing:.1em;margin-bottom:16px}
.t-kv{display:flex;gap:12px;padding:8px 0;border-bottom:1px dotted var(--border);font-size:13px}
.t-kv .k{width:72px;flex-shrink:0;color:var(--muted);font-size:12px}
.t-price{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--accent);font-variant-numeric:tabular-nums}
.t-desc{font-size:14px;line-height:1.85;margin:14px 0;white-space:pre-wrap}
</style>
</head>
<body>

<header class="app-header">
  <div class="inner">
    <a href="../" class="app-brand"><span class="brand-name">雫旅</span><span class="brand-sub">DROP INN TOURS</span></a>
    <nav class="app-nav"><a href="../">首頁</a><a href="./" class="active">行程</a><a href="../rental/">租車</a><a href="../ferry/">船票</a></nav>
  </div>
</header>

<main class="page" style="padding-top:32px;">
  <div class="filter-wrap">
    <div class="cat-chips" id="catChips"></div>
  </div>

  <div id="grid"></div>
  <div id="loading" style="text-align:center;padding:60px;color:var(--muted);">載入行程中…</div>
</main>

<!-- 詳情 -->
<div class="t-ov" id="ov">
  <div class="t-card" id="ovCard"></div>
</div>

<script src="../assets/trips-page.js?v=20260607"></script>
</body>
</html>
