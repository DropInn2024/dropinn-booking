<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>雫旅 Drift · 澎湖私旅指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500&display=swap" rel="stylesheet" />
<style>
/* ─── Reset & Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F8F5F0;
  --ink:      #2C2620;
  --accent:   #C4896A;
  --accent-dim: #d9a98a;
  --card-bg:  #FFFFFF;
  --ink-2:    #6B5B50;
  --ink-3:    #A8978D;
  --shadow-sm: 0 2px 10px rgba(44,38,32,.09);
  --shadow-md: 0 6px 28px rgba(44,38,32,.14);
  --shadow-lg: 0 12px 48px rgba(44,38,32,.22);
  --radius-card: 20px;
  --radius-pill: 999px;
  --transition: 0.26s cubic-bezier(.4,0,.2,1);
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  font-family: 'Noto Serif TC', 'Georgia', serif;
  background: var(--bg);
  color: var(--ink);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  user-select: none;
}

/* ─── Gradient Placeholders ───────────────────────────────────────────── */
.grad-1 {
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,210,180,.55) 0%, transparent 60%),
    radial-gradient(ellipse at 75% 70%, rgba(196,137,106,.45) 0%, transparent 55%),
    linear-gradient(145deg, #e8c4a0 0%, #c4896a 45%, #8b5e42 100%);
}
.grad-2 {
  background:
    radial-gradient(ellipse at 25% 30%, rgba(180,210,240,.5) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 65%, rgba(96,150,200,.4) 0%, transparent 55%),
    linear-gradient(145deg, #b8d4e8 0%, #6096c8 45%, #2d5f8a 100%);
}
.grad-3 {
  background:
    radial-gradient(ellipse at 35% 25%, rgba(180,230,200,.5) 0%, transparent 60%),
    radial-gradient(ellipse at 65% 70%, rgba(80,160,110,.4) 0%, transparent 55%),
    linear-gradient(145deg, #b4e0c4 0%, #50a06e 45%, #2e6645 100%);
}
.grad-4 {
  background:
    radial-gradient(ellipse at 40% 20%, rgba(255,235,200,.55) 0%, transparent 60%),
    radial-gradient(ellipse at 68% 72%, rgba(200,155,80,.45) 0%, transparent 55%),
    linear-gradient(145deg, #f0ddb8 0%, #c89b50 45%, #7a5c28 100%);
}

/* ─── Card pseudo depth effect ────────────────────────────────────────── */
.card-img::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(255,255,255,.28) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 85%, rgba(0,0,0,.18) 0%, transparent 50%);
  border-radius: inherit;
  pointer-events: none;
}

/* ─── Header ───────────────────────────────────────────────────────────── */
#header {
  flex-shrink: 0;
  height: auto;
  min-height: 80px;
  padding: 14px 20px 10px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 50;
}

.header-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}

.brand {
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 3px;
}

.brand-sub {
  font-size: 9.5px;
  font-weight: 300;
  letter-spacing: .22em;
  color: var(--ink-3);
  text-transform: uppercase;
}

.brand-main {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: .04em;
  color: var(--ink);
  line-height: 1.1;
}

/* View switcher */
.view-switcher {
  display: flex;
  background: rgba(44,38,32,.07);
  border-radius: var(--radius-pill);
  padding: 3px;
  gap: 2px;
  flex-shrink: 0;
}

.view-btn {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 11.5px;
  font-weight: 400;
  color: var(--ink-2);
  padding: 5px 12px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  letter-spacing: .02em;
}

.view-btn.active {
  background: var(--card-bg);
  color: var(--ink);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}

/* Progress dots */
#progress-dots {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 2px 0;
  min-height: 10px;
}

.dot {
  height: 6px;
  border-radius: var(--radius-pill);
  background: rgba(44,38,32,.15);
  transition: all .35s cubic-bezier(.4,0,.2,1);
  flex-shrink: 0;
}

.dot.current {
  width: 22px !important;
  background: var(--accent);
}

.dot.past {
  background: rgba(196,137,106,.4);
}

/* ─── Main Area ────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  padding: 8px 20px 0;
}

/* Card Stack Container */
#card-stack {
  flex: 1;
  position: relative;
  /* overflow: visible intentionally */
}

/* ─── Cards ────────────────────────────────────────────────────────────── */
.drift-card {
  position: absolute;
  inset: 0;
  background: var(--card-bg);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-origin: 50% 90%;
  will-change: transform;
  cursor: grab;
}

.drift-card:active { cursor: grabbing; }

.drift-card.transitioning {
  transition: transform .26s cubic-bezier(.4,0,.2,1);
}

.drift-card.fly-left {
  transition: transform .42s cubic-bezier(.4,0,.8,1), opacity .42s ease !important;
  transform: translateX(-120vw) rotate(-22deg) !important;
  opacity: 0 !important;
}

.drift-card.fly-down {
  transition: transform .40s cubic-bezier(.4,0,.8,1), opacity .40s ease !important;
  transform: translateY(120vh) scale(0.35) !important;
  opacity: 0 !important;
}

/* Card image area */
.card-img {
  height: clamp(160px, 44vw, 220px);
  position: relative;
  flex-shrink: 0;
  border-radius: var(--radius-card) var(--radius-card) 0 0;
  overflow: hidden;
}

.card-img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top,
    rgba(20,12,6,.72) 0%,
    rgba(20,12,6,.18) 45%,
    transparent 100%);
  pointer-events: none;
}

/* Badges */
.badge-row {
  position: absolute;
  bottom: 10px;
  left: 12px;
  right: 12px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 8px;
  pointer-events: none;
}

.badge {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .02em;
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  line-height: 1.4;
}

.badge-recommender {
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: rgba(255,255,255,.95);
  border: 1px solid rgba(255,255,255,.22);
}

.badge-rating {
  background: rgba(20,12,6,.72);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  border: 1px solid rgba(255,255,255,.12);
  letter-spacing: .03em;
}

/* Drag hint overlays */
.drag-hint {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-card);
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s ease;
}

.drag-hint-nope {
  background: linear-gradient(135deg, rgba(220,60,60,.35) 0%, transparent 60%);
  justify-content: flex-start;
  align-items: flex-start;
  padding: 20px;
}

.drag-hint-add {
  background: linear-gradient(to top, rgba(196,137,106,.45) 0%, transparent 60%);
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 24px;
}

.hint-label {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  border: 2px solid;
}

.drag-hint-nope .hint-label {
  color: #e03c3c;
  border-color: #e03c3c;
  background: rgba(255,255,255,.85);
}

.drag-hint-add .hint-label {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(255,255,255,.85);
}

/* Card body */
.card-body {
  flex: 1;
  padding: 16px 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}

.card-name {
  font-size: 21px;
  font-weight: 500;
  letter-spacing: .02em;
  color: var(--ink);
  line-height: 1.2;
}

.tags-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.tag {
  font-size: 11px;
  font-weight: 400;
  color: var(--accent);
  background: rgba(196,137,106,.1);
  border: 1px solid rgba(196,137,106,.25);
  padding: 3px 9px;
  border-radius: var(--radius-pill);
  letter-spacing: .02em;
  line-height: 1.4;
}

.card-desc {
  font-size: 13px;
  font-weight: 300;
  color: var(--ink-2);
  line-height: 1.85;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 3;
  overflow: hidden;
  letter-spacing: .02em;
}

/* ─── Action Bar ───────────────────────────────────────────────────────── */
#action-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 14px 0;
  flex-shrink: 0;
}

.action-btn {
  border: none;
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}

.action-btn:active {
  transform: scale(.88) !important;
}

.btn-nope {
  width: 52px;
  height: 52px;
  background: var(--card-bg);
  box-shadow: 0 4px 18px rgba(44,38,32,.14), 0 1px 4px rgba(44,38,32,.08);
}

.btn-nope:hover { transform: scale(1.07); box-shadow: 0 6px 24px rgba(44,38,32,.18); }

.btn-detail {
  width: 44px;
  height: 44px;
  background: var(--card-bg);
  box-shadow: 0 3px 14px rgba(44,38,32,.12), 0 1px 3px rgba(44,38,32,.07);
  font-size: 18px;
}

.btn-detail:hover { transform: scale(1.07); }

.btn-add {
  width: 66px;
  height: 66px;
  background: var(--accent);
  box-shadow: 0 8px 28px rgba(196,137,106,.50), 0 3px 10px rgba(196,137,106,.30);
  font-size: 26px;
}

.btn-add:hover { transform: scale(1.07); box-shadow: 0 10px 36px rgba(196,137,106,.60); }

/* ─── Empty State ──────────────────────────────────────────────────────── */
#empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  padding-bottom: 48px;
}

.empty-icon {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

.empty-text {
  font-size: 15px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: .04em;
}

/* ─── Drawer ───────────────────────────────────────────────────────────── */
#drawer {
  flex-shrink: 0;
  background: var(--card-bg);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(44,38,32,.10);
  padding: 14px 24px calc(14px + env(safe-area-inset-bottom, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  z-index: 40;
  min-height: 72px;
}

.drawer-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.drawer-bag-icon {
  font-size: 22px;
  line-height: 1;
}

.drawer-label {
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: .02em;
}

.count-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11.5px;
  font-weight: 500;
  min-width: 22px;
  height: 22px;
  border-radius: var(--radius-pill);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
  letter-spacing: .03em;
  transition: var(--transition);
}

.count-suffix {
  font-size: 12px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: .02em;
}

@keyframes badgePop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.45); }
  70%  { transform: scale(.88); }
  100% { transform: scale(1); }
}

.badge-pop {
  animation: badgePop .38s cubic-bezier(.34,1.56,.64,1);
}

.drawer-cta {
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .04em;
  padding: 11px 22px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}

.drawer-cta.disabled {
  background: rgba(44,38,32,.08);
  color: var(--ink-3);
  pointer-events: none;
}

.drawer-cta.enabled {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 18px rgba(196,137,106,.42);
}

.drawer-cta.enabled:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(196,137,106,.52);
}

.drawer-cta.enabled:active {
  transform: translateY(0) scale(.96);
}

/* ─── Modal ────────────────────────────────────────────────────────────── */
#modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20,12,6,.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .32s ease;
}

#modal-backdrop.visible {
  opacity: 1;
  pointer-events: auto;
}

#modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 101;
  background: var(--card-bg);
  border-radius: 22px 22px 0 0;
  max-height: 93dvh;
  transform: translateY(100%);
  transition: transform .38s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#modal.open {
  transform: translateY(0);
}

.modal-handle-bar {
  width: 38px;
  height: 4px;
  background: rgba(44,38,32,.15);
  border-radius: var(--radius-pill);
  margin: 12px auto 0;
  flex-shrink: 0;
}

.modal-close-btn {
  position: absolute;
  top: 14px;
  right: 18px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(44,38,32,.07);
  border-radius: 50%;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-2);
  transition: var(--transition);
  z-index: 5;
  -webkit-tap-highlight-color: transparent;
}

.modal-close-btn:hover { background: rgba(44,38,32,.13); }

.modal-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.modal-hero {
  height: 230px;
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
}

.modal-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top,
    rgba(20,12,6,.80) 0%,
    rgba(20,12,6,.25) 50%,
    transparent 100%);
  pointer-events: none;
}

.modal-hero-name {
  position: absolute;
  bottom: 16px;
  left: 20px;
  right: 20px;
  font-size: 24px;
  font-weight: 500;
  color: #fff;
  letter-spacing: .03em;
  text-shadow: 0 2px 12px rgba(0,0,0,.4);
  line-height: 1.2;
}

/* Article section */
.modal-article {
  padding: 22px 22px 0;
}

.article-byline {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.byline-chip {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .05em;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  background: rgba(196,137,106,.14);
  color: var(--accent);
  border: 1px solid rgba(196,137,106,.3);
}

.byline-tagline {
  font-size: 12.5px;
  font-weight: 300;
  font-style: italic;
  color: var(--ink-3);
  letter-spacing: .03em;
}

.article-rule {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, var(--accent), rgba(196,137,106,.1));
  margin-bottom: 18px;
  border: none;
}

.article-body {
  font-size: 15px;
  font-weight: 300;
  color: var(--ink);
  line-height: 2.15;
  letter-spacing: .03em;
}

.article-placeholder {
  background: rgba(44,38,32,.04);
  border: 1.5px dashed rgba(44,38,32,.12);
  border-radius: 12px;
  padding: 24px 20px;
  text-align: center;
}

.article-placeholder-icon {
  font-size: 28px;
  margin-bottom: 8px;
  display: block;
  opacity: .5;
}

.article-placeholder-text {
  font-size: 13px;
  font-weight: 300;
  color: var(--ink-3);
  letter-spacing: .04em;
}

/* Tags in modal */
.modal-tags {
  padding: 18px 22px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* Editor panel */
.modal-editor-panel {
  margin: 22px 22px 28px;
  background: rgba(248,245,240,.8);
  border: 1.5px solid rgba(196,137,106,.2);
  border-radius: 16px;
  padding: 18px 18px 16px;
}

.editor-panel-title {
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-3);
  letter-spacing: .06em;
  margin-bottom: 12px;
}

.editor-panel-btns {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
}

.editor-btn {
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: .02em;
  padding: 9px 16px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: var(--transition);
  border: none;
  -webkit-tap-highlight-color: transparent;
}

.editor-btn-outline {
  background: var(--card-bg);
  color: var(--ink);
  border: 1.5px solid rgba(44,38,32,.18);
}

.editor-btn-outline:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.editor-btn-accent {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 3px 14px rgba(196,137,106,.38);
}

.editor-btn-accent:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 18px rgba(196,137,106,.48);
}

/* View permission rules */
body[data-view="guest"] .modal-editor-panel {
  display: none;
}

/* ─── Responsive fine-tuning ───────────────────────────────────────────── */
@media (min-height: 800px) {
  .card-img {
    height: clamp(180px, 46vw, 240px);
  }
}

@media (max-height: 680px) {
  #header { min-height: 70px; padding: 10px 20px 8px; }
  .card-img { height: 140px; }
  .card-body { padding: 12px 16px 10px; gap: 6px; }
  .card-name { font-size: 18px; }
}
</style>
</head>
<body data-view="owner">

<!-- ─── Header ──────────────────────────────────────────────────────────── -->
<header id="header">
  <div class="header-top">
    <div class="brand">
      <span class="brand-sub">Drop Inn · Penghu</span>
      <span class="brand-main">雫旅 Drift</span>
    </div>
    <div class="view-switcher" id="view-switcher">
      <button class="view-btn active" data-view="owner" onclick="setView('owner')">主理人</button>
      <button class="view-btn" data-view="friend" onclick="setView('friend')">好友 A</button>
      <button class="view-btn" data-view="guest" onclick="setView('guest')">客人</button>
    </div>
  </div>
  <div id="progress-dots"></div>
</header>

<!-- ─── Main ────────────────────────────────────────────────────────────── -->
<main id="main">
  <div id="card-stack"></div>

  <!-- Empty state -->
  <div id="empty-state">
    <div class="empty-icon">🌊</div>
    <div class="empty-text">所有地點已瀏覽完畢</div>
  </div>

  <!-- Action bar -->
  <div id="action-bar">
    <button class="action-btn btn-nope" onclick="doSwipeLeft()" title="略過">✕</button>
    <button class="action-btn btn-detail" onclick="doOpenDetail()" title="深度閱讀">📖</button>
    <button class="action-btn btn-add" onclick="doAddToItinerary()" title="加入行程">👇</button>
  </div>
</main>

<!-- ─── Drawer ───────────────────────────────────────────────────────────── -->
<div id="drawer">
  <div class="drawer-left">
    <span class="drawer-bag-icon">💼</span>
    <span class="drawer-label">行程袋</span>
    <span class="count-badge" id="count-badge">0</span>
    <span class="count-suffix">個</span>
  </div>
  <button class="drawer-cta disabled" id="drawer-cta" onclick="doStartDrift()">
    開始漂流
  </button>
</div>

<!-- ─── Modal ────────────────────────────────────────────────────────────── -->
<div id="modal-backdrop" onclick="closeModal()"></div>
<div id="modal" role="dialog" aria-modal="true" aria-label="景點詳情">
  <div class="modal-handle-bar"></div>
  <button class="modal-close-btn" onclick="closeModal()" aria-label="關閉">✕</button>
  <div class="modal-scroll" id="modal-scroll">
    <!-- filled by JS -->
  </div>
</div>

<script>
// ─── Data ──────────────────────────────────────────────────────────────────
const SPOTS = [
  {
    id: 1,
    name: '藍冉 Yukkuri',
    tags: ['#馬公市區', '#日式刨冰', '#私藏必訪'],
    rating: 4.8,
    desc: '澎湖日式刨冰的天花板。連續三年報到的私藏名單，老闆對味道層次極其精準，布丁也必點。',
    recommender: '主理人',
    gradClass: 'grad-1',
    fullDesc: '第一次踏進藍冉，是個颱風過後的午後，空氣中還帶著鹹鹹的海味。那碗覆盆子荔枝刨冰端上來的瞬間，我知道這一趟澎湖沒有白來。老闆選食材像在選詩句——每一層都有用意，每一口都有餘韻。三年後我還是會回來，帶著不同的人，說著同樣那句話：這就是我說的那個地方。連布丁都做得這麼認真，這家店沒有在敷衍任何一件事。',
    lat: 23.5685, lng: 119.5808
  },
  {
    id: 2,
    name: '鐘記燒餅',
    tags: ['#馬公市區', '#排隊早餐', '#干貝蔥蛋'],
    rating: 4.5,
    desc: '干貝蔥蛋夾油條，那才是澎湖人的靈魂早餐。旺季排隊人潮極多，想吃請設鬧鐘早起！',
    recommender: '好友 A',
    gradClass: 'grad-4',
    fullDesc: null,
    lat: 23.5680, lng: 119.5835
  },
  {
    id: 3,
    name: '新村小吃部',
    tags: ['#湖西鄉', '#在地海鮮', '#民宿附近'],
    rating: 4.6,
    desc: '在地人私藏，離民宿很近！雞油飯是必點，鮮魚湯喝了會想哭那種好，需要提前預約。',
    recommender: '主理人',
    gradClass: 'grad-3',
    fullDesc: null,
    lat: 23.5880, lng: 119.6500
  },
  {
    id: 4,
    name: '880咖啡',
    tags: ['#馬公市區', '#職人咖啡', '#溫暖好客'],
    rating: 4.3,
    desc: '老闆 Ted 用熱情將陌生人聚成好友。有時能遇上手作野酵麵包或流心巴斯克蛋糕，請毫不猶豫點起來。',
    recommender: '好友 A',
    gradClass: 'grad-2',
    fullDesc: null,
    lat: 23.5650, lng: 119.5930
  }
];

// ─── State ─────────────────────────────────────────────────────────────────
let queue      = [];   // indices into SPOTS of remaining cards
let itinerary  = [];   // SPOTS ids added
let modalSpot  = null;
let isDragging = false;

// ─── Init ──────────────────────────────────────────────────────────────────
function init() {
  queue = SPOTS.map((_, i) => i);
  itinerary = [];
  renderProgress();
  renderCards();
  updateDrawer();
}

// ─── Progress dots ─────────────────────────────────────────────────────────
function renderProgress() {
  const container = document.getElementById('progress-dots');
  container.innerHTML = '';
  const total = SPOTS.length;

  SPOTS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';

    const queuePos = queue.indexOf(i);
    if (queuePos === 0) {
      // current (top of queue)
      dot.classList.add('current');
      dot.style.width = '22px';
    } else if (queuePos > 0) {
      // upcoming
      dot.style.width = '6px';
    } else {
      // already swiped
      dot.classList.add('past');
      dot.style.width = '6px';
    }

    container.appendChild(dot);
  });
}

// ─── Render Cards ──────────────────────────────────────────────────────────
function renderCards() {
  const stack = document.getElementById('card-stack');
  const actionBar = document.getElementById('action-bar');
  const emptyState = document.getElementById('empty-state');
  stack.innerHTML = '';

  if (queue.length === 0) {
    stack.style.display = 'none';
    actionBar.style.display = 'none';
    emptyState.style.display = 'flex';
    return;
  }

  stack.style.display = 'block';
  actionBar.style.display = 'flex';
  emptyState.style.display = 'none';

  // Render back cards first (z-index lower), front last (z-index higher)
  const visible = Math.min(queue.length, 4);
  for (let pos = visible - 1; pos >= 0; pos--) {
    const spotIdx = queue[pos];
    const card = buildCard(SPOTS[spotIdx], pos);
    stack.appendChild(card);
  }

  // Attach drag to top card only
  if (queue.length > 0) {
    const topCard = stack.querySelector('[data-pos="0"]');
    if (topCard) setupDrag(topCard);
  }
}

// ─── Build Card ────────────────────────────────────────────────────────────
function buildCard(spot, pos) {
  const card = document.createElement('div');
  card.className = 'drift-card';
  card.dataset.pos = pos;
  card.dataset.id = spot.id;

  // Position transforms
  const transforms = [
    'scale(1) translateY(0)',
    'scale(0.95) translateY(14px)',
    'scale(0.90) translateY(28px)',
    'scale(0.85) translateY(42px)',
  ];
  const zIndexes = [10, 9, 8, 7];
  const opacities = [1, 1, 1, 0];

  card.style.transform = transforms[pos] || transforms[3];
  card.style.zIndex = zIndexes[pos] || 7;
  card.style.opacity = opacities[pos] !== undefined ? opacities[pos] : 0;

  // Stars
  const fullStars = Math.floor(spot.rating);
  const hasHalf = (spot.rating - fullStars) >= 0.5;
  let starStr = '⭐'.repeat(fullStars);
  if (hasHalf) starStr += '✦';

  card.innerHTML = `
    <div class="card-img ${spot.gradClass}">
      <div class="card-img-overlay"></div>
      <div class="badge-row">
        <span class="badge badge-recommender">✍️ ${spot.recommender}推薦</span>
        <span class="badge badge-rating">${starStr} ${spot.rating}</span>
      </div>
      <div class="drag-hint drag-hint-nope" data-hint="nope">
        <span class="hint-label">跳過</span>
      </div>
      <div class="drag-hint drag-hint-add" data-hint="add">
        <span class="hint-label">加入行程 👇</span>
      </div>
    </div>
    <div class="card-body">
      <div class="card-name">${spot.name}</div>
      <div class="tags-row">
        ${spot.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <p class="card-desc">${spot.desc}</p>
    </div>
  `;

  return card;
}

// ─── Setup Drag ────────────────────────────────────────────────────────────
function setupDrag(card) {
  let startX = 0, startY = 0;
  let curX = 0, curY = 0;

  card.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    isDragging = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    card.style.transition = 'none';
  }, { passive: true });

  card.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    e.preventDefault();

    curX = e.touches[0].clientX - startX;
    curY = e.touches[0].clientY - startY;

    const rotate = curX * 0.06;
    card.style.transform = `translate(${curX}px, ${curY}px) rotate(${rotate}deg)`;

    // Show/hide drag hint overlays
    const nopeHint = card.querySelector('[data-hint="nope"]');
    const addHint  = card.querySelector('[data-hint="add"]');

    const nopeOpacity = curX < 0 ? Math.min(Math.abs(curX) / 80, 1) : 0;
    const addOpacity  = (curY > 0 && Math.abs(curY) > Math.abs(curX))
      ? Math.min(curY / 80, 1)
      : 0;

    if (nopeHint) nopeHint.style.opacity = nopeOpacity;
    if (addHint)  addHint.style.opacity  = addOpacity;

  }, { passive: false });

  card.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;

    const dx = curX;
    const dy = curY;

    if (dx < -80) {
      flyOut(card, 'left');
    } else if (dy > 80 && Math.abs(dy) > Math.abs(dx)) {
      flyOut(card, 'down');
    } else {
      // Snap back
      card.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1)';
      card.style.transform = 'scale(1) translateY(0)';

      const nopeHint = card.querySelector('[data-hint="nope"]');
      const addHint  = card.querySelector('[data-hint="add"]');
      if (nopeHint) nopeHint.style.opacity = 0;
      if (addHint)  addHint.style.opacity  = 0;
    }
  }, { passive: true });

  // Mouse fallback for desktop
  let mouseDown = false;
  let mouseStartX = 0, mouseStartY = 0;

  card.addEventListener('mousedown', (e) => {
    mouseDown = true;
    mouseStartX = e.clientX;
    mouseStartY = e.clientY;
    card.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    curX = e.clientX - mouseStartX;
    curY = e.clientY - mouseStartY;
    const rotate = curX * 0.06;
    card.style.transform = `translate(${curX}px, ${curY}px) rotate(${rotate}deg)`;

    const nopeHint = card.querySelector('[data-hint="nope"]');
    const addHint  = card.querySelector('[data-hint="add"]');
    if (nopeHint) nopeHint.style.opacity = curX < 0 ? Math.min(Math.abs(curX) / 80, 1) : 0;
    if (addHint)  addHint.style.opacity  = (curY > 0 && Math.abs(curY) > Math.abs(curX)) ? Math.min(curY / 80, 1) : 0;
  });

  document.addEventListener('mouseup', (e) => {
    if (!mouseDown) return;
    mouseDown = false;

    const dx = curX;
    const dy = curY;

    if (dx < -80) {
      flyOut(card, 'left');
    } else if (dy > 80 && Math.abs(dy) > Math.abs(dx)) {
      flyOut(card, 'down');
    } else {
      card.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1)';
      card.style.transform = 'scale(1) translateY(0)';
      const nopeHint = card.querySelector('[data-hint="nope"]');
      const addHint  = card.querySelector('[data-hint="add"]');
      if (nopeHint) nopeHint.style.opacity = 0;
      if (addHint)  addHint.style.opacity  = 0;
    }
  });
}

// ─── Fly Out ───────────────────────────────────────────────────────────────
function flyOut(card, direction) {
  const spotId = parseInt(card.dataset.id, 10);

  if (direction === 'left') {
    card.classList.add('fly-left');
  } else {
    card.classList.add('fly-down');
    // Add to itinerary on down-swipe
    addToItinerary(spotId);
  }

  setTimeout(() => {
    // Remove from queue
    const idx = SPOTS.findIndex(s => s.id === spotId);
    queue = queue.filter(i => i !== idx);
    renderProgress();
    renderCards();
    updateDrawer();
  }, 440);
}

// ─── Swipe Left ───────────────────────────────────────────────────────────
function doSwipeLeft() {
  if (queue.length === 0) return;
  const stack = document.getElementById('card-stack');
  const topCard = stack.querySelector('[data-pos="0"]');
  if (topCard) flyOut(topCard, 'left');
}

// ─── Add to Itinerary ──────────────────────────────────────────────────────
function addToItinerary(spotId) {
  if (!itinerary.includes(spotId)) {
    itinerary.push(spotId);
  }
}

function doAddToItinerary() {
  if (queue.length === 0) return;
  const stack = document.getElementById('card-stack');
  const topCard = stack.querySelector('[data-pos="0"]');
  if (topCard) flyOut(topCard, 'down');
}

// ─── Open Detail ──────────────────────────────────────────────────────────
function doOpenDetail() {
  if (queue.length === 0) return;
  const topIdx = queue[0];
  openModal(SPOTS[topIdx]);
}

// ─── Update Drawer ────────────────────────────────────────────────────────
function updateDrawer() {
  const badge = document.getElementById('count-badge');
  const cta   = document.getElementById('drawer-cta');
  const count = itinerary.length;

  const prev = parseInt(badge.textContent, 10) || 0;
  badge.textContent = count;

  if (count !== prev) {
    badge.classList.remove('badge-pop');
    void badge.offsetWidth; // reflow
    badge.classList.add('badge-pop');
    badge.addEventListener('animationend', () => badge.classList.remove('badge-pop'), { once: true });
  }

  if (count === 0) {
    cta.className = 'drawer-cta disabled';
    cta.textContent = '開始漂流';
  } else {
    cta.className = 'drawer-cta enabled';
    cta.textContent = `導航 ${count} 個路線`;
  }
}

// ─── Start Drift ──────────────────────────────────────────────────────────
function doStartDrift() {
  if (itinerary.length === 0) return;

  const spots = itinerary
    .map(id => SPOTS.find(s => s.id === id))
    .filter(Boolean);

  if (spots.length === 1) {
    const s = spots[0];
    window.open(`https://maps.google.com/?q=${s.lat},${s.lng}`, '_blank');
    return;
  }

  // Build waypoints URL
  const origin = `${spots[0].lat},${spots[0].lng}`;
  const dest   = `${spots[spots.length - 1].lat},${spots[spots.length - 1].lng}`;
  const waypoints = spots.slice(1, -1).map(s => `${s.lat},${s.lng}`).join('|');
  let url = `https://www.google.com/maps/dir/${origin}`;
  if (waypoints) url += `/${waypoints.replace('|', '/')}`;
  url += `/${dest}`;

  window.open(url, '_blank');
}

// ─── Modal ─────────────────────────────────────────────────────────────────
function openModal(spot) {
  modalSpot = spot;
  const scroll = document.getElementById('modal-scroll');

  const fullDescHTML = spot.fullDesc
    ? `<p class="article-body">${spot.fullDesc}</p>`
    : `<div class="article-placeholder">
         <span class="article-placeholder-icon">✍️</span>
         <p class="article-placeholder-text">整理中，敬請期待</p>
       </div>`;

  const taglineMap = {
    '主理人': '「三年後我還是會回來」',
    '好友 A': '「一定要去的在地味道」',
  };
  const tagline = taglineMap[spot.recommender] || '「澎湖私藏景點」';

  scroll.innerHTML = `
    <div class="modal-hero ${spot.gradClass}">
      <div class="modal-hero-overlay"></div>
      <div class="modal-hero-name">${spot.name}</div>
    </div>
    <div class="modal-article">
      <div class="article-byline">
        <span class="byline-chip">✍️ ${spot.recommender}推薦</span>
        <span class="byline-tagline">${tagline}</span>
      </div>
      <hr class="article-rule" />
      ${fullDescHTML}
    </div>
    <div class="modal-tags">
      ${spot.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
    <div class="modal-editor-panel">
      <div class="editor-panel-title">✏️ 主理人 / 好友專用工具</div>
      <div class="editor-panel-btns">
        <button class="editor-btn editor-btn-outline" onclick="editPost(${spot.id})">✏️ 編輯這篇點評</button>
        <button class="editor-btn editor-btn-accent" onclick="aiPolish(${spot.id})">✨ AI 潤飾</button>
      </div>
    </div>
  `;

  document.getElementById('modal-backdrop').classList.add('visible');
  document.getElementById('modal').classList.add('open');
  scroll.scrollTop = 0;
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('visible');
  document.getElementById('modal').classList.remove('open');
  modalSpot = null;
}

// ─── Set View ──────────────────────────────────────────────────────────────
function setView(view) {
  document.body.dataset.view = view;

  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
}

// ─── Editor Actions ───────────────────────────────────────────────────────
function editPost(id) {
  const spot = SPOTS.find(s => s.id === id);
  alert(`✏️ 編輯點評\n\n正在開啟「${spot ? spot.name : ''}」的點評編輯器…\n\n（此功能在正式版串接 CMS）`);
}

function aiPolish(id) {
  const spot = SPOTS.find(s => s.id === id);
  alert(`✨ AI 潤飾\n\n正在用 Claude 潤飾「${spot ? spot.name : ''}」的點評文字…\n\n（此功能在正式版串接 Anthropic API）`);
}

// ─── Boot ──────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
