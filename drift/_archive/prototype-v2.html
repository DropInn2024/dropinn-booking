<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drift — 專屬漫遊</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:     #ece8e1;
      --card:   #f8f5ef;
      --ink:    #1a1210;
      --muted:  #8a7a6a;
      --accent: #b8795a;
      --border: rgba(181,171,160,0.28);
      --food-start: #c4866a;
      --food-end:   #a06040;
      --place-start:#7a98b8;
      --place-end:  #4a7098;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif TC', serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── scrollbar 隱藏 ── */
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    /* ════════════════════════
       HEADER
    ════════════════════════ */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: env(safe-area-inset-top, 44px) 24px 0;
      padding-top: max(env(safe-area-inset-top, 0px), 44px);
    }
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(236,232,225,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      margin: 0 -24px;
      padding: 0 24px 14px;
    }
    .header-brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--ink);
      line-height: 1;
    }
    .header-sub {
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* 模式切換 */
    .mode-toggle {
      display: flex;
      background: rgba(181,171,160,0.18);
      border-radius: 20px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      all: unset;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 7px 16px;
      border-radius: 16px;
      color: var(--muted);
      transition: all 0.25s;
      font-family: 'Noto Serif TC', serif;
      white-space: nowrap;
    }
    .mode-btn.active {
      background: var(--card);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(26,18,16,0.08);
    }

    /* ════════════════════════
       VIEWS
    ════════════════════════ */
    .view {
      position: fixed;
      inset: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .view.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      z-index: 0;
    }
    .view.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
      z-index: 10;
    }

    /* ════════════════════════
       CARD LIST VIEW
    ════════════════════════ */
    #viewList {
      display: flex;
      flex-direction: column;
      padding-top: 110px;
    }
    .carousel-wrap {
      flex: 1;
      overflow-x: auto;
      display: flex;
      align-items: center;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 0 calc(50vw - 160px);
      gap: 16px;
    }
    .spot-card {
      width: 320px;
      height: calc(100% - 24px);
      max-height: 460px;
      flex-shrink: 0;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.3s,
                  box-shadow 0.3s;
      transform: scale(0.9);
      opacity: 0.5;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .spot-card.active {
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 12px 40px rgba(26,18,16,0.10);
      border-color: var(--border);
    }
    .card-image {
      width: 100%;
      height: 62%;
      object-fit: cover;
      display: block;
    }
    .card-placeholder {
      width: 100%;
      height: 62%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .placeholder-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: rgba(255,255,255,0.9);
    }
    .placeholder-type {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.85);
    }
    .card-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(248,245,239,0.88);
      backdrop-filter: blur(8px);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .card-body {
      padding: 18px 22px 20px;
      height: 38%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--ink);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .card-type {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      letter-spacing: 0.04em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* 底部活躍標題 */
    .active-info {
      height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 0 24px 12px;
    }
    .active-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--ink);
      transition: opacity 0.2s;
    }
    .active-meta {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
    }

    /* ════════════════════════
       MAP VIEW
    ════════════════════════ */
    #viewMap { z-index: 5; }
    #map { width: 100%; height: 100%; }
    .map-controls {
      position: absolute;
      right: 20px;
      bottom: 120px;
      z-index: 400;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .map-btn {
      all: unset;
      width: 48px;
      height: 48px;
      background: var(--card);
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,18,16,0.10);
      transition: background 0.2s;
      font-size: 18px;
      color: var(--muted);
    }
    .map-btn.locate {
      width: 52px;
      height: 52px;
      color: var(--accent);
    }
    .map-btn:active { background: #eee; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(66,133,244,0.7); }
      70%  { box-shadow: 0 0 0 14px rgba(66,133,244,0); }
      100% { box-shadow: 0 0 0 0 rgba(66,133,244,0); }
    }
    .gps-dot {
      width: 15px; height: 15px;
      background: #4285F4;
      border-radius: 50%;
      border: 2.5px solid white;
      animation: pulse 2s infinite;
    }

    /* ════════════════════════
       ITINERARY PILL
    ════════════════════════ */
    #pill {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      opacity: 0;
      background: var(--ink);
      border-radius: 30px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 90;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      box-shadow: 0 8px 32px rgba(26,18,16,0.25);
      white-space: nowrap;
    }
    #pill.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .pill-label {
      font-size: 9px;
      letter-spacing: 0.35em;
      color: rgba(248,245,239,0.5);
      text-transform: uppercase;
      font-family: 'Cormorant Garamond', serif;
    }
    .pill-count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--accent);
      line-height: 1;
    }
    .pill-btn {
      all: unset;
      cursor: pointer;
      background: rgba(248,245,239,0.12);
      border: 1px solid rgba(248,245,239,0.15);
      color: rgba(248,245,239,0.9);
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.12em;
      font-family: 'Noto Serif TC', serif;
      transition: background 0.2s;
    }
    .pill-btn:active { background: rgba(248,245,239,0.22); }

    /* ════════════════════════
       BOTTOM SHEETS
    ════════════════════════ */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(26,18,16,0.38);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .backdrop.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-radius: 24px 24px 0 0;
      z-index: 310;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -6px 40px rgba(26,18,16,0.12);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(181,171,160,0.4);
      border-radius: 2px;
      margin: 14px auto 0;
      flex-shrink: 0;
    }
    .sheet-header {
      padding: 14px 24px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sheet-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--ink);
    }
    .sheet-subtitle {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }
    .sheet-close {
      all: unset;
      cursor: pointer;
      font-size: 18px;
      color: var(--muted);
      padding: 4px 8px;
    }
    .sheet-body { overflow-y: auto; flex: 1; }
    .sheet-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      background: var(--card);
    }

    /* Detail sheet image */
    .detail-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .detail-placeholder {
      width: 100%;
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .detail-content { padding: 24px 24px 8px; }
    .detail-badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .detail-type {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .meta-dot { color: var(--border); font-size: 8px; }
    .detail-hours {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .detail-review-box {
      background: rgba(181,171,160,0.1);
      border-radius: 12px;
      padding: 16px 18px;
      border: 1px solid var(--border);
    }
    .review-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .review-text {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.9;
      letter-spacing: 0.05em;
    }
    .detail-stars {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
    }
    .star-row { display: flex; gap: 3px; }
    .star { font-size: 13px; color: var(--accent); }
    .star.empty { color: var(--border); }
    .star-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--muted);
    }

    /* Sheet buttons */
    .btn-primary {
      all: unset;
      cursor: pointer;
      flex: 1;
      text-align: center;
      background: var(--ink);
      color: var(--card);
      padding: 14px;
      border-radius: 12px;
      font-size: 12px;
      letter-spacing: 0.2em;
      font-family: 'Noto Serif TC', serif;
      transition: background 0.2s;
      text-decoration: none;
      display: block;
    }
    .btn-primary:active { background: #2a1e1c; }
    .btn-secondary {
      all: unset;
      cursor: pointer;
      flex: 1;
      text-align: center;
      background: rgba(184,121,90,0.08);
      color: var(--accent);
      border: 1px solid rgba(184,121,90,0.3);
      padding: 14px;
      border-radius: 12px;
      font-size: 12px;
      letter-spacing: 0.2em;
      font-family: 'Noto Serif TC', serif;
      transition: background 0.2s;
      text-decoration: none;
      display: block;
    }
    .btn-secondary:active { background: rgba(184,121,90,0.14); }
    .btn-secondary.added {
      opacity: 0.5;
      pointer-events: none;
      cursor: default;
    }

    /* Plan list */
    .plan-empty {
      text-align: center;
      padding: 48px 24px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .plan-connector {
      margin-left: 24px;
      padding: 10px 0 10px 20px;
      border-left: 1px dashed rgba(184,121,90,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .connector-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .connector-dist {
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      color: var(--accent);
    }
    .plan-item {
      margin: 0 20px;
      background: #f2ede5;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
    }
    .plan-num {
      width: 30px; height: 30px;
      background: var(--ink);
      color: var(--card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      flex-shrink: 0;
    }
    .plan-info { flex: 1; }
    .plan-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.06em;
    }
    .plan-meta {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }
    .plan-nav-btn {
      all: unset;
      cursor: pointer;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(181,171,160,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .plan-nav-btn:active { background: rgba(181,171,160,0.3); }

    /* clear link */
    .clear-btn {
      all: unset;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .clear-btn:active { color: var(--ink); }
  </style>
</head>
<body>

<!-- ── 背景 ── -->
<div id="backdrop" class="backdrop" onclick="closeSheets()"></div>

<!-- ════ HEADER ════ -->
<header id="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-title">Drift</div>
      <div class="header-sub">專屬漫遊 · 澎湖</div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnList" onclick="switchMode('list')">卡片</button>
      <button class="mode-btn" id="btnMap"  onclick="switchMode('map')">地圖</button>
    </div>
  </div>
</header>

<!-- ════ VIEW: 卡片 ════ -->
<div id="viewList" class="view visible">
  <div class="carousel-wrap" id="carousel"></div>
  <div class="active-info">
    <div class="active-name" id="activeName">滑動探索</div>
    <div class="active-meta" id="activeMeta">找出你的專屬私房景點</div>
  </div>
</div>

<!-- ════ VIEW: 地圖 ════ -->
<div id="viewMap" class="view hidden">
  <div id="map"></div>
  <div class="map-controls">
    <button class="map-btn" onclick="flyToHome()" title="回民宿">
      <i class="fas fa-heart" style="color:#c4866a;font-size:16px;"></i>
    </button>
    <button class="map-btn locate" onclick="locateUser()">
      <i class="fas fa-location-crosshairs"></i>
    </button>
  </div>
</div>

<!-- ════ PILL ════ -->
<div id="pill">
  <span class="pill-label">行程</span>
  <span class="pill-count" id="pillCount">0</span>
  <button class="pill-btn" onclick="openPlanSheet()">查看路線</button>
</div>

<!-- ════ DETAIL SHEET ════ -->
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body" id="detailBody"></div>
  <div class="sheet-footer">
    <a class="btn-primary" id="detailNavBtn" href="#" target="_blank">
      <i class="fas fa-location-arrow" style="margin-right:6px;font-size:10px;"></i>導航前往
    </a>
    <button class="btn-secondary" id="addPlanBtn" onclick="addToPlan()">
      <i class="fas fa-plus" style="margin-right:6px;font-size:10px;"></i>加入行程
    </button>
  </div>
</div>

<!-- ════ PLAN SHEET ════ -->
<div class="sheet" id="planSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div>
      <div class="sheet-title">今日漂流路線</div>
      <div class="sheet-subtitle">Drift Itinerary</div>
    </div>
    <button class="clear-btn" onclick="clearPlan()">清空</button>
  </div>
  <div class="sheet-body" id="planBody"></div>
  <div class="sheet-footer">
    <a class="btn-primary" id="planNavBtn" href="#" target="_blank">
      <i class="fas fa-map-marked-alt" style="margin-right:6px;font-size:10px;"></i>完整路線
    </a>
    <button class="btn-secondary" onclick="viewRouteOnMap()">
      <i class="fas fa-route" style="margin-right:6px;font-size:10px;"></i>地圖預覽
    </button>
  </div>
</div>

<script>
// ─── 常數 ──────────────────────────────────────────
const HOME = [23.5650, 119.5700];

// ─── 資料 ──────────────────────────────────────────
const places = [
  { id:1, name:'外垵刈包',   type:'在地小吃', desc:'熱騰騰的黑糖饅頭夾上爌肉，漁港邊的絕佳美味。', hasImage:true,  img:'https://images.unsplash.com/photo-1541628951107-a5af5389faa9?auto=format&fit=crop&w=600&q=80', lat:23.5639, lng:119.4812, recommender:'海編', role:'friend', avg:4.8, hours:'13:30 – 20:00' },
  { id:2, name:'長進餐廳',   type:'私藏海鮮', desc:'紅蟳粥是招牌，在地人最愛的隱藏版海鮮餐廳。',    hasImage:false, lat:23.5642, lng:119.5651, recommender:'雫旅', role:'admin', avg:4.9, hours:'11:00 – 14:00' },
  { id:3, name:'玉冠嫩仙草', type:'冰品甜點', desc:'夏天來一碗超級消暑！剉冰本身就是仙草做的。',    hasImage:false, lat:23.5691, lng:119.5695, recommender:'雫旅', role:'admin', avg:4.7, hours:'10:00 – 22:00' },
  { id:4, name:'二崁聚落',   type:'人文古厝', desc:'保存最完整的閩南式建築群，隨便拍都很文青。',    hasImage:true,  img:'https://images.unsplash.com/photo-1599300609388-3482a1705e3d?auto=format&fit=crop&w=600&q=80', lat:23.6046, lng:119.5186, recommender:'雫旅', role:'admin', avg:4.7, hours:'全天開放' },
  { id:5, name:'林投金沙灘', type:'秘境沙灘', desc:'隱藏在防風林後的超美沙灘，沙子非常細緻！',    hasImage:false, lat:23.5595, lng:119.6455, recommender:'海編', role:'friend', avg:5.0, hours:'建議白天' },
];

// ─── 狀態 ──────────────────────────────────────────
let currentIdx = null;
let plan = [];
let userLoc = null;
let map = null, routeLine = null, userDot = null, userCircle = null;

// ─── 工具函式 ───────────────────────────────────────
function catInfo(type) {
  const t = type;
  if (t.includes('海鮮') || t.includes('餐廳')) return { food:true, icon:'fa-fish' };
  if (t.includes('冰') || t.includes('甜點'))   return { food:true, icon:'fa-ice-cream' };
  if (t.includes('咖啡') || t.includes('茶'))   return { food:true, icon:'fa-mug-hot' };
  if (t.includes('小吃') || t.includes('美食')) return { food:true, icon:'fa-bowl-food' };
  if (t.includes('沙灘') || t.includes('海'))   return { food:false, icon:'fa-umbrella-beach' };
  if (t.includes('人文') || t.includes('古厝')) return { food:false, icon:'fa-camera-retro' };
  return { food:false, icon:'fa-water' };
}

function placeholderHTML(type) {
  const { food, icon } = catInfo(type);
  const grad = food
    ? 'linear-gradient(145deg,#c4866a 0%,#a06040 100%)'
    : 'linear-gradient(145deg,#7a98b8 0%,#4a7098 100%)';
  return `<div class="card-placeholder" style="background:${grad}"><div class="placeholder-icon"><i class="fas ${icon}"></i></div><div class="placeholder-type">${type}</div></div>`;
}
function getPlaceholderCard(type) { return placeholderHTML(type); }
function imgFail(el) {
  const type = el.dataset.type || '';
  const isDetail = el.classList.contains('detail-image');
  const { food, icon } = catInfo(type);
  const grad = food ? 'linear-gradient(145deg,#c4866a 0%,#a06040 100%)' : 'linear-gradient(145deg,#7a98b8 0%,#4a7098 100%)';
  const cls = isDetail ? 'detail-placeholder' : 'card-placeholder';
  const tmp = document.createElement('div');
  tmp.innerHTML = `<div class="${cls}" style="background:${grad}"><div class="placeholder-icon"><i class="fas ${icon}"></i></div><div class="placeholder-type">${type}</div></div>`;
  el.parentNode.replaceChild(tmp.firstChild, el);
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371, d2r=Math.PI/180;
  const dLat=(lat2-lat1)*d2r, dLng=(lng2-lng1)*d2r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function starsHTML(avg) {
  let s = '';
  for (let i=1; i<=5; i++)
    s += `<span class="star${i<=Math.round(avg)?'':' empty'}">★</span>`;
  return s;
}

// ─── 卡片渲染 ──────────────────────────────────────
const carousel = document.getElementById('carousel');
places.forEach((p, i) => {
  const mediaHTML = p.hasImage
    ? `<img class="card-image" src="${p.img}" loading="lazy" data-type="${p.type}" onerror="imgFail(this)">`
    : placeholderHTML(p.type);

  const el = document.createElement('div');
  el.className = 'spot-card';
  el.dataset.index = i;
  el.onclick = () => openDetail(i);
  el.innerHTML = `
    ${mediaHTML}
    <div class="card-badge">${p.role==='admin'?'👑':'👋'} ${p.recommender}</div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-type">${p.type}</div>
      <div class="card-desc">${p.desc}</div>
    </div>`;
  carousel.appendChild(el);
});

// IntersectionObserver 焦點卡片
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
      e.target.classList.add('active');
      const idx = e.target.dataset.index;
      document.getElementById('activeName').textContent = places[idx].name;
      document.getElementById('activeMeta').textContent = `${places[idx].avg} ★  ·  ${places[idx].recommender} 推薦`;
    }
  });
}, { root: carousel, threshold: 0.6 });
document.querySelectorAll('.spot-card').forEach(c => io.observe(c));

// ─── 模式切換 ──────────────────────────────────────
function switchMode(mode) {
  const list = document.getElementById('viewList');
  const mapV = document.getElementById('viewMap');
  document.getElementById('btnList').classList.toggle('active', mode==='list');
  document.getElementById('btnMap').classList.toggle('active',  mode==='map');

  if (mode === 'list') {
    list.classList.replace('hidden','visible');
    mapV.classList.replace('visible','hidden');
  } else {
    mapV.classList.replace('hidden','visible');
    list.classList.replace('visible','hidden');
    setTimeout(() => { if (!map) initMap(); map.invalidateSize(); }, 320);
  }
}

// ─── 地圖 ──────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl:false, attributionControl:false })
         .setView(HOME, 12.5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom:19 }).addTo(map);

  // 民宿標記
  const homeIcon = L.divIcon({
    html:`<div style="width:40px;height:40px;background:#f8f5ef;border-radius:50%;border:1px solid #d4c8b8;box-shadow:0 3px 12px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;font-size:17px;">🏠</div>`,
    className:'', iconSize:[40,40], iconAnchor:[20,20]
  });
  L.marker(HOME, { icon:homeIcon }).addTo(map)
   .bindPopup('<span style="font-family:serif;letter-spacing:.08em">雫旅</span>');

  // 景點標記
  places.forEach((p, i) => {
    const { food, icon } = catInfo(p.type);
    const mk = L.divIcon({
      html:`<div style="width:34px;height:34px;background:#f8f5ef;border-radius:50%;border:1.5px solid rgba(181,171,160,0.5);box-shadow:0 2px 8px rgba(26,18,16,0.14);display:flex;align-items:center;justify-content:center;color:#8a7a6a;font-size:13px;"><i class="fas ${icon}"></i></div>`,
      className:'', iconSize:[34,34], iconAnchor:[17,17]
    });
    L.marker([p.lat, p.lng], { icon:mk }).addTo(map).on('click', () => openDetail(i));
  });
}

function flyToHome() { if (map) map.flyTo(HOME, 14, { duration:1.5 }); }

function locateUser() {
  if (!map) return;
  const mockLat=23.5680, mockLng=119.5600;
  userLoc = [mockLat, mockLng];
  map.flyTo(userLoc, 14, { duration:1 });
  if (userCircle) map.removeLayer(userCircle);
  if (userDot) map.removeLayer(userDot);
  userCircle = L.circle(userLoc, { color:'#4285F4', fillColor:'#4285F4', fillOpacity:0.08, radius:1500, weight:1 }).addTo(map);
  const dotIcon = L.divIcon({ html:`<div class="gps-dot"></div>`, className:'', iconSize:[15,15], iconAnchor:[7.5,7.5] });
  userDot = L.marker(userLoc, { icon:dotIcon }).addTo(map);
}

// ─── Detail Sheet ──────────────────────────────────
function openDetail(i) {
  currentIdx = i;
  const p = places[i];
  const inPlan = plan.includes(p.id);

  const mediaHTML = p.hasImage
    ? `<img class="detail-image" src="${p.img}" loading="lazy" data-type="${p.type}" onerror="imgFail(this)">`
    : `<div class="detail-placeholder">${placeholderHTML(p.type)}</div>`;

  document.getElementById('detailBody').innerHTML = `
    ${mediaHTML}
    <div class="detail-content">
      <div class="detail-badge">${p.role==='admin'?'👑 雫旅推薦':'👋 探路客推薦'}</div>
      <div class="detail-name">${p.name}</div>
      <div class="detail-meta">
        <span class="detail-type">${p.type}</span>
        <span class="meta-dot">●</span>
        <span class="detail-hours"><i class="far fa-clock" style="margin-right:4px;font-size:10px;opacity:.6;"></i>${p.hours}</span>
      </div>
      <div class="detail-review-box">
        <div class="review-label">推薦語</div>
        <div class="review-text">${p.desc}</div>
      </div>
      <div class="detail-stars">
        <div class="star-row">${starsHTML(p.avg)}</div>
        <span class="star-num">${p.avg}</span>
      </div>
    </div>`;

  document.getElementById('detailNavBtn').href = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;

  const addBtn = document.getElementById('addPlanBtn');
  if (inPlan) {
    addBtn.innerHTML = `<i class="fas fa-check" style="margin-right:6px;font-size:10px;"></i>已在行程`;
    addBtn.classList.add('added');
  } else {
    addBtn.innerHTML = `<i class="fas fa-plus" style="margin-right:6px;font-size:10px;"></i>加入行程`;
    addBtn.classList.remove('added');
  }

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('detailSheet').classList.add('open');
  document.getElementById('planSheet').classList.remove('open');
}

// ─── 加入行程 ──────────────────────────────────────
function addToPlan() {
  if (currentIdx === null) return;
  const p = places[currentIdx];
  if (plan.includes(p.id)) return;
  plan.push(p.id);

  document.getElementById('pillCount').textContent = plan.length;
  document.getElementById('pill').classList.add('show');

  const addBtn = document.getElementById('addPlanBtn');
  addBtn.innerHTML = `<i class="fas fa-check" style="margin-right:6px;font-size:10px;"></i>已在行程`;
  addBtn.classList.add('added');

  drawRoute();
}

// ─── Plan Sheet ────────────────────────────────────
function openPlanSheet() {
  const body = document.getElementById('planBody');
  const navBtn = document.getElementById('planNavBtn');

  if (plan.length === 0) {
    body.innerHTML = '<div class="plan-empty">尚無行程</div>';
    navBtn.removeAttribute('href');
    navBtn.style.opacity = '0.4';
    navBtn.style.pointerEvents = 'none';
  } else {
    navBtn.style.opacity = '';
    navBtn.style.pointerEvents = '';
    const items = plan.map(id => places.find(p => p.id === id));
    const start = userLoc || HOME;
    const startLabel = userLoc ? '📍 目前位置' : '🏠 雫旅';
    let html = '';

    items.forEach((p, i) => {
      const prevLat = i===0 ? start[0] : items[i-1].lat;
      const prevLng = i===0 ? start[1] : items[i-1].lng;
      const dist = haversine(prevLat, prevLng, p.lat, p.lng);
      html += `
        <div class="plan-connector">
          <span class="connector-label">${i===0 ? startLabel+' 出發' : '繼續前往'}</span>
          <span class="connector-dist">${dist} km</span>
        </div>
        <div class="plan-item">
          <div class="plan-num">${i+1}</div>
          <div class="plan-info">
            <div class="plan-name">${p.name}</div>
            <div class="plan-meta">${p.type} · ${p.hours}</div>
          </div>
          <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" class="plan-nav-btn">
            <i class="fas fa-location-arrow"></i>
          </a>
        </div>`;
    });
    body.innerHTML = `<div style="padding:16px 0 24px;">${html}</div>`;

    // Google 多點導航
    const origin = (userLoc||HOME).join(',');
    const dest = `${items[items.length-1].lat},${items[items.length-1].lng}`;
    const wps = items.slice(0,-1).map(p=>`${p.lat},${p.lng}`).join('|');
    navBtn.href = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${wps?'&waypoints='+wps:''}`;
  }

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('planSheet').classList.add('open');
  document.getElementById('detailSheet').classList.remove('open');
}

function clearPlan() {
  plan = [];
  document.getElementById('pillCount').textContent = 0;
  document.getElementById('pill').classList.remove('show');
  if (routeLine && map) { map.removeLayer(routeLine); routeLine=null; }
  openPlanSheet();
}

// ─── 地圖路線 ──────────────────────────────────────
function drawRoute() {
  if (!map) initMap();
  if (routeLine) { map.removeLayer(routeLine); routeLine=null; }
  if (plan.length === 0) return;
  const start = userLoc || HOME;
  const pts = [start, ...plan.map(id => { const p=places.find(x=>x.id===id); return [p.lat,p.lng]; })];
  routeLine = L.polyline(pts, { color:'#b8795a', weight:2.5, dashArray:'8 8', opacity:0.85, lineCap:'round' }).addTo(map);
}

function viewRouteOnMap() {
  closeSheets();
  switchMode('map');
  if (routeLine) setTimeout(() => map.fitBounds(routeLine.getBounds(), { padding:[60,60] }), 400);
}

// ─── 關閉 ──────────────────────────────────────────
function closeSheets() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('detailSheet').classList.remove('open');
  document.getElementById('planSheet').classList.remove('open');
}
</script>
