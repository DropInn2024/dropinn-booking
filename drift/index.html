<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Drift ｜ 探索</title>
  <script src="/config.public.js?v=2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root {
      --bg: #f5f1ec; --ink: #1a1210; --muted: #6b5f56;
      --accent: #b8795a; --border: rgba(181, 171, 160, 0.3);
      --pending: #e8e1d7; --has-room: rgba(184, 121, 90, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      background-color: var(--bg); color: var(--ink);
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ── Auth overlay ── */
    #driftAuthOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
      font-family: 'Noto Serif TC', serif;
    }

    /* ── Header ── */
    header { padding: 36px 20px 0; text-align: center; z-index: 10; flex-shrink: 0; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300;
      letter-spacing: 0.15em; color: var(--ink); margin-bottom: 12px;
    }
    .drop-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      margin: 0 auto 16px; opacity: 0.5;
    }
    .filter-wrapper { display: flex; justify-content: center; margin-bottom: 24px; }
    .custom-select {
      width: 100%; max-width: 160px; padding: 8px 30px 8px 16px;
      border-radius: 12px; border: 1px solid rgba(181, 171, 160, 0.45);
      background-color: transparent;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b5f56' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
      appearance: none; -webkit-appearance: none;
      font-family: 'Noto Serif TC', serif; color: var(--ink);
      font-size: 12px; letter-spacing: 0.1em;
      text-align: center; text-align-last: center;
      cursor: pointer;
    }

    /* ── Carousel ── */
    .carousel-container {
      flex: 1; position: relative; display: flex;
      justify-content: center; align-items: center;
      overflow: hidden; width: 100%;
    }
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--ink);
      padding: 20px 15px; cursor: pointer; z-index: 50; opacity: 0.2;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s, color 0.2s;
    }
    .nav-arrow svg { width: 32px; height: 32px; stroke-width: 1; }
    .left-arrow { left: 2%; }
    .right-arrow { right: 2%; }
    .nav-arrow:active { transform: translateY(-50%) scale(1.5); opacity: 1; color: var(--accent); }
    .nav-arrow:disabled { opacity: 0 !important; pointer-events: none; }

    /* ── Gallery card ── */
    .gallery-card {
      position: absolute; width: 72%; max-width: 320px; height: 62vh;
      background: rgba(245, 241, 236, 0.88); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 18px;
      display: flex; flex-direction: column;
      transition: transform 0.28s cubic-bezier(0.34, 1.38, 0.64, 1), opacity 0.22s ease, box-shadow 0.28s ease;
      overflow: hidden; will-change: transform, opacity;
      cursor: pointer; visibility: hidden;
    }
    .gallery-card.dragging {
      transition: none !important;
    }
    .gallery-card.is-center {
      box-shadow: 0 15px 35px rgba(26, 18, 16, 0.08);
      border-color: rgba(181, 171, 160, 0.5);
    }
    .gallery-card.is-center:active { opacity: 0.92; }

    .card-image {
      height: 50%; flex-shrink: 0; display: flex;
      justify-content: center; align-items: center; color: var(--muted);
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px;
      letter-spacing: 0.1em; position: relative; border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .card-image-placeholder { width: 100%; height: 100%; }
    .grad-1 { background: linear-gradient(145deg, #f0d0b0 0%, #d4946a 40%, #a86840 100%); }
    .grad-2 { background: linear-gradient(145deg, #c8d8ec 0%, #8aaac8 40%, #5680a8 100%); }
    .grad-3 { background: linear-gradient(145deg, #c8e0c8 0%, #80b078 40%, #507850 100%); }
    .grad-4 { background: linear-gradient(145deg, #e8dcc0 0%, #c8b078 40%, #a08040 100%); }

    .recommender-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--accent); padding: 4px 10px; border-radius: 8px;
      font-size: 10px; letter-spacing: 0.1em; pointer-events: none;
    }
    .card-content { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .card-name {
      font-size: 20px; font-weight: 400; color: var(--ink);
      font-family: 'Cormorant Garamond', serif; margin-bottom: 4px; line-height: 1.2;
    }
    .card-tags { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 10px; }
    .card-quote {
      font-size: 13px; color: var(--ink); line-height: 1.8; flex: 1;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .card-tbd {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 13px; color: var(--muted); margin-top: 4px;
      letter-spacing: 0.08em; flex: 1;
    }

    .actions {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-solid {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 10px; padding: 10px 0;
      font-family: 'Noto Serif TC', serif; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer;
    }
    .btn-outline {
      flex: 1; background: transparent; color: var(--ink);
      border: 1px solid rgba(181,171,160,0.45);
      border-radius: 10px; padding: 10px 0;
      font-family: 'Noto Serif TC', serif; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-outline.in-bag {
      background: var(--has-room);
      border-color: rgba(184, 121, 90, 0.4);
      color: var(--accent);
    }

    .added-stamp {
      position: absolute; top: 45%; left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      border: 1.5px solid var(--accent); color: var(--accent);
      padding: 6px 20px; border-radius: 8px; font-size: 16px;
      letter-spacing: 0.2em; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; background: rgba(245, 241, 236, 0.9); z-index: 10;
    }
    .gallery-card.in-bag .added-stamp { opacity: 1; }

    /* ── Empty state in carousel ── */
    #empty-state {
      display: none; color: var(--muted); font-size: 13px;
      letter-spacing: 0.1em; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
    }

    /* ── Itinerary drawer ── */
    .itinerary-drawer {
      padding: 12px 20px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border); display: flex;
      justify-content: space-between; align-items: center;
      z-index: 10; background: var(--bg); flex-shrink: 0;
    }
    .drawer-info {
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 0.15em; color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .bag-count { color: var(--accent); font-size: 18px; font-weight: 400; transition: transform 0.2s; }
    .bag-count.bump { transform: scale(1.5); }
    .drawer-btn {
      padding: 10px 20px; font-size: 12px; border-radius: 12px;
      font-family: 'Noto Serif TC', serif; letter-spacing: 0.1em;
      border: none; transition: all 0.2s;
    }

    /* ── Backdrop ── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(26, 18, 16, 0.3);
      z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }

    /* ── Bottom sheets shared ── */
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-radius: 22px 22px 0 0;
      z-index: 50; display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      max-height: 90vh;
    }
    .bottom-sheet.active { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: rgba(26, 18, 16, 0.12);
      border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
    }

    /* ── Detail sheet ── */
    #detailSheet { z-index: 52; max-height: 92vh; }
    .detail-close-bar {
      display: flex; justify-content: flex-end; padding: 12px 16px 0; flex-shrink: 0;
    }
    .detail-close-btn {
      background: var(--pending); border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 16px; color: var(--muted);
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .detail-body { padding: 14px 22px 0; }

    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400; letter-spacing: 0.04em;
      color: var(--ink); margin-bottom: 6px; line-height: 1.3;
    }
    .detail-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; font-style: italic; margin-bottom: 14px; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
    .d-chip { font-size: 11px; border-radius: 100px; padding: 3px 10px; letter-spacing: 0.05em; }
    .d-area { background: rgba(26,18,16,0.06); color: var(--muted); }
    .d-type { background: var(--has-room); color: var(--accent); }
    .d-irr { background: rgba(26,18,16,0.05); color: var(--muted); }

    .review-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .review-rule { width: 24px; height: 1px; background: var(--accent); opacity: 0.5; margin-bottom: 14px; }
    .owner-text { font-size: 15px; color: var(--ink); line-height: 2.1; letter-spacing: 0.06em; margin-bottom: 24px; }
    .owner-tbd {
      background: var(--pending); border-radius: 12px; padding: 20px;
      text-align: center; margin-bottom: 24px;
    }
    .owner-tbd p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--muted); line-height: 2; letter-spacing: 0.08em;
    }

    .friend-reviews { margin-top: 24px; margin-bottom: 24px; }
    .friend-card { background: var(--pending); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
    .friend-card:last-child { margin-bottom: 0; }
    .friend-author {
      display: inline-block; background: var(--has-room); color: var(--accent);
      border-radius: 100px; padding: 3px 10px; font-size: 10px;
      letter-spacing: 0.1em; margin-bottom: 8px; cursor: pointer;
      position: relative; transition: background 0.15s;
    }
    .friend-author:active { background: rgba(184, 121, 90, 0.22); }
    .friend-note { font-size: 13px; color: var(--muted); line-height: 1.9; letter-spacing: 0.05em; font-style: italic; }

    /* Persona bubble */
    .persona-bubble {
      position: fixed; z-index: 200; background: var(--ink); color: var(--bg);
      border-radius: 12px; padding: 12px 16px; font-size: 12px;
      line-height: 1.8; letter-spacing: 0.06em; max-width: 240px;
      pointer-events: none; box-shadow: 0 8px 32px rgba(26,18,16,0.22);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
    }
    .persona-bubble.visible { opacity: 1; transform: translateY(0); }
    .persona-bubble::before {
      content: ''; position: absolute; top: -6px; left: 20px;
      width: 12px; height: 12px; background: var(--ink);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    /* Star rating */
    .stars-section { margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--border); margin-bottom: 20px; }
    .stars-avg-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 14px; }
    .stars-avg-num { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--accent); font-weight: 300; }
    .stars-avg-denom { font-size: 13px; color: var(--muted); }
    .stars-count { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-left: 4px; }
    .stars-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .star-btn {
      font-size: 26px; background: none; border: none;
      color: rgba(26, 18, 16, 0.15); padding: 2px;
      transition: color 0.12s, transform 0.12s; line-height: 1;
    }
    .star-btn.lit { color: var(--accent); }
    .star-btn:active { transform: scale(1.2); }
    .stars-hint { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

    /* Features */
    .features-section { margin-bottom: 22px; }
    .feature-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .feature-chip {
      font-size: 12px; color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 100px;
      padding: 4px 11px; letter-spacing: 0.04em;
    }

    /* Maps link */
    .maps-link {
      display: inline-block; margin-bottom: 28px; font-size: 12px;
      color: var(--accent); letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(184, 121, 90, 0.35); padding-bottom: 1px;
    }

    /* Detail footer */
    .detail-footer {
      display: flex; gap: 10px; padding: 14px 20px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-nav {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-route-add {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 12px; padding: 13px 16px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.06em;
      white-space: nowrap; transition: all 0.16s;
    }
    .btn-route-add.added { background: var(--has-room); border-color: rgba(184,121,90,0.4); color: var(--accent); }

    /* ── Plan sheet ── */
    #planSheet { z-index: 51; }
    .plan-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .plan-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.2em; color: var(--ink); }
    .plan-clear { background: none; border: none; font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
    .plan-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .plan-empty {
      padding: 36px 20px; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--muted); letter-spacing: 0.08em;
    }
    .plan-item {
      display: flex; align-items: center; padding: 12px 20px; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); color: var(--bg);
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .plan-info { flex: 1; }
    .plan-iname { font-size: 14px; color: var(--ink); letter-spacing: 0.04em; }
    .plan-iarea { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }
    .plan-remove { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px; line-height: 1; }
    .plan-footer { display: flex; gap: 10px; padding: 14px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .btn-start-nav {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-show-map {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 12px; padding: 13px 14px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 12px; letter-spacing: 0.06em; white-space: nowrap;
    }

    /* ── Route map overlay ── */
    .map-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 60;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.32s ease;
    }
    .map-overlay.active { transform: translateY(0); }
    .map-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-back { background: none; border: none; font-size: 13px; color: var(--muted); letter-spacing: 0.08em; }
    .map-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; letter-spacing: 0.25em; color: var(--ink); }
    .map-gmaps { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); border-bottom: 1px solid rgba(184,121,90,0.4); padding-bottom: 1px; }
    #map { flex: 0 0 42vh; min-height: 180px; }
    .route-panel { flex: 1; overflow-y: auto; padding: 16px 20px 24px; -webkit-overflow-scrolling: touch; }
    .route-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .route-item:last-of-type { border-bottom: none; }
    .route-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--bg); }
    .dot-home { background: var(--ink); font-size: 12px; }
    .dot-stop { background: var(--accent); }
    .route-info { flex: 1; }
    .route-name { font-size: 14px; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; line-height: 1.5; }
    .route-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }
    .drive-line { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; padding: 5px 0 2px 40px; }
    .route-summary { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; line-height: 2; }

    /* ── Desktop ── */
    @media (min-width: 640px) {
      .bottom-sheet { max-width: 480px; left: 50%; right: auto; transform: translateX(-50%) translateY(100%); }
      .bottom-sheet.active { transform: translateX(-50%) translateY(0); }
      #detailSheet { max-width: 520px; }
    }

    /* ── Mobile ── */
    @media (max-width: 639px) {
      /* 壓縮 header，讓卡片區更大 */
      header { padding: 22px 20px 0; }
      .page-title { font-size: 28px; margin-bottom: 8px; }
      .drop-line { height: 24px; margin-bottom: 10px; }
      .filter-wrapper { margin-bottom: 14px; }

      /* 手機滑動就夠了，箭頭拿掉 */
      .nav-arrow { display: none !important; }

      /* 卡片可以更高 */
      .gallery-card { height: 70vh; max-width: none; width: 78%; }

      /* ── 底部 bar → 浮動藥丸 ── */
      .itinerary-drawer {
        /* 脫離 flex flow，浮在畫面底部 */
        position: fixed;
        bottom: calc(22px + env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        width: auto;
        min-width: 180px;
        border-top: none;
        /* 藥丸外觀 */
        background: var(--ink);
        border-radius: 100px;
        padding: 11px 22px;
        gap: 16px;
        box-shadow: 0 8px 28px rgba(26, 18, 16, 0.28);
        /* 預設不可見 */
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
        z-index: 20;
      }
      /* 有景點時浮現 */
      .itinerary-drawer.has-items {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }
      /* 文字顏色反轉（深底白字） */
      .itinerary-drawer .drawer-info {
        color: rgba(245, 241, 236, 0.65);
        font-size: 10px;
        letter-spacing: 0.18em;
      }
      .itinerary-drawer .bag-count {
        color: var(--bg);
        font-size: 16px;
      }
      /* 按鈕融入藥丸 */
      .itinerary-drawer .drawer-btn {
        background: rgba(245, 241, 236, 0.14);
        color: var(--bg);
        border-radius: 100px;
        padding: 7px 18px;
        font-size: 11px;
        border: none;
      }
      .itinerary-drawer .drawer-btn:active {
        background: rgba(245, 241, 236, 0.26);
      }
    }
  </style>
</head>
<body>

<!-- ── Auth overlay ── -->
<div id="driftAuthOverlay">
  <div style="text-align:center;color:var(--ink);">
    <div style="font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.4em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Drop Inn · Penghu</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:32px;letter-spacing:0.12em;font-weight:300;margin-bottom:4px;">Drift</div>
    <div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;">雫旅專屬 · 請登入</div>
  </div>
  <input id="driftLoginInput" type="text" placeholder="帳號"
    style="border:1px solid rgba(181,171,160,0.5);background:var(--pending);border-radius:8px;padding:10px 20px;font-size:15px;font-family:'Noto Serif TC',serif;color:var(--ink);text-align:center;outline:none;width:220px;letter-spacing:0.08em;"
    autocomplete="username" autocapitalize="none" spellcheck="false"
    onkeydown="if(event.key==='Enter') document.getElementById('driftKeyInput').focus()">
  <input id="driftKeyInput" type="password" placeholder="密碼"
    style="border:1px solid rgba(181,171,160,0.5);background:var(--pending);border-radius:8px;padding:10px 20px;font-size:15px;font-family:'Noto Serif TC',serif;color:var(--ink);text-align:center;outline:none;width:220px;letter-spacing:0.08em;"
    autocomplete="current-password"
    onkeydown="if(event.key==='Enter') _driftAuth()">
  <div id="driftAuthErr" style="font-size:12px;color:var(--accent);display:none;">登入失敗，請再試一次</div>
  <button onclick="_driftAuth()" style="background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:10px 32px;font-size:13px;font-family:'Noto Serif TC',serif;letter-spacing:0.12em;">進入</button>
</div>

<!-- ── Header ── -->
<header>
  <div class="page-title">Drift</div>
  <div class="drop-line"></div>
  <div class="filter-wrapper">
    <select class="custom-select" id="category-select" onchange="setFilter(this.value)">
      <option value="雫旅推薦" selected>雫旅推薦</option>
      <option value="最多星星">最多星星</option>
      <option value="全部">全部探索</option>
      <optgroup label="地區">
        <option value="馬公">馬公市區</option>
        <option value="湖西">湖西鄉</option>
        <option value="白沙">白沙鄉</option>
        <option value="西嶼">西嶼鄉</option>
        <option value="七美">七美島</option>
      </optgroup>
      <optgroup label="類型">
        <option value="早餐">靈魂早餐</option>
        <option value="小吃">在地小吃</option>
        <option value="宵夜">夜間宵夜</option>
        <option value="海鮮餐廳">私藏海鮮</option>
        <option value="咖啡甜點">咖啡甜點</option>
        <option value="景點">景點探索</option>
      </optgroup>
    </select>
  </div>
</header>

<!-- ── Carousel ── -->
<div class="carousel-container" id="carousel-container">
  <button class="nav-arrow left-arrow" id="prev-btn" onclick="goPrev()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <div id="empty-state">這個分類目前沒有名單。</div>
  <button class="nav-arrow right-arrow" id="next-btn" onclick="goNext()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>
</div>

<!-- ── Itinerary drawer ── -->
<div class="itinerary-drawer">
  <div class="drawer-info">ITINERARY <span class="bag-count" id="bag-count">0</span></div>
  <button class="drawer-btn" id="nav-btn"
    style="background:var(--ink);color:var(--bg);"
    onclick="showPlanSheet()" disabled>開始漂流</button>
</div>

<!-- ── Backdrop ── -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeAllSheets()"></div>

<!-- ── Detail sheet ── -->
<div class="bottom-sheet" id="detailSheet">
  <div class="detail-close-bar">
    <button class="detail-close-btn" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-scroll">
    <div class="detail-body" id="detailBody"></div>
  </div>
  <div class="detail-footer">
    <button class="btn-nav" id="detailNavBtn" onclick="navigateTo()">導航前往</button>
    <button class="btn-route-add" id="detailRouteBtn" onclick="toggleFromDetail()">加入行程</button>
  </div>
</div>

<!-- ── Plan sheet ── -->
<div class="bottom-sheet" id="planSheet">
  <div class="sheet-handle"></div>
  <div class="plan-head">
    <span class="plan-title">今日漂流路線</span>
    <button class="plan-clear" onclick="clearPlan()">清空</button>
  </div>
  <div class="plan-list" id="planList"></div>
  <div class="plan-footer">
    <button class="btn-start-nav" onclick="startNavigation()">開始導航</button>
    <button class="btn-show-map" onclick="showRouteMap()">路線圖</button>
  </div>
</div>

<!-- ── Route map overlay ── -->
<div class="map-overlay" id="mapOverlay">
  <div class="map-topbar">
    <button class="map-back" onclick="hideRouteMap()">← 返回</button>
    <span class="map-title">Route</span>
    <a class="map-gmaps" id="gmapsLink" href="#" target="_blank" rel="noopener">導航</a>
  </div>
  <div id="map"></div>
  <div class="route-panel" id="routePanel"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="/drift/app.js"></script>
</body>
</html>
