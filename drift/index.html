<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Drift — 雫旅出遊規劃</title>
  <link rel="canonical" href="https://dropinn.tw/drift/" />
  <script src="/config.public.js?v=2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #F8F5F0;
      --ink:     #2C2620;
      --accent:  #C4896A;
      --card:    #FFFFFF;
      --muted:   #8B7D6B;
      --stone:   rgba(44,38,32,0.32);
      --tint:    #F4F0EA;
      --border:  rgba(44,38,32,0.07);
      --border2: rgba(44,38,32,0.13);
      --shadow:  0 2px 16px rgba(44,38,32,0.07);
    }

    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    a { color: inherit; text-decoration: none; }

    /* ── Auth overlay ── */
    #driftAuthOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }

    /* ── Header ── */
    .site-header {
      padding: 52px 24px 40px;
      text-align: center;
      max-width: 680px;
      margin: 0 auto;
    }
    .hd-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px; letter-spacing: 0.42em;
      color: var(--muted); text-transform: uppercase;
      display: block; margin-bottom: 14px;
    }
    .hd-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(56px, 14vw, 80px);
      font-weight: 300; letter-spacing: 0.1em;
      color: var(--ink); line-height: 1; margin-bottom: 20px;
    }
    .hd-divider {
      width: 1px; height: 44px;
      background: linear-gradient(to bottom, transparent, var(--muted), transparent);
      margin: 0 auto 18px;
    }
    .hd-sub {
      font-size: 13px; color: var(--muted);
      letter-spacing: 0.12em; line-height: 2.2;
      font-style: italic;
    }

    /* ── Filter bar ── */
    .filter-bar {
      position: sticky; top: 0; z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }
    .filter-scroll {
      display: flex; gap: 7px; align-items: center;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-sep {
      width: 1px; height: 16px; flex-shrink: 0;
      background: var(--border2); margin: 0 3px;
    }
    .fpill {
      flex-shrink: 0;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px; font-weight: 300;
      color: var(--muted); letter-spacing: 0.06em;
      white-space: nowrap;
      transition: all 0.16s;
    }
    .fpill.active {
      background: rgba(44,38,32,0.07);
      border-color: rgba(44,38,32,0.2);
      color: var(--ink);
    }
    .fpill.nearby-pill.on {
      background: rgba(196,137,106,0.1);
      border-color: rgba(196,137,106,0.4);
      color: var(--accent);
    }

    /* ── Cards ── */
    .spots-wrap {
      max-width: 640px; margin: 0 auto;
      padding: 16px 16px 120px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .spot-card {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
      cursor: pointer;
      transition: box-shadow 0.18s, border-color 0.18s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .spot-card:active { opacity: 0.88; }
    .spot-card.selected { border-color: rgba(196,137,106,0.4); }
    .spot-card.tbd { opacity: 0.6; cursor: default; }

    .card-row1 {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 10px;
      margin-bottom: 4px;
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 400;
      letter-spacing: 0.04em; color: var(--ink); line-height: 1.25;
    }
    .card-route-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: none; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all 0.16s;
      margin-top: 2px;
    }
    .spot-card.selected .card-route-btn {
      background: rgba(196,137,106,0.15);
      border-color: rgba(196,137,106,0.5);
      color: var(--accent);
    }

    .card-sub {
      font-size: 11px; color: var(--muted);
      letter-spacing: 0.1em; margin-bottom: 10px;
      font-style: italic;
    }

    .card-meta {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 5px; margin-bottom: 11px;
    }
    .m-chip {
      font-size: 11px; border-radius: 100px;
      padding: 2px 9px; letter-spacing: 0.04em;
    }
    .m-area { background: rgba(44,38,32,0.06); color: var(--muted); }
    .m-nearby { background: rgba(196,137,106,0.1); color: var(--accent); }
    .m-irr { background: rgba(44,38,32,0.05); color: var(--stone); }
    .m-price { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--muted); margin-left: auto; }

    .card-quote {
      background: var(--tint);
      border-radius: 10px;
      border-left: 2px solid rgba(196,137,106,0.4);
      padding: 11px 13px;
      font-size: 13px; color: var(--muted);
      line-height: 1.9; letter-spacing: 0.05em;
      font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tbd-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-style: italic;
      color: var(--stone); margin-top: 10px;
      letter-spacing: 0.08em;
    }

    .card-footer {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 11px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .card-tag { font-size: 11px; color: var(--stone); letter-spacing: 0.02em; }
    .card-more {
      font-size: 11px; color: var(--accent);
      letter-spacing: 0.08em; flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 15px;
      color: var(--stone); letter-spacing: 0.08em;
    }

    /* ── Plan FAB ── */
    .plan-fab {
      position: fixed; bottom: 24px; right: 20px;
      background: var(--ink); color: var(--card);
      border: none; border-radius: 100px;
      padding: 11px 18px 11px 16px;
      font-family: 'Noto Serif TC', serif;
      font-weight: 300; font-size: 13px; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(44,38,32,0.2);
      z-index: 25;
      transform: translateY(calc(100% + 48px));
      transition: transform 0.28s ease;
      padding-bottom: calc(11px + env(safe-area-inset-bottom, 0px));
    }
    .plan-fab.visible { transform: translateY(0); }
    .fab-badge {
      background: var(--accent); color: white;
      min-width: 20px; height: 20px; border-radius: 10px;
      font-size: 11px; display: flex; align-items: center;
      justify-content: center; padding: 0 5px;
    }

    /* ── Backdrop ── */
    .sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(44,38,32,0.3);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity 0.28s;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }

    /* ── Bottom sheets shared ── */
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-radius: 22px 22px 0 0;
      z-index: 50;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      max-height: 90vh;
    }
    .bottom-sheet.active { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(44,38,32,0.12);
      border-radius: 2px;
      margin: 12px auto 0; flex-shrink: 0;
    }

    /* ── Detail sheet ── */
    #detailSheet { z-index: 52; max-height: 92vh; }

    .detail-hero {
      height: 200px; position: relative;
      flex-shrink: 0; overflow: hidden;
    }
    .detail-hero-bg { width: 100%; height: 100%; }
    .detail-hero-shade {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(44,38,32,0.05) 0%, rgba(44,38,32,0.62) 100%);
    }
    .detail-hero-name {
      position: absolute; bottom: 16px; left: 20px; right: 52px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400;
      color: white; letter-spacing: 0.06em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25); line-height: 1.3;
    }
    .detail-close {
      position: absolute; top: 12px; right: 14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(6px);
      border: none; color: white; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    .detail-scroll {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .detail-body { padding: 22px 22px 0; }

    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px; font-weight: 400;
      letter-spacing: 0.04em; color: var(--ink);
      margin-bottom: 4px;
    }
    .detail-subtitle {
      font-size: 12px; color: var(--muted);
      letter-spacing: 0.1em; font-style: italic;
      margin-bottom: 14px;
    }
    .detail-meta {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-bottom: 22px;
    }

    /* Review sections */
    .review-label {
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 8px;
    }
    .review-rule {
      width: 24px; height: 1px;
      background: var(--accent); opacity: 0.5;
      margin-bottom: 14px;
    }
    .owner-text {
      font-size: 15px; color: var(--ink);
      line-height: 2.1; letter-spacing: 0.06em;
      margin-bottom: 24px;
    }
    .owner-tbd {
      background: var(--tint); border-radius: 12px;
      padding: 20px; text-align: center;
      margin-bottom: 24px;
    }
    .owner-tbd p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 14px;
      color: var(--stone); line-height: 2; letter-spacing: 0.08em;
    }

    .friend-reviews { margin-top: 24px; margin-bottom: 24px; }
    .friend-card {
      background: var(--tint); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 8px;
    }
    .friend-card:last-child { margin-bottom: 0; }
    .friend-author {
      display: inline-block;
      background: rgba(196,137,106,0.12);
      color: var(--accent); border-radius: 100px;
      padding: 3px 10px; font-size: 10px;
      letter-spacing: 0.1em; margin-bottom: 8px;
      cursor: pointer; position: relative;
      transition: background 0.15s;
    }
    .friend-author:hover { background: rgba(196,137,106,0.22); }
    .friend-note {
      font-size: 13px; color: var(--muted);
      line-height: 1.9; letter-spacing: 0.05em; font-style: italic;
    }

    /* Persona bubble */
    .persona-bubble {
      position: fixed; z-index: 200;
      background: var(--ink); color: var(--card);
      border-radius: 12px; padding: 12px 16px;
      font-size: 12px; line-height: 1.8; letter-spacing: 0.06em;
      max-width: 240px; pointer-events: none;
      box-shadow: 0 8px 32px rgba(44,38,32,0.22);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
    }
    .persona-bubble.visible { opacity: 1; transform: translateY(0); }
    .persona-bubble::before {
      content: '';
      position: absolute; top: -6px; left: 20px;
      width: 12px; height: 12px;
      background: var(--ink);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    /* Star rating */
    .stars-section {
      margin-top: 24px; padding-top: 22px;
      border-top: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .stars-avg-row {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 14px;
    }
    .stars-avg-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; color: var(--accent); font-weight: 300;
    }
    .stars-avg-denom { font-size: 13px; color: var(--muted); }
    .stars-count {
      font-size: 11px; color: var(--stone);
      letter-spacing: 0.06em; margin-left: 4px;
    }
    .stars-row {
      display: flex; gap: 6px; margin-bottom: 8px;
    }
    .star-btn {
      font-size: 26px; background: none; border: none;
      color: rgba(44,38,32,0.15); padding: 2px;
      transition: color 0.12s, transform 0.12s;
      line-height: 1;
    }
    .star-btn.lit { color: var(--accent); }
    .star-btn:active { transform: scale(1.2); }
    .stars-hint { font-size: 11px; color: var(--stone); letter-spacing: 0.06em; }

    /* Features */
    .features-section { margin-bottom: 22px; }
    .feature-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .feature-chip {
      font-size: 12px; color: var(--muted);
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 100px; padding: 4px 11px; letter-spacing: 0.04em;
    }

    /* Maps link */
    .maps-link {
      display: inline-block; margin-bottom: 28px;
      font-size: 12px; color: var(--accent);
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(196,137,106,0.35);
      padding-bottom: 1px;
    }

    /* Detail footer */
    .detail-footer {
      display: flex; gap: 10px;
      padding: 14px 20px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-nav {
      flex: 1; background: var(--ink); color: var(--card);
      border: none; border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-route-add {
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted); border-radius: 12px;
      padding: 13px 16px; font-family: 'Noto Serif TC', serif;
      font-weight: 300; font-size: 13px; letter-spacing: 0.06em;
      white-space: nowrap; transition: all 0.16s;
    }
    .btn-route-add.added {
      background: rgba(196,137,106,0.1);
      border-color: rgba(196,137,106,0.4);
      color: var(--accent);
    }

    /* ── Plan sheet ── */
    #planSheet { z-index: 51; }
    .plan-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .plan-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; letter-spacing: 0.2em; color: var(--ink);
    }
    .plan-clear { background: none; border: none; font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
    .plan-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .plan-empty {
      padding: 36px 20px; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--stone); letter-spacing: 0.08em;
    }
    .plan-item {
      display: flex; align-items: center;
      padding: 12px 20px; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); color: white;
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .plan-info { flex: 1; }
    .plan-iname { font-size: 14px; color: var(--ink); letter-spacing: 0.04em; }
    .plan-iarea { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }
    .plan-remove { background: none; border: none; color: var(--stone); font-size: 18px; padding: 4px; line-height: 1; }

    .plan-footer {
      display: flex; gap: 10px;
      padding: 14px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-start-nav {
      flex: 1; background: var(--ink); color: var(--card);
      border: none; border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-show-map {
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted); border-radius: 12px;
      padding: 13px 14px; font-family: 'Noto Serif TC', serif;
      font-weight: 300; font-size: 12px; letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ── Route map overlay ── */
    .map-overlay {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 60; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.32s ease;
    }
    .map-overlay.active { transform: translateY(0); }
    .map-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-back { background: none; border: none; font-size: 13px; color: var(--muted); letter-spacing: 0.08em; }
    .map-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; letter-spacing: 0.25em; color: var(--ink); }
    .map-gmaps { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); border-bottom: 1px solid rgba(196,137,106,0.4); padding-bottom: 1px; }
    #map { flex: 0 0 42vh; min-height: 180px; }
    .route-panel { flex: 1; overflow-y: auto; padding: 16px 20px 24px; -webkit-overflow-scrolling: touch; }
    .route-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .route-item:last-of-type { border-bottom: none; }
    .route-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 13px; color: white; }
    .dot-home { background: var(--ink); font-size: 12px; }
    .dot-stop { background: var(--accent); }
    .route-info { flex: 1; }
    .route-name { font-size: 14px; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; line-height: 1.5; }
    .route-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }
    .drive-line { font-size: 11px; color: var(--stone); letter-spacing: 0.08em; padding: 5px 0 2px 40px; }
    .route-summary { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--stone); letter-spacing: 0.08em; line-height: 2; }

    /* ── Gradient classes ── */
    .grad-1 { background: linear-gradient(145deg, #f0d0b0 0%, #d4946a 40%, #a86840 100%); }
    .grad-2 { background: linear-gradient(145deg, #c8d8ec 0%, #8aaac8 40%, #5680a8 100%); }
    .grad-3 { background: linear-gradient(145deg, #c8e0c8 0%, #80b078 40%, #507850 100%); }
    .grad-4 { background: linear-gradient(145deg, #e8dcc0 0%, #c8b078 40%, #a08040 100%); }

    /* ── Responsive desktop ── */
    @media (min-width: 640px) {
      .site-header { padding: 64px 32px 52px; }
      .bottom-sheet { max-width: 480px; left: 50%; right: auto; transform: translateX(-50%) translateY(100%); }
      .bottom-sheet.active { transform: translateX(-50%) translateY(0); }
      .sheet-backdrop { display: block; }
      #detailSheet { max-width: 520px; }
    }
  </style>
</head>
<body>

<!-- ── 密碼保護 ── -->
<div id="driftAuthOverlay" style="display:none;position:fixed;inset:0;z-index:9999;background:#F8F5F0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:'Noto Serif TC',serif;">
  <div style="text-align:center;color:#2C2620;">
    <div style="font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.4em;color:#8B7D6B;text-transform:uppercase;margin-bottom:10px;">Drop Inn · Penghu</div>

<script>
(function() {
  var cfg = window.FRONTEND_CONFIG || (typeof FRONTEND_CONFIG !== 'undefined' ? FRONTEND_CONFIG : {});
  var DRIFT_KEY = cfg.DRIFT_KEY || 'dropinn-drift-2026';
  var STORAGE_KEY = 'drift_auth_token';
  function _driftAuth() {
    var val = (document.getElementById('driftKeyInput').value || '').trim();
    if (val === DRIFT_KEY) {
      localStorage.setItem(STORAGE_KEY, btoa(DRIFT_KEY));
      document.getElementById('driftAuthOverlay').style.display = 'none';
      document.body.style.overflow = '';
    } else {
      document.getElementById('driftAuthErr').style.display = 'block';
      document.getElementById('driftKeyInput').value = '';
      document.getElementById('driftKeyInput').focus();
    }
  }
  window._driftAuth = _driftAuth;
  var stored = localStorage.getItem(STORAGE_KEY);
  var overlay = document.getElementById('driftAuthOverlay');
  if (stored && stored === btoa(DRIFT_KEY)) {
    overlay.style.display = 'none';
  } else {
    overlay.style.display = 'flex';
    document.documentElement.style.visibility = 'hidden';
    window.addEventListener('DOMContentLoaded', function() {
      document.documentElement.style.visibility = '';
      if (overlay.style.display !== 'none') document.body.style.overflow = 'hidden';
      document.getElementById('driftKeyInput').focus();
    });
  }
})();
</script>

// ── State ────────────────────────────────────────────────────────────────
const selected = new Set();
let currentType = 'all';
let currentSub  = 'all';
let nearbyOnly  = false;
let currentDetailId = null;
let leafletMap  = null;

const SUB_OPTIONS = {
  all:        ['早餐','小吃','海鮮餐廳','宵夜','咖啡甜點','湖西鄉','白沙鄉','西嶼鄉','馬公市','北環','南環'],
  food:       ['早餐','小吃','海鮮餐廳','宵夜','咖啡甜點'],
  attraction: ['湖西鄉','白沙鄉','西嶼鄉','馬公市','北環','南環'],
};

// ── Star rating (localStorage) ───────────────────────────────────────────
const RATING_KEY = 'drift_ratings_v1';
function getRatings() { try { return JSON.parse(localStorage.getItem(RATING_KEY) || '{}'); } catch(e) { return {}; } }
function saveRating(spotId, stars) {
  const r = getRatings();
  if (!r[spotId]) r[spotId] = { total: 0, count: 0, mine: 0 };
  if (r[spotId].mine > 0) { r[spotId].total -= r[spotId].mine; r[spotId].count--; }
  r[spotId].total += stars; r[spotId].count++; r[spotId].mine = stars;
  localStorage.setItem(RATING_KEY, JSON.stringify(r));
}
function getAvg(spotId) {
  const r = getRatings()[spotId];
  if (!r || r.count === 0) return null;
  return { avg: Math.round(r.total / r.count * 10) / 10, count: r.count, mine: r.mine };
}

// ── Filter rendering ─────────────────────────────────────────────────────
function renderSubPills() {
  const container = document.getElementById('subPills');
  const opts = SUB_OPTIONS[currentType] || [];
  if (!opts.length) { container.innerHTML = ''; return; }
  container.innerHTML = opts.map(o =>
    `<button class="fpill${currentSub === o ? ' active' : ''}" onclick="setSub('${o}')">${o}</button>`
  ).join('');
}

function setType(type) {
  currentType = type;
  currentSub = 'all';
  ['all','food','attraction'].forEach(t => {
    document.getElementById('pill-' + t).classList.toggle('active', t === type);
  });
  renderSubPills();
  renderCards();
}

function setSub(sub) {
  currentSub = (currentSub === sub) ? 'all' : sub; // toggle
  renderSubPills();
  renderCards();
}

function toggleNearby() {
  nearbyOnly = !nearbyOnly;
  document.getElementById('nearbyPill').classList.toggle('on', nearbyOnly);
  renderCards();
}

// ── Card filtering ───────────────────────────────────────────────────────
function getFiltered() {
  return SPOTS.filter(s => {
    if (currentType !== 'all' && s.type !== currentType) return false;
    if (nearbyOnly && !s.nearby) return false;
    if (currentSub === 'all') return true;
    return s.cat === currentSub || s.route === currentSub;
  });
}

// ── Render cards ─────────────────────────────────────────────────────────
function renderCards() {
  const wrap = document.getElementById('spotsWrap');
  const list = getFiltered();
  if (!list.length) {
    wrap.innerHTML = '<div class="empty-state">這個分類暫無資料。</div>';
    return;
  }
  wrap.innerHTML = list.map(s => {
    const sel  = selected.has(s.id);
    const tbd  = s.status === 'tbd';
    const irr  = s.status === 'irregular';
    const ratingData = getAvg(s.id);

    const metaChips = [
      `<span class="m-chip m-area">${s.area}</span>`,
      s.nearby ? '<span class="m-chip m-nearby">民宿附近</span>' : '',
      irr ? '<span class="m-chip m-irr">不定時</span>' : '',
      ratingData ? `<span class="m-chip m-nearby" style="background:rgba(196,137,106,0.1);color:var(--accent)">★ ${ratingData.avg}</span>` : '',
      (s.price && s.price !== '?') ? `<span class="m-price">${s.price}</span>` : '',
    ].filter(Boolean).join('');

    return `<div class="spot-card${sel ? ' selected' : ''}${tbd ? ' tbd' : ''}"
      onclick="${tbd ? '' : `openDetail('${s.id}')`}" data-id="${s.id}">
      <div class="card-row1">
        <div class="card-name">${s.name}</div>
        ${tbd ? '' : `<button class="card-route-btn" onclick="event.stopPropagation();toggleSpot('${s.id}')" title="${sel ? '從路線移除' : '加入路線'}">${sel ? '✓' : '＋'}</button>`}
      </div>
      ${s.feature ? `<div class="card-sub">${s.feature}</div>` : ''}
      <div class="card-meta">${metaChips}</div>
      ${tbd
        ? '<div class="card-tbd-text">✦ 業主私藏，詳細資訊整理中</div>'
        : `<div class="card-quote">${s.note}</div>`
      }
      <div class="card-footer">
        <div class="card-tags">${s.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
        ${tbd ? '' : '<span class="card-more">詳細 →</span>'}
      </div>
    </div>`;
  }).join('');
}

// ── Toggle spot in/out of route plan ─────────────────────────────────────
function toggleSpot(id) {
  const s = SPOTS.find(x => x.id === id);
  if (!s || s.noLoc || s.status === 'tbd') return;
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderCards();
  updateFab();
  if (currentDetailId === id) updateDetailFooter(s);
}

function updateFab() {
  const n = selected.size;
  document.getElementById('fabBadge').textContent = n;
  document.getElementById('planFab').classList.toggle('visible', n > 0);
}

// ── Persona bubble ───────────────────────────────────────────────────────
let _personaBubble = null;
function showPersonaBubble(el, persona) {
  if (!persona) return;
  hidePersonaBubble();
  const bubble = document.createElement('div');
  bubble.className = 'persona-bubble';
  bubble.textContent = persona;
  document.body.appendChild(bubble);
  _personaBubble = bubble;

  const rect = el.getBoundingClientRect();
  const bw = 240;
  let left = rect.left;
  if (left + bw > window.innerWidth - 12) left = window.innerWidth - bw - 12;
  bubble.style.left = left + 'px';
  bubble.style.top = (rect.bottom + 10) + 'px';
  requestAnimationFrame(() => bubble.classList.add('visible'));

  setTimeout(hidePersonaBubble, 3200);
}
function hidePersonaBubble() {
  if (_personaBubble) { _personaBubble.remove(); _personaBubble = null; }
}
document.addEventListener('click', function(e) {
  if (_personaBubble && !e.target.classList.contains('friend-author')) hidePersonaBubble();
});

// ── GAS reviews loader ───────────────────────────────────────────────────
const _reviewsCache = {};
async function loadReviews(spotId) {
  if (_reviewsCache[spotId]) return _reviewsCache[spotId];
  try {
    const cfg = window.FRONTEND_CONFIG || {};
    const url = cfg.API_URL_ADMIN || cfg.API_URL_PUBLIC || cfg.API_URL || '';
    if (!url) return [];
    const res = await fetch(url + '?action=getDriftReviews&spotId=' + encodeURIComponent(spotId));
    const data = await res.json();
    if (data.success && Array.isArray(data.reviews)) {
      _reviewsCache[spotId] = data.reviews;
      return data.reviews;
    }
  } catch(e) { /* fallback to local */ }
  return [];
}

function buildFriendReviewsHtml(reviews) {
  if (!reviews || !reviews.length) return '';
  return `<div class="friend-reviews">
    <div class="review-label">好友評論</div>
    ${reviews.map(r => `
      <div class="friend-card">
        <span class="friend-author"
          onclick="event.stopPropagation();showPersonaBubble(this,'${(r.persona||'').replace(/'/g,'&#39;')}')"
          title="${r.persona ? '點擊看個人簡介' : ''}"
        >${r.author}</span>
        <div class="friend-note">「 ${r.note} 」</div>
      </div>`).join('')}
  </div>`;
}

// ── Detail sheet ─────────────────────────────────────────────────────────
function openDetail(id) {
  const s = SPOTS.find(x => x.id === id);
  if (!s) return;
  currentDetailId = id;

  // Hero
  document.getElementById('detailHeroBg').className = 'detail-hero-bg ' + s.gradClass;
  document.getElementById('detailHeroName').textContent = s.name;

  // Nav button
  const navBtn = document.getElementById('detailNavBtn');
  navBtn.style.display = (s.lat && s.lng && !s.noLoc) ? '' : 'none';

  // Render with local fallback reviews first
  const localReviews = (s.expertReviews || []).map(r => ({
    author: r.author, persona: null, note: r.note, isOwner: r.author === '主理人'
  }));
  _renderDetailBody(s, localReviews);

  updateDetailFooter(s);
  document.getElementById('detailSheet').classList.add('active');
  document.getElementById('sheetBackdrop').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Async: load live reviews and refresh
  loadReviews(id).then(reviews => {
    if (currentDetailId !== id) return; // sheet closed already
    if (reviews.length > 0 || localReviews.length === 0) {
      _renderDetailBody(s, reviews);
    }
  });
}

function _renderDetailBody(s, reviews) {
  const id = s.id;
  const ratingData = getAvg(id);
  const avgDisplay = ratingData ? `${ratingData.avg}` : '—';
  const countDisplay = ratingData ? `${ratingData.count} 人評分` : '尚無評分';
  const myRating = ratingData ? ratingData.mine : 0;

  // Split owner review vs friend reviews
  const ownerReview = reviews.find(r => r.isOwner);
  const friendReviews = reviews.filter(r => !r.isOwner);
  const friendHtml = buildFriendReviewsHtml(friendReviews);

  const ownerNote = ownerReview ? ownerReview.note : s.note;

  const mapsHtml = (s.lat && s.lng && !s.noLoc)
    ? `<a class="maps-link" href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener">在 Google Maps 查看 ↗</a>`
    : '';

  const featureHtml = s.feature
    ? `<div class="features-section">
        <div class="review-label">招牌推薦</div>
        <div class="feature-chips">${s.feature.split('、').map(f => `<span class="feature-chip">${f}</span>`).join('')}</div>
      </div>`
    : '';

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-name">${s.name}</div>
    ${s.feature ? `<div class="detail-subtitle">${s.feature}</div>` : ''}
    <div class="detail-meta">
      <span class="m-chip m-area">${s.area}</span>
      ${s.nearby ? '<span class="m-chip m-nearby">民宿附近</span>' : ''}
      ${s.status === 'irregular' ? '<span class="m-chip m-irr">不定時出攤</span>' : ''}
      ${s.price && s.price !== '?' ? `<span class="m-price">${s.price}</span>` : ''}
    </div>

    <div class="review-label">雫旅簡評</div>
    <div class="review-rule"></div>
    ${ownerNote && ownerNote.length > 10
      ? `<div class="owner-text">${ownerNote}</div>`
      : `<div class="owner-tbd"><p>✦ 深度點評撰寫中 ✦<br><span style="font-size:12px">這個地方值得一篇好文，即將完成。</span></p></div>`
    }

    ${friendHtml}

    <div class="stars-section">
      <div class="review-label">旅人評分</div>
      <div class="stars-avg-row">
        <span class="stars-avg-num">${avgDisplay}</span>
        <span class="stars-avg-denom">/ 5</span>
        <span class="stars-count">${countDisplay}</span>
      </div>
      <div class="stars-row" id="starsRow">
        ${[1,2,3,4,5].map(n => `<button class="star-btn${n <= myRating ? ' lit' : ''}" onclick="rateSpot('${id}',${n})">★</button>`).join('')}
      </div>
      <div class="stars-hint" id="starsHint">${myRating > 0 ? `你給了 ${myRating} 星` : '點擊星星評分'}</div>
    </div>

    ${featureHtml}
    ${mapsHtml}
  `;
}

function updateDetailFooter(s) {
  const btn = document.getElementById('detailRouteBtn');
  const sel = selected.has(s.id);
  btn.textContent = sel ? '✓ 已加入' : '加入路線';
  btn.className = 'btn-route-add' + (sel ? ' added' : '');
  btn.disabled = !!(s.noLoc || s.status === 'tbd');
}

function toggleFromDetail() {
  if (currentDetailId) toggleSpot(currentDetailId);
}

function navigateTo() {
  const s = SPOTS.find(x => x.id === currentDetailId);
  if (s && s.lat && s.lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`, '_blank');
  }
}

function closeDetail() {
  document.getElementById('detailSheet').classList.remove('active');
  document.getElementById('sheetBackdrop').classList.remove('active');
  document.body.style.overflow = '';
  currentDetailId = null;
  hidePersonaBubble();
}

// ── Star rating interaction ───────────────────────────────────────────────
function rateSpot(spotId, stars) {
  saveRating(spotId, stars);
  const ratingData = getAvg(spotId);
  // Update stars row
  const row = document.getElementById('starsRow');
  if (row) {
    row.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('lit', i < stars);
    });
  }
  // Update display
  const avgEl = document.querySelector('.stars-avg-num');
  const countEl = document.querySelector('.stars-count');
  const hintEl = document.getElementById('starsHint');
  if (avgEl && ratingData) avgEl.textContent = ratingData.avg;
  if (countEl && ratingData) countEl.textContent = ratingData.count + ' 人評分';
  if (hintEl) hintEl.textContent = `你給了 ${stars} 星`;
  // Refresh card if visible
  renderCards();
}

  renderPlanList();
  document.getElementById('planSheet').classList.add('active');
  document.getElementById('sheetBackdrop').classList.add('active');
}

function hidePlanSheet() {
  document.getElementById('planSheet').classList.remove('active');

function renderPlanList() {
  const spots = SPOTS.filter(s => selected.has(s.id));

    el.innerHTML = '<div class="plan-empty">還沒有加入任何地點</div>';

  el.innerHTML = spots.map((s, i) => `
    <div class="plan-item">

      <button class="plan-remove" onclick="toggleSpot('${s.id}');renderPlanList();">×</button>
    </div>`).join('');
}

function clearPlan() {
  selected.clear();
  renderCards();
  updateFab();
  renderPlanList();
}

function closeAllSheets() {
  hidePlanSheet();
  closeDetail();
}

// ── Navigation ───────────────────────────────────────────────────────────
function startNavigation() {
  const spots = SPOTS.filter(s => selected.has(s.id) && s.lat && s.lng);
  if (!spots.length) return;
  const route = optimize(spots);
  const wp = route.map(r => `${r.spot.lat},${r.spot.lng}`).join('/');
  window.open(`https://www.google.com/maps/dir/${HOME.lat},${HOME.lng}/${wp}`, '_blank');
}

function showRouteMap() {
  hidePlanSheet();
  const spots = SPOTS.filter(s => selected.has(s.id));
  if (!spots.length) return;
  document.getElementById('mapOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
  const route = optimize(spots);
  setTimeout(() => buildMap(route), 60);
  buildRoutePanel(route);
  const wp = route.map(r => `${r.spot.lat},${r.spot.lng}`).join('/');
  document.getElementById('gmapsLink').href = `https://www.google.com/maps/dir/${HOME.lat},${HOME.lng}/${wp}`;
}

function hideRouteMap() {
  document.getElementById('mapOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ── Route algo ───────────────────────────────────────────────────────────
function dist(a, b) {
  const R = 6371, dLat = ((b.lat - a.lat) * Math.PI) / 180, dLng = ((b.lng - a.lng) * Math.PI) / 180;
  const x = Math.sin(dLat / 2) ** 2 + Math.cos((a.lat * Math.PI) / 180) * Math.cos((b.lat * Math.PI) / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}
function optimize(spots) {
  const route = []; let cur = HOME, rem = [...spots];
  while (rem.length) {
    let nearest, min = Infinity;
    rem.forEach(s => { const d = dist(cur, s); if (d < min) { min = d; nearest = s; } });
    route.push({ spot: nearest, km: min, min: Math.max(3, Math.ceil(min / 0.45)) });
    cur = nearest; rem = rem.filter(s => s.id !== nearest.id);
  }
  return route;
}

// ── Leaflet map ──────────────────────────────────────────────────────────
function buildMap(route) {
  if (!leafletMap) {
    leafletMap = L.map('map', { zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© <a href="https://openstreetmap.org">OSM</a>' }).addTo(leafletMap);
    L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);
  } else {
    leafletMap.eachLayer(l => { if (!(l instanceof L.TileLayer)) leafletMap.removeLayer(l); });
  }
  L.marker([HOME.lat, HOME.lng], { icon: L.divIcon({ html: `<div style="width:30px;height:30px;border-radius:50%;background:#2C2620;display:flex;align-items:center;justify-content:center;color:#F8F5F0;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.3)">雫</div>`, className: '', iconSize: [30, 30], iconAnchor: [15, 15] }) }).addTo(leafletMap).bindPopup('<strong>雫旅 Drop Inn</strong>');
  route.forEach((r, i) => {
    L.marker([r.spot.lat, r.spot.lng], { icon: L.divIcon({ html: `<div style="width:30px;height:30px;border-radius:50%;background:#C4896A;display:flex;align-items:center;justify-content:center;color:white;font-family:'Cormorant Garamond',serif;font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.3)">${i + 1}</div>`, className: '', iconSize: [30, 30], iconAnchor: [15, 15] }) }).addTo(leafletMap).bindPopup(`<strong>${r.spot.name}</strong><br>${r.spot.area}`);
  });
  const pts = [[HOME.lat, HOME.lng], ...route.map(r => [r.spot.lat, r.spot.lng])];
  L.polyline(pts, { color: '#C4896A', weight: 2, opacity: 0.65, dashArray: '6 6' }).addTo(leafletMap);
  leafletMap.fitBounds(L.latLngBounds(pts), { padding: [36, 36] });
  leafletMap.invalidateSize();
}

function buildRoutePanel(route) {
  const totalKm = route.reduce((s, r) => s + r.km, 0);
  document.getElementById('routePanel').innerHTML = `
    <div class="route-item"><div class="route-dot dot-home">雫</div><div class="route-info"><div class="route-name">雫旅 Drop Inn</div><div class="route-sub">出發點 · 湖西鄉成功村</div></div></div>
    ${route.map((r, i) => `
      <div class="drive-line">↓ 開車約 ${r.min} 分鐘（${r.km.toFixed(1)} km）</div>
      <div class="route-item"><div class="route-dot dot-stop">${i + 1}</div><div class="route-info"><div class="route-name">${r.spot.name}</div><div class="route-sub">${r.spot.area}${r.spot.feature ? ' · ' + r.spot.feature : ''}</div></div></div>
    `).join('')}
    <div class="route-summary">共 ${route.length} 個地點 · 總移動距離約 ${totalKm.toFixed(1)} km</div>`;
}

// ── GAS loader ───────────────────────────────────────────────────────────
async function loadFromGAS() {
  try {
    const cfg = window.FRONTEND_CONFIG || {};
    const url = cfg.API_URL_PUBLIC || cfg.API_URL || '';
    if (!url) throw new Error('no url');
    const res = await fetch(url + '?action=getDriftSpots');
    const data = await res.json();
    if (data.success && Array.isArray(data.spots) && data.spots.length > 0) {
      SPOTS.length = 0;
      data.spots.forEach(s => SPOTS.push(s));
    }
  } catch(e) {
    console.warn('⚠️ Drift GAS 載入失敗，使用本地資料', e);
  }
  renderSubPills();
  renderCards();
  updateFab();
}

// ── Init ─────────────────────────────────────────────────────────────────
loadFromGAS();
</script>
