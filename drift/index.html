<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Drift ｜ 探索</title>
  <script src="/config.public.js?v=2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root {
      --bg: #f5f1ec; --ink: #1a1210; --muted: #6b5f56;
      --accent: #b8795a; --border: rgba(181, 171, 160, 0.3);
      --pending: #e8e1d7; --has-room: rgba(184, 121, 90, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      background-color: var(--bg); color: var(--ink);
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ── Auth overlay ── */
    #driftAuthOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
      font-family: 'Noto Serif TC', serif;
    }

    /* ── Header ── */
    header { padding: 36px 20px 0; text-align: center; z-index: 10; flex-shrink: 0; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300;
      letter-spacing: 0.15em; color: var(--ink); margin-bottom: 12px;
    }
    .drop-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      margin: 0 auto 16px; opacity: 0.5;
    }
    .filter-wrapper { display: flex; justify-content: center; margin-bottom: 24px; }
    .custom-select {
      width: 100%; max-width: 160px; padding: 8px 30px 8px 16px;
      border-radius: 12px; border: 1px solid rgba(181, 171, 160, 0.45);
      background-color: transparent;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b5f56' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
      appearance: none; -webkit-appearance: none;
      font-family: 'Noto Serif TC', serif; color: var(--ink);
      font-size: 12px; letter-spacing: 0.1em;
      text-align: center; text-align-last: center;
      cursor: pointer;
    }

    /* ── Carousel ── */
    .carousel-container {
      flex: 1; position: relative; display: flex;
      justify-content: center; align-items: center;
      overflow: hidden; width: 100%;
    }
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--ink);
      padding: 20px 15px; cursor: pointer; z-index: 50; opacity: 0.2;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s, color 0.2s;
    }
    .nav-arrow svg { width: 32px; height: 32px; stroke-width: 1; }
    .left-arrow { left: 2%; }
    .right-arrow { right: 2%; }
    .nav-arrow:active { transform: translateY(-50%) scale(1.5); opacity: 1; color: var(--accent); }
    .nav-arrow:disabled { opacity: 0 !important; pointer-events: none; }

    /* ── Gallery card ── */
    .gallery-card {
      position: absolute; width: 70%; max-width: 280px; height: 58vh;
      background: rgba(245, 241, 236, 0.85); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 16px;
      display: flex; flex-direction: column;
      transition: transform 0.36s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.36s ease, box-shadow 0.36s ease;
      overflow: hidden; will-change: transform, opacity;
      cursor: pointer; visibility: hidden;
    }
    .gallery-card.dragging {
      transition: none !important;
    }
    .gallery-card.is-center {
      box-shadow: 0 15px 35px rgba(26, 18, 16, 0.08);
      border-color: rgba(181, 171, 160, 0.5);
    }
    .gallery-card.is-center:active { opacity: 0.92; }

    .card-image {
      height: 42%; flex-shrink: 0; display: flex;
      justify-content: center; align-items: center; color: var(--muted);
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px;
      letter-spacing: 0.1em; position: relative; border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .card-image-placeholder { width: 100%; height: 100%; }
    .grad-1 { background: linear-gradient(145deg, #f0d0b0 0%, #d4946a 40%, #a86840 100%); }
    .grad-2 { background: linear-gradient(145deg, #c8d8ec 0%, #8aaac8 40%, #5680a8 100%); }
    .grad-3 { background: linear-gradient(145deg, #c8e0c8 0%, #80b078 40%, #507850 100%); }
    .grad-4 { background: linear-gradient(145deg, #e8dcc0 0%, #c8b078 40%, #a08040 100%); }

    .recommender-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--accent); padding: 4px 10px; border-radius: 8px;
      font-size: 10px; letter-spacing: 0.1em; pointer-events: none;
    }
    .card-content { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .card-name {
      font-size: 20px; font-weight: 400; color: var(--ink);
      font-family: 'Cormorant Garamond', serif; margin-bottom: 4px; line-height: 1.2;
    }
    .card-tags { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 10px; }
    .card-quote {
      font-size: 13px; color: var(--ink); line-height: 1.8; flex: 1;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .card-tbd {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 13px; color: var(--muted); margin-top: 4px;
      letter-spacing: 0.08em; flex: 1;
    }

    .actions {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-solid {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 10px; padding: 10px 0;
      font-family: 'Noto Serif TC', serif; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer;
    }
    .btn-outline {
      flex: 1; background: transparent; color: var(--ink);
      border: 1px solid rgba(181,171,160,0.45);
      border-radius: 10px; padding: 10px 0;
      font-family: 'Noto Serif TC', serif; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-outline.in-bag {
      background: var(--has-room);
      border-color: rgba(184, 121, 90, 0.4);
      color: var(--accent);
    }

    .added-stamp {
      position: absolute; top: 45%; left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      border: 1.5px solid var(--accent); color: var(--accent);
      padding: 6px 20px; border-radius: 8px; font-size: 16px;
      letter-spacing: 0.2em; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; background: rgba(245, 241, 236, 0.9); z-index: 10;
    }
    .gallery-card.in-bag .added-stamp { opacity: 1; }

    /* ── Empty state in carousel ── */
    #empty-state {
      display: none; color: var(--muted); font-size: 13px;
      letter-spacing: 0.1em; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
    }

    /* ── Itinerary drawer ── */
    .itinerary-drawer {
      padding: 12px 20px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border); display: flex;
      justify-content: space-between; align-items: center;
      z-index: 10; background: var(--bg); flex-shrink: 0;
    }
    .drawer-info {
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 0.15em; color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .bag-count { color: var(--accent); font-size: 18px; font-weight: 400; transition: transform 0.2s; }
    .bag-count.bump { transform: scale(1.5); }
    .drawer-btn {
      padding: 10px 20px; font-size: 12px; border-radius: 12px;
      font-family: 'Noto Serif TC', serif; letter-spacing: 0.1em;
      border: none; transition: all 0.2s;
    }

    /* ── Backdrop ── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(26, 18, 16, 0.3);
      z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }

    /* ── Bottom sheets shared ── */
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-radius: 22px 22px 0 0;
      z-index: 50; display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      max-height: 90vh;
    }
    .bottom-sheet.active { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: rgba(26, 18, 16, 0.12);
      border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
    }

    /* ── Detail sheet ── */
    #detailSheet { z-index: 52; max-height: 92vh; }
    .detail-close-bar {
      display: flex; justify-content: flex-end; padding: 12px 16px 0; flex-shrink: 0;
    }
    .detail-close-btn {
      background: var(--pending); border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 16px; color: var(--muted);
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .detail-body { padding: 14px 22px 0; }

    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400; letter-spacing: 0.04em;
      color: var(--ink); margin-bottom: 6px; line-height: 1.3;
    }
    .detail-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; font-style: italic; margin-bottom: 14px; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
    .d-chip { font-size: 11px; border-radius: 100px; padding: 3px 10px; letter-spacing: 0.05em; }
    .d-area { background: rgba(26,18,16,0.06); color: var(--muted); }
    .d-type { background: var(--has-room); color: var(--accent); }
    .d-irr { background: rgba(26,18,16,0.05); color: var(--muted); }

    .review-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .review-rule { width: 24px; height: 1px; background: var(--accent); opacity: 0.5; margin-bottom: 14px; }
    .owner-text { font-size: 15px; color: var(--ink); line-height: 2.1; letter-spacing: 0.06em; margin-bottom: 24px; }
    .owner-tbd {
      background: var(--pending); border-radius: 12px; padding: 20px;
      text-align: center; margin-bottom: 24px;
    }
    .owner-tbd p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--muted); line-height: 2; letter-spacing: 0.08em;
    }

    .friend-reviews { margin-top: 24px; margin-bottom: 24px; }
    .friend-card { background: var(--pending); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
    .friend-card:last-child { margin-bottom: 0; }
    .friend-author {
      display: inline-block; background: var(--has-room); color: var(--accent);
      border-radius: 100px; padding: 3px 10px; font-size: 10px;
      letter-spacing: 0.1em; margin-bottom: 8px; cursor: pointer;
      position: relative; transition: background 0.15s;
    }
    .friend-author:active { background: rgba(184, 121, 90, 0.22); }
    .friend-note { font-size: 13px; color: var(--muted); line-height: 1.9; letter-spacing: 0.05em; font-style: italic; }

    /* Persona bubble */
    .persona-bubble {
      position: fixed; z-index: 200; background: var(--ink); color: var(--bg);
      border-radius: 12px; padding: 12px 16px; font-size: 12px;
      line-height: 1.8; letter-spacing: 0.06em; max-width: 240px;
      pointer-events: none; box-shadow: 0 8px 32px rgba(26,18,16,0.22);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
    }
    .persona-bubble.visible { opacity: 1; transform: translateY(0); }
    .persona-bubble::before {
      content: ''; position: absolute; top: -6px; left: 20px;
      width: 12px; height: 12px; background: var(--ink);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    /* Star rating */
    .stars-section { margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--border); margin-bottom: 20px; }
    .stars-avg-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 14px; }
    .stars-avg-num { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--accent); font-weight: 300; }
    .stars-avg-denom { font-size: 13px; color: var(--muted); }
    .stars-count { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-left: 4px; }
    .stars-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .star-btn {
      font-size: 26px; background: none; border: none;
      color: rgba(26, 18, 16, 0.15); padding: 2px;
      transition: color 0.12s, transform 0.12s; line-height: 1;
    }
    .star-btn.lit { color: var(--accent); }
    .star-btn:active { transform: scale(1.2); }
    .stars-hint { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

    /* Features */
    .features-section { margin-bottom: 22px; }
    .feature-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .feature-chip {
      font-size: 12px; color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 100px;
      padding: 4px 11px; letter-spacing: 0.04em;
    }

    /* Maps link */
    .maps-link {
      display: inline-block; margin-bottom: 28px; font-size: 12px;
      color: var(--accent); letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(184, 121, 90, 0.35); padding-bottom: 1px;
    }

    /* Detail footer */
    .detail-footer {
      display: flex; gap: 10px; padding: 14px 20px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-nav {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-route-add {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 12px; padding: 13px 16px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.06em;
      white-space: nowrap; transition: all 0.16s;
    }
    .btn-route-add.added { background: var(--has-room); border-color: rgba(184,121,90,0.4); color: var(--accent); }

    /* ── Plan sheet ── */
    #planSheet { z-index: 51; }
    .plan-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .plan-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.2em; color: var(--ink); }
    .plan-clear { background: none; border: none; font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
    .plan-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .plan-empty {
      padding: 36px 20px; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--muted); letter-spacing: 0.08em;
    }
    .plan-item {
      display: flex; align-items: center; padding: 12px 20px; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); color: var(--bg);
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .plan-info { flex: 1; }
    .plan-iname { font-size: 14px; color: var(--ink); letter-spacing: 0.04em; }
    .plan-iarea { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }
    .plan-remove { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px; line-height: 1; }
    .plan-footer { display: flex; gap: 10px; padding: 14px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .btn-start-nav {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-show-map {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 12px; padding: 13px 14px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 12px; letter-spacing: 0.06em; white-space: nowrap;
    }

    /* ── Route map overlay ── */
    .map-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 60;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.32s ease;
    }
    .map-overlay.active { transform: translateY(0); }
    .map-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-back { background: none; border: none; font-size: 13px; color: var(--muted); letter-spacing: 0.08em; }
    .map-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; letter-spacing: 0.25em; color: var(--ink); }
    .map-gmaps { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); border-bottom: 1px solid rgba(184,121,90,0.4); padding-bottom: 1px; }
    #map { flex: 0 0 42vh; min-height: 180px; }
    .route-panel { flex: 1; overflow-y: auto; padding: 16px 20px 24px; -webkit-overflow-scrolling: touch; }
    .route-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .route-item:last-of-type { border-bottom: none; }
    .route-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--bg); }
    .dot-home { background: var(--ink); font-size: 12px; }
    .dot-stop { background: var(--accent); }
    .route-info { flex: 1; }
    .route-name { font-size: 14px; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; line-height: 1.5; }
    .route-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }
    .drive-line { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; padding: 5px 0 2px 40px; }
    .route-summary { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; line-height: 2; }

    /* ── Desktop ── */
    @media (min-width: 640px) {
      .bottom-sheet { max-width: 480px; left: 50%; right: auto; transform: translateX(-50%) translateY(100%); }
      .bottom-sheet.active { transform: translateX(-50%) translateY(0); }
      #detailSheet { max-width: 520px; }
    }

    /* ── Mobile ── */
    @media (max-width: 639px) {
      /* 壓縮 header，讓卡片區更大 */
      header { padding: 22px 20px 0; }
      .page-title { font-size: 28px; margin-bottom: 8px; }
      .drop-line { height: 24px; margin-bottom: 10px; }
      .filter-wrapper { margin-bottom: 14px; }

      /* 手機滑動就夠了，箭頭拿掉 */
      .nav-arrow { display: none !important; }

      /* 卡片可以更高 */
      .gallery-card { height: 66vh; }

      /* ── 底部 bar → 浮動藥丸 ── */
      .itinerary-drawer {
        /* 脫離 flex flow，浮在畫面底部 */
        position: fixed;
        bottom: calc(22px + env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        width: auto;
        min-width: 180px;
        border-top: none;
        /* 藥丸外觀 */
        background: var(--ink);
        border-radius: 100px;
        padding: 11px 22px;
        gap: 16px;
        box-shadow: 0 8px 28px rgba(26, 18, 16, 0.28);
        /* 預設不可見 */
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
        z-index: 20;
      }
      /* 有景點時浮現 */
      .itinerary-drawer.has-items {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }
      /* 文字顏色反轉（深底白字） */

<div id="driftAuthOverlay">

    <div style="font-family:'Cormorant Garamond',serif;font-size:32px;letter-spacing:0.12em;font-weight:300;margin-bottom:4px;">Drift</div>
    <div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;">雫旅專屬 · 請登入</div>
  </div>
  <input id="driftLoginInput" type="text" placeholder="帳號"
    style="border:1px solid rgba(181,171,160,0.5);background:var(--pending);border-radius:8px;padding:10px 20px;font-size:15px;font-family:'Noto Serif TC',serif;color:var(--ink);text-align:center;outline:none;width:220px;letter-spacing:0.08em;"
    autocomplete="username" autocapitalize="none" spellcheck="false"
    onkeydown="if(event.key==='Enter') document.getElementById('driftKeyInput').focus()">
  <input id="driftKeyInput" type="password" placeholder="密碼"
    style="border:1px solid rgba(181,171,160,0.5);background:var(--pending);border-radius:8px;padding:10px 20px;font-size:15px;font-family:'Noto Serif TC',serif;color:var(--ink);text-align:center;outline:none;width:220px;letter-spacing:0.08em;"
    autocomplete="current-password"
    onkeydown="if(event.key==='Enter') _driftAuth()">
  <div id="driftAuthErr" style="font-size:12px;color:var(--accent);display:none;">登入失敗，請再試一次</div>
  <button onclick="_driftAuth()" style="background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:10px 32px;font-size:13px;font-family:'Noto Serif TC',serif;letter-spacing:0.12em;">進入</button>
</div>
<script>
(function() {
  var STORAGE_KEY = 'drift_user_token';
  async function _driftAuth() {
    var loginId = (document.getElementById('driftLoginInput').value || '').trim();
    var password = document.getElementById('driftKeyInput').value || '';
    if (!loginId || !password) return;
    try {
      var res = await fetch('/api/drift/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ loginId: loginId, password: password })
      });
      var data = await res.json();
      if (!res.ok || !data.success || !data.token) throw new Error(data.error || 'login failed');
      localStorage.setItem(STORAGE_KEY, data.token);
      document.getElementById('driftAuthOverlay').style.display = 'none';
      document.body.style.overflow = '';
    } catch (e) {
      document.getElementById('driftAuthErr').style.display = 'block';
      document.getElementById('driftKeyInput').value = '';
      document.getElementById('driftLoginInput').focus();
    }
  }
  window._driftAuth = _driftAuth;
  var stored = localStorage.getItem(STORAGE_KEY);
  var overlay = document.getElementById('driftAuthOverlay');
  if (stored) {
    overlay.style.display = 'none';
  } else {
    overlay.style.display = 'flex';
    document.documentElement.style.visibility = 'hidden';
    window.addEventListener('DOMContentLoaded', function() {
      document.documentElement.style.visibility = '';
      if (overlay.style.display !== 'none') document.body.style.overflow = 'hidden';
      document.getElementById('driftLoginInput').focus();
    });
  }
})();
</script>

// Persona data for friend reviewers
const PERSONAS = {
  '主理人': '雫旅 Drop Inn 的主理人，在澎湖生活多年，深諳在地飲食文化，選點嚴格但用心。',
  '好友 A': '常駐澎湖的美食獵人，每年至少造訪三次，口味刁鑽，擅長發掘巷弄私藏。',

// ── State ──────────────────────────────────────────────────────────────────
const bag = new Set();
let filteredSpots = [];
let currentIndex  = 0;
let currentFilter = '雫旅推薦';
let currentDetailId = null;
let leafletMap = null;

// ── Star rating (localStorage) ──────────────────────────────────────────────
const RATING_KEY = 'drift_ratings_v1';
function getRatings() { try { return JSON.parse(localStorage.getItem(RATING_KEY) || '{}'); } catch(e) { return {}; } }
function saveRating(spotId, stars) {
  const r = getRatings();
  if (!r[spotId]) r[spotId] = { total: 0, count: 0, mine: 0 };
  if (r[spotId].mine > 0) { r[spotId].total -= r[spotId].mine; r[spotId].count--; }
  r[spotId].total += stars; r[spotId].count++; r[spotId].mine = stars;
  localStorage.setItem(RATING_KEY, JSON.stringify(r));
}
function getAvg(spotId) {
  const r = getRatings()[spotId];
  if (!r || r.count === 0) return null;
  return { avg: Math.round(r.total / r.count * 10) / 10, count: r.count, mine: r.mine };
}

// ── Filter ─────────────────────────────────────────────────────────────────
function applyFilter(val) {
  const areas = ['馬公','湖西','白沙','西嶼','七美'];
  if (val === '雫旅推薦') {
    // Spots that have a 主理人 review OR rating === 3, exclude tbd
    return SPOTS.filter(s => s.status !== 'tbd' && (
      s.rating === 3 ||
      (s.expertReviews && s.expertReviews.some(r => r.author && r.author.includes('主理人')))
    ));
  }
  if (val === '最多星星') {
    return [...SPOTS]
      .filter(s => s.status !== 'tbd' && s.rating > 0)
      .sort((a, b) => b.rating - a.rating);
  }
  if (val === '全部')          return [...SPOTS];
  if (areas.includes(val))    return SPOTS.filter(s => s.area === val);
  if (val === '景點')          return SPOTS.filter(s => s.type === 'attraction');
  return SPOTS.filter(s => s.cat === val);
}

function setFilter(val) {
  currentFilter = val;
  filteredSpots  = applyFilter(val);
  currentIndex   = 0;
  updateCardPool();
  updateNavArrows();
}

// ── Badge helper ───────────────────────────────────────────────────────────
function getBadge(s) {
  if (!s.expertReviews || !s.expertReviews.length) return '探索';
  return s.expertReviews.some(r => r.author && r.author.includes('主理人'))
    ? '主理人私藏' : '好友推薦';
}

// ── Coverflow card pool (5 persistent DOM nodes) ───────────────────────────
// Slot indices: 0=far-left, 1=left, 2=center, 3=right, 4=far-right
const SLOT_CONFIG = [
  { tx: -110, scale: 0.75, opacity: 0.28, z: 4 },
  { tx: -62,  scale: 0.88, opacity: 0.60, z: 7 },
  { tx:   0,  scale: 1.02, opacity: 1,    z: 10 },
  { tx:  62,  scale: 0.88, opacity: 0.60, z: 7 },
  { tx: 110,  scale: 0.75, opacity: 0.28, z: 4 },
];
const CARD_POOL = [];

function initCardPool() {
  const container = document.getElementById('carousel-container');
  const nextBtn   = document.getElementById('next-btn');
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'gallery-card';
    container.insertBefore(el, nextBtn);
    CARD_POOL.push(el);
  }
}

function fillCardSlot(slotIdx, spot) {
  const el  = CARD_POOL[slotIdx];
  const cfg = SLOT_CONFIG[slotIdx];
  const isCenter = slotIdx === 2;
  const tbd  = spot.status === 'tbd';
  const inBag = bag.has(spot.id);
  const badge = getBadge(spot);

  // Content
  el.className = 'gallery-card' +
    (isCenter ? ' is-center' : '') +
    (inBag ? ' in-bag' : '');
  el.dataset.id = spot.id;
  el.innerHTML = `
    <div class="card-image">
      <div class="card-image-placeholder ${spot.gradClass || 'grad-1'}"></div>
      <div class="recommender-badge">${badge}</div>
    </div>
    <div class="added-stamp">✓ 已收入</div>
    <div class="card-content">
      <div class="card-name">${spot.name}</div>
      <div class="card-tags">${spot.area}${spot.cat ? ' · ' + spot.cat : ''}</div>
      ${tbd
        ? '<div class="card-tbd-text">✦ 業主私藏，詳細資訊整理中</div>'
        : `<div class="card-quote">${spot.note}</div>`}
    </div>
    ${isCenter && !tbd ? `
    <div class="actions">
      <button class="btn-solid"
        onclick="event.stopPropagation();openDetail('${spot.id}')">深度點評</button>
      <button class="btn-outline${inBag ? ' in-bag' : ''}"
        onclick="event.stopPropagation();toggleBag('${spot.id}')">
        ${inBag ? '✓ 已收入' : '＋ 收入行程'}</button>
    </div>` : ''}`;

  // Position (applied after innerHTML so browser can batch)
  el.style.cssText += `;transform:translateX(${cfg.tx}%) scale(${cfg.scale});opacity:${cfg.opacity};z-index:${cfg.z};visibility:visible;`;

  // Click handler
  el.onclick = isCenter && !tbd
    ? () => openDetail(spot.id)
    : (slotIdx < 2 ? () => goPrev() : () => goNext());
}

function updateCardPool() {
  const emptyEl = document.getElementById('empty-state');
  if (!filteredSpots.length) {
    emptyEl.style.display = 'block';
    CARD_POOL.forEach(c => { c.style.visibility = 'hidden'; });
    return;
  }
  emptyEl.style.display = 'none';

  for (let slotIdx = 0; slotIdx < 5; slotIdx++) {
    const spotIdx = currentIndex + (slotIdx - 2); // -2…+2 offset
    if (spotIdx < 0 || spotIdx >= filteredSpots.length) {
      CARD_POOL[slotIdx].style.visibility = 'hidden';
    } else {
      fillCardSlot(slotIdx, filteredSpots[spotIdx]);
    }
  }
}

function updateNavArrows() {
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  document.getElementById('next-btn').disabled = currentIndex === filteredSpots.length - 1;
}

function goNext() {
  if (currentIndex >= filteredSpots.length - 1) return;
  currentIndex++;
  updateCardPool();
  updateNavArrows();
}

function goPrev() {
  if (currentIndex <= 0) return;
  currentIndex--;
  updateCardPool();
  updateNavArrows();
}

// ── Touch/swipe — real-time drag ───────────────────────────────────────────
let _tx = null;   // touchstart X
let _dragging = false;

function _setDragging(on) {
  _dragging = on;
  CARD_POOL.forEach(c => c.classList.toggle('dragging', on));
}

document.addEventListener('touchstart', e => {
  if (e.target.closest('.bottom-sheet,.map-overlay')) return;
  _tx = e.touches[0].clientX;
  _setDragging(true);
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (_tx === null || !_dragging) return;
  if (e.target.closest('.bottom-sheet,.map-overlay')) return;
  const dx = e.touches[0].clientX - _tx;
  const pct = (dx / window.innerWidth) * 80; // drag coefficient
  for (let i = 0; i < 5; i++) {
    const cfg = SLOT_CONFIG[i];
    const spotIdx = currentIndex + (i - 2);
    if (spotIdx < 0 || spotIdx >= filteredSpots.length) continue;
    CARD_POOL[i].style.transform =
      `translateX(${cfg.tx + pct}%) scale(${cfg.scale})`;
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  if (_tx === null) return;
  const dx = e.changedTouches[0].clientX - _tx;
  _tx = null;
  _setDragging(false);          // re-enable CSS transition
  if (Math.abs(dx) > 50) {
    if (dx < 0) goNext(); else goPrev();
  } else {
    updateCardPool();            // snap back
  }
}, { passive: true });

// ── Bag (itinerary) ────────────────────────────────────────────────────────
function toggleBag(id) {
  const s = SPOTS.find(x => x.id === id);
  if (!s || s.noLoc || s.status === 'tbd') return;
  if (bag.has(id)) bag.delete(id); else bag.add(id);
  updateBagUI();
  updateCardPool();
  if (currentDetailId === id) updateDetailFooter(s);
  // Auto-advance after adding
  if (bag.has(id)) {
    setTimeout(() => goNext(), 600);
  }
}

function updateBagUI() {
  const n = bag.size;
  const countEl = document.getElementById('bag-count');
  const btn = document.getElementById('nav-btn');
  const drawer = document.querySelector('.itinerary-drawer');
  countEl.textContent = n;
  btn.disabled = n === 0;
  // 手機：藥丸浮現 / 收起
  if (drawer) drawer.classList.toggle('has-items', n > 0);
  // Bump animation
  if (n > 0) {
    countEl.classList.remove('bump');
    void countEl.offsetWidth;
    countEl.classList.add('bump');
    setTimeout(() => countEl.classList.remove('bump'), 300);
  }
}

// ── Detail sheet ───────────────────────────────────────────────────────────
function cardClick(id) {
  // center card click — open detail
  openDetail(id);
}

function openDetail(id) {
  const s = SPOTS.find(x => x.id === id);
  if (!s) return;
  currentDetailId = id;

  const localReviews = (s.expertReviews || []).map(r => ({
    author: r.author, persona: PERSONAS[r.author] || null, note: r.note,
    isOwner: r.author === '主理人'
  }));

  _renderDetailBody(s, localReviews);
  updateDetailFooter(s);

  const navBtn = document.getElementById('detailNavBtn');
  navBtn.style.display = (s.lat && s.lng && !s.noLoc) ? '' : 'none';

  document.getElementById('detailSheet').classList.add('active');
  document.getElementById('sheetBackdrop').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Async live reviews
  loadReviews(id).then(reviews => {
    if (currentDetailId !== id) return;
    if (reviews.length > 0) _renderDetailBody(s, reviews);
  });
}

    <div class="review-label">雫旅簡評</div>
    <div class="review-rule"></div>
    ${ownerNote && ownerNote.length > 10
      ? `<div class="owner-text">${ownerNote}</div>`
      : `<div class="owner-tbd"><p>✦ 深度點評撰寫中 ✦<br><span style="font-size:12px">這個地方值得一篇好文，即將完成。</span></p></div>`
    }
    ${friendHtml}
    <div class="stars-section">
      <div class="review-label">旅人評分</div>
      <div class="stars-avg-row">
        <span class="stars-avg-num">${avgDisplay}</span>
        <span class="stars-avg-denom">/ 5</span>
        <span class="stars-count">${countDisplay}</span>
      </div>
      <div class="stars-row" id="starsRow">
        ${[1,2,3,4,5].map(n => `<button class="star-btn${n <= myRating ? ' lit' : ''}" onclick="rateSpot('${id}',${n})">★</button>`).join('')}
      </div>
      <div class="stars-hint" id="starsHint">${myRating > 0 ? `你給了 ${myRating} 星` : '點擊星星評分'}</div>
    </div>
    ${featureHtml}
    ${mapsHtml}
  `;
}

function updateDetailFooter(s) {
  const btn = document.getElementById('detailRouteBtn');
  const inBag = bag.has(s.id);
  btn.textContent = inBag ? '✓ 已加入' : '加入行程';

function toggleFromDetail() {

}

function navigateTo() {
  const s = SPOTS.find(x => x.id === currentDetailId);
  if (s && s.lat && s.lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`, '_blank');

}

function closeDetail() {
  document.getElementById('detailSheet').classList.remove('active');
  document.getElementById('sheetBackdrop').classList.remove('active');
  document.body.style.overflow = '';
  currentDetailId = null;
  hidePersonaBubble();
}

// ── Star rating ────────────────────────────────────────────────────────────
function rateSpot(spotId, stars) {
  saveRating(spotId, stars);
  const ratingData = getAvg(spotId);
  const row = document.getElementById('starsRow');
  if (row) row.querySelectorAll('.star-btn').forEach((btn, i) => btn.classList.toggle('lit', i < stars));
  const avgEl = document.querySelector('.stars-avg-num');
  const countEl = document.querySelector('.stars-count');
  const hintEl = document.getElementById('starsHint');
  if (avgEl && ratingData) avgEl.textContent = ratingData.avg;
  if (countEl && ratingData) countEl.textContent = ratingData.count + ' 人評分';
  if (hintEl) hintEl.textContent = `你給了 ${stars} 星`;
}

// ── Persona bubble ─────────────────────────────────────────────────────────
let _personaBubble = null;
function showPersonaBubble(el, persona) {
  if (!persona) return;
  hidePersonaBubble();
  const bubble = document.createElement('div');
  bubble.className = 'persona-bubble';
  bubble.textContent = persona;
  document.body.appendChild(bubble);
  _personaBubble = bubble;
  const rect = el.getBoundingClientRect();
  const bw = 240;
  let left = rect.left;
  if (left + bw > window.innerWidth - 12) left = window.innerWidth - bw - 12;
  if (left < 12) left = 12;
  bubble.style.left = left + 'px';
  bubble.style.top = (rect.bottom + 10) + 'px';
  requestAnimationFrame(() => bubble.classList.add('visible'));
  setTimeout(hidePersonaBubble, 3200);
}
function hidePersonaBubble() {
  if (_personaBubble) { _personaBubble.remove(); _personaBubble = null; }
}
document.addEventListener('click', function(e) {
  if (_personaBubble && !e.target.classList.contains('friend-author')) hidePersonaBubble();
});

// ── Worker reviews loader ──────────────────────────────────────────────────
const _reviewsCache = {};
async function loadReviews(spotId) {
  if (_reviewsCache[spotId]) return _reviewsCache[spotId];
  try {
    const res = await fetch('/api/drift/reviews?spotId=' + encodeURIComponent(spotId), {
      headers: driftAuthHeaders()
    });
    const data = await res.json();
    if (data.success && Array.isArray(data.reviews)) {
      _reviewsCache[spotId] = data.reviews;
      return data.reviews;
    }
  } catch(e) { /* fallback to local */ }
  return [];
}

// ── Route algo ─────────────────────────────────────────────────────────────
function dist(a, b) {
  const R = 6371, dLat = ((b.lat - a.lat) * Math.PI) / 180, dLng = ((b.lng - a.lng) * Math.PI) / 180;
  const x = Math.sin(dLat / 2) ** 2 + Math.cos((a.lat * Math.PI) / 180) * Math.cos((b.lat * Math.PI) / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}
function optimize(spots) {
  const route = []; let cur = HOME, rem = [...spots];
  while (rem.length) {
    let nearest, min = Infinity;
    rem.forEach(s => { const d = dist(cur, s); if (d < min) { min = d; nearest = s; } });
    route.push({ spot: nearest, km: min, min: Math.max(3, Math.ceil(min / 0.45)) });
    cur = nearest; rem = rem.filter(s => s.id !== nearest.id);
  }
  return route;
}

// ── Leaflet map ────────────────────────────────────────────────────────────
function buildMap(route) {
  if (!leafletMap) {
    leafletMap = L.map('map', { zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OSM</a>'
    }).addTo(leafletMap);
    L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);
  } else {
    leafletMap.eachLayer(l => { if (!(l instanceof L.TileLayer)) leafletMap.removeLayer(l); });
  }
  L.marker([HOME.lat, HOME.lng], { icon: L.divIcon({
    html: `<div style="width:30px;height:30px;border-radius:50%;background:#1a1210;display:flex;align-items:center;justify-content:center;color:#f5f1ec;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.3)">雫</div>`,
    className: '', iconSize: [30, 30], iconAnchor: [15, 15]
  }) }).addTo(leafletMap).bindPopup('<strong>雫旅 Drop Inn</strong>');
  route.forEach((r, i) => {
    L.marker([r.spot.lat, r.spot.lng], { icon: L.divIcon({
      html: `<div style="width:30px;height:30px;border-radius:50%;background:#b8795a;display:flex;align-items:center;justify-content:center;color:#f5f1ec;font-family:'Cormorant Garamond',serif;font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.3)">${i + 1}</div>`,
      className: '', iconSize: [30, 30], iconAnchor: [15, 15]
    }) }).addTo(leafletMap).bindPopup(`<strong>${r.spot.name}</strong><br>${r.spot.area}`);
  });
  const pts = [[HOME.lat, HOME.lng], ...route.map(r => [r.spot.lat, r.spot.lng])];
  L.polyline(pts, { color: '#b8795a', weight: 2, opacity: 0.65, dashArray: '6 6' }).addTo(leafletMap);
  leafletMap.fitBounds(L.latLngBounds(pts), { padding: [36, 36] });
  leafletMap.invalidateSize();
}

function buildRoutePanel(route) {
  const totalKm = route.reduce((s, r) => s + r.km, 0);
  document.getElementById('routePanel').innerHTML = `
    <div class="route-item"><div class="route-dot dot-home">雫</div><div class="route-info"><div class="route-name">雫旅 Drop Inn</div><div class="route-sub">出發點 · 湖西鄉成功村</div></div></div>
    ${route.map((r, i) => `
      <div class="drive-line">↓ 開車約 ${r.min} 分鐘（${r.km.toFixed(1)} km）</div>
      <div class="route-item"><div class="route-dot dot-stop">${i + 1}</div><div class="route-info"><div class="route-name">${r.spot.name}</div><div class="route-sub">${r.spot.area}${r.spot.feature ? ' · ' + r.spot.feature : ''}</div></div></div>
    `).join('')}
    <div class="route-summary">共 ${route.length} 個地點 · 總移動距離約 ${totalKm.toFixed(1)} km</div>`;
}
