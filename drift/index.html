    <style>
      :root {
        --bg: #ece8e1;
        --card: #f8f5ef;
        --ink: #1a1210;
        --muted: #8a7a6a;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.25);
        --stone: rgba(181, 171, 160, 0.6);
        --sel-bg: #fdf7f2;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'Noto Serif TC', serif;
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
        overscroll-behavior: none;
      }

      /* ── Header ── */
      .site-header {
        padding: 52px 24px 40px;
        text-align: center;
        max-width: 800px;
        margin: 0 auto;
      }
      .logo-en {
        font-family: 'Cormorant Garamond', serif;
        font-size: 11px;
        letter-spacing: 0.5em;
        color: var(--muted);
        text-transform: uppercase;
        display: block;
        margin-bottom: 16px;
      }
      .logo-zh {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(52px, 10vw, 76px);
        font-weight: 300;
        letter-spacing: 0.08em;
        color: var(--ink);
        margin-bottom: 16px;
        line-height: 1;
      }
      .divider-v {
        width: 1px;
        height: 48px;
        background: linear-gradient(to bottom, transparent, var(--muted), transparent);
        margin: 0 auto 20px;
      }
      .header-sub {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.12em;
        line-height: 2.2;
      }

      /* ── Filter bar ── */
      .filter-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }
      .filter-tabs {
        display: flex;
        max-width: 800px;
        margin: 0 auto;
        overflow-x: auto;
        scrollbar-width: none;
        padding: 0 8px;
      }
      .filter-tabs::-webkit-scrollbar { display: none; }
      .tab {
        flex-shrink: 0;
        background: none;
        border: none;
        padding: 14px 16px;
        font-family: 'Noto Serif TC', serif;
        font-weight: 300;
        font-size: 13px;
        letter-spacing: 0.1em;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .tab.active { color: var(--ink); border-bottom-color: var(--accent); }

      .sub-filters {
        display: flex;
        gap: 6px;
        max-width: 800px;
        margin: 0 auto;
        padding: 8px 12px 12px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .sub-filters::-webkit-scrollbar { display: none; }
      .chip {
        flex-shrink: 0;
        background: transparent;
        border: 1px solid rgba(181, 171, 160, 0.4);
        border-radius: 100px;
        padding: 5px 13px;
        font-family: 'Noto Serif TC', serif;
        font-weight: 300;
        font-size: 12px;
        letter-spacing: 0.06em;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.18s;
        -webkit-tap-highlight-color: transparent;
      }
      .chip.active {
        background: var(--ink);
        color: #f8f5ef;
        border-color: var(--ink);
      }

      /* ── Grid ── */
      .spots-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px 14px 140px;
      }
      .spots-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 600px) {
        .spots-grid { grid-template-columns: 1fr 1fr; }
      }

      /* ── Card ── */
      .spot-card {
        background: var(--card);
        border-radius: 16px;
        padding: 18px 20px;
        border: 1.5px solid transparent;
        cursor: pointer;
        transition: border-color 0.18s, background 0.18s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .spot-card:hover { border-color: rgba(184, 121, 90, 0.35); }
      .spot-card.selected { border-color: var(--accent); background: var(--sel-bg); }
      .spot-card.no-tap { cursor: default; opacity: 0.65; }

      .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 7px;
        gap: 10px;
      }
      .card-name {
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.04em;
        color: var(--ink);
        line-height: 1.5;
      }
      .card-check {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 1.5px solid var(--stone);
        flex-shrink: 0;
        position: relative;
        transition: all 0.18s;
        margin-top: 2px;
      }
      .spot-card.selected .card-check {
        background: var(--accent);
        border-color: var(--accent);
      }
      .spot-card.selected .card-check::after {
        content: '';
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -55%) rotate(45deg);
        width: 5px; height: 8px;
        border-right: 1.5px solid white;
        border-bottom: 1.5px solid white;
      }

      .card-meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 9px;
      }
      .rating { font-size: 11px; color: var(--accent); letter-spacing: 0; }
      .price {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        color: var(--muted);
      }
      .area-tag {
        font-size: 11px;
        color: var(--muted);
        background: rgba(181, 171, 160, 0.2);
        padding: 2px 8px;
        border-radius: 100px;
        letter-spacing: 0.04em;
      }
      .nearby-tag {
        font-size: 11px;
        color: var(--accent);
        background: rgba(184, 121, 90, 0.1);
        padding: 2px 8px;
        border-radius: 100px;
        letter-spacing: 0.04em;
      }
      .irregular-tag {
        font-size: 11px;
        color: var(--stone);
        background: rgba(181, 171, 160, 0.15);
        padding: 2px 8px;
        border-radius: 100px;
      }

      .card-note {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.85;
        letter-spacing: 0.05em;
      }
      .card-tbd {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 12px;
        color: var(--stone);
        margin-top: 7px;
        letter-spacing: 0.06em;
      }
      .card-tags {
        margin-top: 9px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .tag { font-size: 11px; color: var(--stone); letter-spacing: 0.02em; }

      /* ── Plan bar ── */
      .plan-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--ink);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 20;
        transform: translateY(100%);
        transition: transform 0.28s ease;
        safe-area-inset-bottom: env(safe-area-inset-bottom);
        padding-bottom: calc(14px + env(safe-area-inset-bottom));
      }
      .plan-bar.visible { transform: translateY(0); }
      .plan-bar-text {
        font-size: 13px;
        color: rgba(248, 245, 239, 0.65);
        letter-spacing: 0.06em;
      }
      .plan-bar-text strong { color: #f8f5ef; font-weight: 400; }
      .plan-bar-btn {
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink);
        background: var(--card);
        border: none;
        padding: 8px 22px;
        border-radius: 100px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      /* ── Map overlay ── */
      .map-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 30;
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.32s ease;
      }
      .map-overlay.active { transform: translateY(0); }

      .map-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .back-btn {
        background: none;
        border: none;
        font-family: 'Noto Serif TC', serif;
        font-weight: 300;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
        letter-spacing: 0.08em;
        -webkit-tap-highlight-color: transparent;
      }
      .map-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 17px;
        letter-spacing: 0.25em;
        color: var(--ink);
      }
      .gmaps-link {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        letter-spacing: 0.1em;
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(184, 121, 90, 0.5);
        padding-bottom: 1px;
      }

      #map {
        flex: 0 0 42vh;
        min-height: 180px;
      }

      .route-panel {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px 24px;
        -webkit-overflow-scrolling: touch;
      }

      .route-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .route-item:last-of-type { border-bottom: none; }
      .route-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        color: white;
      }
      .dot-home { background: var(--ink); font-size: 12px; }
      .dot-stop { background: var(--accent); }

      .route-info { flex: 1; }
      .route-name {
        font-size: 14px;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: 0.04em;
        line-height: 1.5;
      }
      .route-sub {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.05em;
        margin-top: 2px;
      }

      .drive-line {
        font-size: 11px;
        color: var(--stone);
        letter-spacing: 0.08em;
        padding: 5px 0 2px 40px;
      }

      .route-summary {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        font-size: 12px;
        color: var(--stone);
        letter-spacing: 0.08em;
        line-height: 2;
      }

      /* ── Empty state ── */
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 20px;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 15px;
        color: var(--stone);
        letter-spacing: 0.08em;
      }
    </style>
  </head>

    <!-- ── Drift 密碼保護 overlay ─────────────────────────────── -->
    <div id="driftAuthOverlay" style="
      display:none; position:fixed; inset:0; z-index:9999;
      background:#ece8e1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      font-family:'Noto Serif TC',serif;
    ">
      <div style="text-align:center; color:#1a1210;">
        <div style="font-size:13px; letter-spacing:0.18em; color:#8a7a6a; margin-bottom:8px;">DROP INN · PENGHU</div>
        <div style="font-size:26px; letter-spacing:0.12em; font-weight:300; margin-bottom:4px;">Drift</div>
        <div style="font-size:12px; color:#8a7a6a; letter-spacing:0.1em;">雫旅專屬 · 請輸入通關密語</div>
      </div>
      <input id="driftKeyInput" type="password" placeholder="通關密語"
        style="
          border:1px solid rgba(181,171,160,0.5); background:#f8f5ef;
          border-radius:8px; padding:10px 20px; font-size:15px;
          font-family:inherit; color:#1a1210; text-align:center;
          outline:none; width:220px; letter-spacing:0.08em;
        "
        onkeydown="if(event.key==='Enter') _driftAuth()"
      />
      <div id="driftAuthErr" style="font-size:12px; color:#b8795a; display:none;">密語不正確，請再試一次</div>
      <button onclick="_driftAuth()" style="
        background:#1a1210; color:#f8f5ef; border:none; border-radius:8px;
        padding:10px 32px; font-size:13px; font-family:inherit;
        letter-spacing:0.12em; cursor:pointer;
      ">進入</button>
    </div>
    <script>
      (function() {
        var cfg = window.FRONTEND_CONFIG || (typeof FRONTEND_CONFIG !== 'undefined' ? FRONTEND_CONFIG : {});
        var DRIFT_KEY = cfg.DRIFT_KEY || 'dropinn-drift-2026';
        var STORAGE_KEY = 'drift_auth_token';
        function _driftAuth() {
          var val = (document.getElementById('driftKeyInput').value || '').trim();
          if (val === DRIFT_KEY) {
            localStorage.setItem(STORAGE_KEY, btoa(DRIFT_KEY));
            document.getElementById('driftAuthOverlay').style.display = 'none';
          } else {
            document.getElementById('driftAuthErr').style.display = 'block';
            document.getElementById('driftKeyInput').value = '';
            document.getElementById('driftKeyInput').focus();
          }
        }
        window._driftAuth = _driftAuth;
        // 初始化：檢查 localStorage 是否已驗證
        var stored = localStorage.getItem(STORAGE_KEY);
        var overlay = document.getElementById('driftAuthOverlay');
        if (stored && stored === btoa(DRIFT_KEY)) {
          overlay.style.display = 'none';
        } else {
          overlay.style.display = 'flex';
          // 隱藏主體內容，避免閃爍
          document.documentElement.style.visibility = 'hidden';
          window.addEventListener('DOMContentLoaded', function() {
            document.documentElement.style.visibility = '';
            if (overlay.style.display !== 'none') {
              document.body.style.overflow = 'hidden';
            }
            document.getElementById('driftKeyInput').focus();
          });
          // 解鎖後恢復捲動
          var origAuth = window._driftAuth;
          window._driftAuth = function() {
            origAuth();
            if (document.getElementById('driftAuthOverlay').style.display === 'none') {
              document.body.style.overflow = '';
            }
          };
        }
      })();
    </script>

        const grid = document.getElementById('spotsGrid');
        const list = getFiltered();
        if (!list.length) {
          grid.innerHTML = '<div class="empty-state">這個分類還沒有資料，即將補充。</div>';
          return;
        }
        grid.innerHTML = list.map(s => {
          const sel = selected.has(s.id);
          const tbd = s.status === 'tbd';
          const irr = s.status === 'irregular';
          return `<div
            class="spot-card${sel ? ' selected' : ''}${tbd ? ' no-tap' : ''}"
            onclick="${tbd ? '' : `toggleSpot('${s.id}')`}"
            data-id="${s.id}"
          >
            <div class="card-top">
              <div class="card-name">${s.name}</div>
              ${tbd ? '' : `<div class="card-check"></div>`}
            </div>
            <div class="card-meta">
              ${s.rating > 0 ? `<span class="rating">${stars(s.rating)}</span>` : ''}
              ${s.price && s.price !== '?' ? `<span class="price">${s.price}</span>` : ''}
              <span class="area-tag">${s.area}</span>
              ${s.nearby ? `<span class="nearby-tag">民宿附近</span>` : ''}
              ${irr ? `<span class="irregular-tag">不定時</span>` : ''}
            </div>
            <div class="card-note">${s.note}</div>
            ${s.noLoc ? `<div class="card-tbd">位置確認中，暫不加入路線規劃</div>` : ''}
            ${tbd ? `<div class="card-tbd">業主私藏，詳細資訊整理中</div>` : ''}
            <div class="card-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}</div>
          </div>`;
        }).join('');
      }

      function toggleSpot(id) {
        const s = SPOTS.find(x => x.id === id);
        if (!s || s.noLoc || s.status === 'tbd') return;
        selected.has(id) ? selected.delete(id) : selected.add(id);
        renderCards();
        updateBar();
      }

      function updateBar() {
        const n = selected.size;
        document.getElementById('selectedCount').textContent = n;
        document.getElementById('planBar').classList.toggle('visible', n > 0);
      }

      // ── Filters ──────────────────────────────────────────────
      function setType(type) {
        currentType = type;
        currentSub = 'all';
        document.querySelectorAll('#mainTabs .tab').forEach(t =>
          t.classList.toggle('active', t.dataset.type === type)
        );
        renderSubs();
        renderCards();
      }

      function renderSubs() {
        const subs = SUB_MAP[currentType];
        document.getElementById('subFilters').innerHTML = subs.map(s => {
          const val = s === '全部' ? 'all' : s;
          return `<button class="chip${currentSub === val ? ' active' : ''}" onclick="setSub('${val}')">${s}</button>`;
        }).join('');
      }

      function setSub(sub) {
        currentSub = sub;
        document.querySelectorAll('#subFilters .chip').forEach((c, i) => {
          const val = SUB_MAP[currentType][i] === '全部' ? 'all' : SUB_MAP[currentType][i];
          c.classList.toggle('active', val === sub);
        });
        renderCards();
      }

      // ── Route ────────────────────────────────────────────────
      function dist(a, b) {
        const R = 6371,
          dLat = ((b.lat - a.lat) * Math.PI) / 180,
          dLng = ((b.lng - a.lng) * Math.PI) / 180,
          x =
            Math.sin(dLat / 2) ** 2 +
            Math.cos((a.lat * Math.PI) / 180) *
              Math.cos((b.lat * Math.PI) / 180) *
              Math.sin(dLng / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
      }

      function optimize(spots) {
        const route = [];
        let cur = HOME,
          rem = [...spots];
        while (rem.length) {
          let nearest, min = Infinity;
          rem.forEach(s => {
            const d = dist(cur, s);
            if (d < min) { min = d; nearest = s; }
          });
          route.push({ spot: nearest, km: min, min: Math.max(3, Math.ceil(min / 0.45)) });
          cur = nearest;
          rem = rem.filter(s => s.id !== nearest.id);
        }
        return route;
      }

      // ── Map ──────────────────────────────────────────────────
      function showMap() {
        const spots = SPOTS.filter(s => selected.has(s.id));
        if (!spots.length) return;

        document.getElementById('mapOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';

        const route = optimize(spots);

        setTimeout(() => buildMap(route), 60);
        buildRoutePanel(route);

        const wp = route.map(r => `${r.spot.lat},${r.spot.lng}`).join('/');
        document.getElementById('gmapsLink').href =
          `https://www.google.com/maps/dir/${HOME.lat},${HOME.lng}/${wp}`;
      }

      function hideMap() {
        document.getElementById('mapOverlay').classList.remove('active');
        document.body.style.overflow = '';
      }

      function buildMap(route) {
        if (!map) {
          map = L.map('map', { zoomControl: false });
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
          }).addTo(map);
          L.control.zoom({ position: 'bottomright' }).addTo(map);
        } else {
          map.eachLayer(l => { if (!(l instanceof L.TileLayer)) map.removeLayer(l); });
        }

        const homeIcon = L.divIcon({
          html: `<div style="width:30px;height:30px;border-radius:50%;background:#1a1210;display:flex;align-items:center;justify-content:center;color:#f8f5ef;font-family:'Noto Serif TC',serif;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.3)">雫</div>`,
          className: '',
          iconSize: [30, 30],
          iconAnchor: [15, 15],
        });
        L.marker([HOME.lat, HOME.lng], { icon: homeIcon })
          .addTo(map)
          .bindPopup('<strong>雫旅 Drop Inn</strong><br>出發點');

        route.forEach((r, i) => {
          const icon = L.divIcon({
            html: `<div style="width:30px;height:30px;border-radius:50%;background:#b8795a;display:flex;align-items:center;justify-content:center;color:white;font-family:'Cormorant Garamond',serif;font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.3)">${i + 1}</div>`,
            className: '',
            iconSize: [30, 30],
            iconAnchor: [15, 15],
          });
          L.marker([r.spot.lat, r.spot.lng], { icon })
            .addTo(map)
            .bindPopup(`<strong>${r.spot.name}</strong><br>${r.spot.area}`);
        });

        const pts = [[HOME.lat, HOME.lng], ...route.map(r => [r.spot.lat, r.spot.lng])];
        L.polyline(pts, { color: '#b8795a', weight: 2, opacity: 0.65, dashArray: '6 6' }).addTo(map);

        map.fitBounds(L.latLngBounds(pts), { padding: [36, 36] });
        map.invalidateSize();
      }

      function buildRoutePanel(route) {
        const totalKm = route.reduce((s, r) => s + r.km, 0);
        document.getElementById('routePanel').innerHTML = `
          <div class="route-item">
            <div class="route-dot dot-home">雫</div>
            <div class="route-info">
              <div class="route-name">雫旅 Drop Inn</div>
              <div class="route-sub">出發點 · 湖西鄉成功村</div>
            </div>
          </div>
          ${route.map((r, i) => `
            <div class="drive-line">↓ 開車約 ${r.min} 分鐘（${r.km.toFixed(1)} km）</div>
            <div class="route-item">
              <div class="route-dot dot-stop">${i + 1}</div>
              <div class="route-info">
                <div class="route-name">${r.spot.name}</div>
                <div class="route-sub">${r.spot.area}${r.spot.feature ? ' · ' + r.spot.feature : ''}</div>
              </div>
            </div>
          `).join('')}
          <div class="route-summary">
            共 ${route.length} 個地點 · 總移動距離約 ${totalKm.toFixed(1)} km
          </div>
        `;
      }

      // ── GAS 資料來源 ─────────────────────────────────────────
      const GAS_URL = 'https://script.google.com/macros/s/AKfycbwoAz7sTthlp2cgsy6d0iX-wvC5v7OVA4ivPOckq2SOzt5TvUg773s-VmAofXTRF9YCyQ/exec';

      async function loadFromGAS() {
        try {
          const res = await fetch(GAS_URL + '?action=getDriftSpots');
          const data = await res.json();
          if (data.success && Array.isArray(data.spots) && data.spots.length > 0) {
            SPOTS.length = 0;
            data.spots.forEach(s => SPOTS.push(s));
            console.log('✅ Drift: 已從 Google Sheets 載入 ' + SPOTS.length + ' 筆資料');
          }
        } catch (e) {
          console.warn('⚠️ Drift: GAS 載入失敗，使用本地資料', e);
        }
        renderSubs();
        renderCards();
        updateBar();
      }

      // ── Init ─────────────────────────────────────────────────
      document.querySelectorAll('#mainTabs .tab').forEach(t =>
        t.addEventListener('click', () => setType(t.dataset.type))
      );

      loadFromGAS();
    </script>
  </body>
</html>
