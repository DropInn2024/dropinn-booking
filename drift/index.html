<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Drift ｜ 探索</title>
  <script src="/config.public.js?v=2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    :root {
      --bg: #f5f1ec; --ink: #1a1210; --muted: #6b5f56;
      --accent: #6a5a45; --highlight: #a55a4f; --border: rgba(181, 171, 160, 0.3);
      --pending: #e8e1d7; --has-room: rgba(184, 121, 90, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      background-color: var(--bg); color: var(--ink);
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ── Auth overlay ── */
    #driftAuthOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
      font-family: 'Noto Serif TC', serif;
    }

    /* ── Header ── */
    header { padding: 36px 20px 0; text-align: center; z-index: 10; flex-shrink: 0; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300;
      letter-spacing: 0.15em; color: var(--ink); margin-bottom: 12px;
    }
    .drop-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      margin: 0 auto 16px; opacity: 0.5;
    }
    .filter-wrapper { display: flex; justify-content: center; margin-bottom: 24px; }
    .custom-select {
      width: 100%; max-width: 160px; padding: 8px 30px 8px 16px;
      border-radius: 12px; border: 1px solid rgba(181, 171, 160, 0.45);
      background-color: transparent;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b5f56' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
      appearance: none; -webkit-appearance: none;
      font-family: 'Noto Serif TC', serif; color: var(--ink);
      font-size: 12px; letter-spacing: 0.1em;
      text-align: center; text-align-last: center;
      cursor: pointer;
    }

    /* ── Carousel ── */
    .carousel-container {
      flex: 1; position: relative; display: flex;
      justify-content: center; align-items: center;
      overflow: hidden; width: 100%;
      /* 3D 透視，rotateY 才有立體感 */
      perspective: 1400px;
      perspective-origin: 50% 45%;
      /* 阻擋瀏覽器接管橫向手勢 */
      touch-action: pan-y;
      transition: padding-bottom 0.25s ease;
    }
    /* 中央光暈，讓中間卡片有「浮起」感 */
    .carousel-container::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 55% 50% at 50% 50%,
        rgba(184, 121, 90, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--ink);
      padding: 20px 15px; cursor: pointer; z-index: 50; opacity: 0.2;
      transition: transform 0.15s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s, color 0.2s;
    }
    .nav-arrow svg { width: 32px; height: 32px; stroke-width: 1; }
    .left-arrow { left: 2%; }
    .right-arrow { right: 2%; }
    .nav-arrow:active { transform: translateY(-50%) scale(1.35); opacity: 1; color: var(--accent); }
    .nav-arrow:disabled { opacity: 0 !important; pointer-events: none; }

    /* ── Gallery card ── */
    /* JS 全權控制 transform / opacity（每幀 RAF），CSS 不要插手 transition */
    .gallery-card {
      position: absolute; width: 72%; max-width: 320px; height: 62vh;
      background: rgba(245, 241, 236, 0.92);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border); border-radius: 20px;
      display: flex; flex-direction: column;
      overflow: hidden;
      will-change: transform, opacity;
      cursor: pointer; visibility: hidden;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .gallery-card.is-center {
      box-shadow:
        0 20px 50px -10px rgba(26, 18, 16, 0.18),
        0 8px 20px -8px rgba(26, 18, 16, 0.10);
      border-color: rgba(181, 171, 160, 0.55);
    }
    .gallery-card.is-center:active { opacity: 0.94; }
    /* 非中央卡片也有淡淡陰影，立體感才連續 */
    .gallery-card:not(.is-center) {
      box-shadow: 0 10px 30px -12px rgba(26, 18, 16, 0.12);
    }

    .card-image {
      height: 50%; flex-shrink: 0; display: flex;
      justify-content: center; align-items: center; color: var(--muted);
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px;
      letter-spacing: 0.1em; position: relative; border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .card-image-placeholder {
      width: 100%; height: 100%; position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    /* 4 category gradients — 藍綠冷色系，雫旅水滴/漂流意象 */
    .cat-bg-meal  { background: linear-gradient(145deg, #d6e0c2 0%, #92a878 40%, #4e6850 100%); } /* 鼠尾草綠 - 早餐/小吃/宵夜 */
    .cat-bg-sea   { background: linear-gradient(145deg, #b0c8cc 0%, #5e8c92 40%, #244e58 100%); } /* 深海青  - 海鮮餐廳 */
    .cat-bg-cafe  { background: linear-gradient(145deg, #c2d4d2 0%, #7a9a8e 40%, #3e6058 100%); } /* 抹茶綠  - 咖啡甜點 */
    .cat-bg-place { background: linear-gradient(145deg, #c2d4e6 0%, #6e8eb2 40%, #2e567e 100%); } /* 海洋藍  - 景點 */

    /* ── Category icons overlay on placeholder ── */
    .cat-icon-wrap {
      width: 56px; height: 56px; border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .cat-icon-wrap svg {
      width: 28px; height: 28px;
      color: rgba(255, 255, 255, 0.92);
      stroke-width: 1.4;
    }
    .cat-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px; letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.88);
      text-transform: uppercase;
      font-style: normal;
    }

    .recommender-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--accent); padding: 4px 10px; border-radius: 8px;
      font-size: 10px; letter-spacing: 0.1em; pointer-events: none;
    }
    .card-content { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .card-name {
      font-size: 20px; font-weight: 400; color: var(--ink);
      font-family: 'Cormorant Garamond', serif; margin-bottom: 4px; line-height: 1.2;
    }
    .card-tags { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 10px; }
    .card-quote {
      font-size: 13px; color: var(--ink); line-height: 1.8; flex: 1;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .card-tbd {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 13px; color: var(--muted); margin-top: 4px;
      letter-spacing: 0.08em; flex: 1;
    }

    .actions {
      display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid var(--border); flex-shrink: 0;
      /* 旁邊卡片的按鈕淡出，只有中央那張顯示 */
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease-out;
    }
    .gallery-card.is-center .actions { opacity: 1; pointer-events: auto; }
    .btn-solid {
      flex: 1; background: #33352f; color: #f3efe8; border: none;
      border-radius: 10px; padding: 10px 0;
      font-family: 'Noto Serif TC', serif; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer;
    }
    .btn-outline {
      flex: 1; background: transparent; color: var(--ink);
      border: 1px solid rgba(181,171,160,0.45);
      border-radius: 10px; padding: 10px 0;
      font-family: 'Noto Serif TC', serif; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-outline.in-bag {
      background: rgba(165, 90, 79, 0.08);
      border-color: rgba(165, 90, 79, 0.5);
      color: var(--highlight);
    }

    .added-stamp {
      position: absolute; top: 45%; left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      border: 1.5px solid var(--accent); color: var(--accent);
      padding: 4px 14px; border-radius: 7px; font-size: 12px;
      letter-spacing: 0.2em; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; background: rgba(245, 241, 236, 0.9); z-index: 10;
    }
    .gallery-card.in-bag .added-stamp { opacity: 1; }

    /* ── Empty state in carousel ── */
    #empty-state {
      display: none; color: var(--muted); font-size: 13px;
      letter-spacing: 0.1em; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
    }

    /* ── Itinerary drawer ── */
    .itinerary-drawer {
      padding: 12px 20px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border); display: flex;
      justify-content: space-between; align-items: center;
      z-index: 10; background: var(--bg); flex-shrink: 0;
    }
    .drawer-info {
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 0.15em; color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .bag-count { color: var(--accent); font-size: 18px; font-weight: 400; transition: transform 0.2s; }
    .bag-count.bump { transform: scale(1.5); }
    .drawer-btn {
      padding: 10px 20px; font-size: 12px; border-radius: 12px;
      font-family: 'Noto Serif TC', serif; letter-spacing: 0.1em;
      border: none; transition: all 0.2s; white-space: nowrap;
    }

    /* ── Backdrop ── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(26, 18, 16, 0.3);
      z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .sheet-backdrop.active { opacity: 1; pointer-events: auto; }

    /* ── Bottom sheets shared ── */
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-radius: 22px 22px 0 0;
      z-index: 50; display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      max-height: 90vh;
    }
    .bottom-sheet.active { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: rgba(26, 18, 16, 0.12);
      border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
    }

    /* ── Detail panel — 全頁覆蓋（取代 bottom sheet）── */
    #detailSheet {
      /* Override bottom-sheet positioning to full-page modal */
      position: fixed !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      width: 100vw !important; height: 100vh !important; height: 100dvh !important;
      max-width: none !important; max-height: none !important;
      border-radius: 0 !important;
      transform: translateY(100%) !important;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1) !important;
      background: var(--bg) !important;
      z-index: 60 !important;
      padding: 0 !important;
      display: flex !important; flex-direction: column !important;
    }
    #detailSheet.active { transform: translateY(0) !important; }
    .detail-close-bar {
      display: flex; justify-content: flex-end;
      padding: max(16px, env(safe-area-inset-top, 16px)) 18px 0;
      flex-shrink: 0;
    }
    .detail-close-btn {
      background: #f8f5ef; border: 1px solid rgba(181, 171, 160, 0.45);
      border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px; color: var(--ink);
      display: flex; align-items: center; justify-content: center; line-height: 1;
      cursor: pointer;
    }
    .detail-scroll {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 0 18px;
    }
    .detail-body {
      max-width: 720px; margin: 0 auto;
      padding: 14px 4px 0;
    }
    /* Hero photo area（Phase 4 接 R2 直接塞 img）*/
    .detail-hero {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, rgba(120,140,130,0.45), rgba(184,121,90,0.32)),
                  repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 14px, transparent 14px 28px);
      border-radius: 14px; margin: 6px 0 22px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6); font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 13px; letter-spacing: 0.15em;
    }

    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 400; letter-spacing: 0.04em;
      color: var(--ink); margin-bottom: 6px; line-height: 1.3;
    }
    .detail-subtitle { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; font-style: italic; margin-bottom: 14px; }
    .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
    .d-chip { font-size: 11px; border-radius: 100px; padding: 3px 10px; letter-spacing: 0.05em; }
    .d-area { background: rgba(26,18,16,0.06); color: var(--muted); }
    .d-type { background: var(--has-room); color: var(--accent); }
    .d-irr { background: rgba(26,18,16,0.05); color: var(--muted); }

    .review-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .review-rule { width: 24px; height: 1px; background: var(--accent); opacity: 0.5; margin-bottom: 14px; }
    .owner-text { font-size: 15px; color: var(--ink); line-height: 2.1; letter-spacing: 0.06em; margin-bottom: 24px; }
    .owner-tbd {
      background: var(--pending); border-radius: 12px; padding: 20px;
      text-align: center; margin-bottom: 24px;
    }
    .owner-tbd p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--muted); line-height: 2; letter-spacing: 0.08em;
    }

    .friend-reviews { margin-top: 24px; margin-bottom: 24px; }
    .friend-card { background: var(--pending); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
    .friend-card:last-child { margin-bottom: 0; }
    .friend-author {
      display: inline-block; background: var(--has-room); color: var(--accent);
      border-radius: 100px; padding: 3px 10px; font-size: 10px;
      letter-spacing: 0.1em; margin-bottom: 8px; cursor: pointer;
      position: relative; transition: background 0.15s;
    }
    .friend-author:active { background: rgba(184, 121, 90, 0.22); }
    .friend-note { font-size: 13px; color: var(--muted); line-height: 1.9; letter-spacing: 0.05em; font-style: italic; }

    /* Persona bubble */
    .persona-bubble {
      position: fixed; z-index: 200; background: var(--ink); color: var(--bg);
      border-radius: 12px; padding: 12px 16px; font-size: 12px;
      line-height: 1.8; letter-spacing: 0.06em; max-width: 240px;
      pointer-events: none; box-shadow: 0 8px 32px rgba(26,18,16,0.22);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
    }
    .persona-bubble.visible { opacity: 1; transform: translateY(0); }
    .persona-bubble::before {
      content: ''; position: absolute; top: -6px; left: 20px;
      width: 12px; height: 12px; background: var(--ink);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    /* Star rating */
    .stars-section { margin-top: 24px; padding-top: 22px; border-top: 1px solid var(--border); margin-bottom: 20px; }
    .stars-avg-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 14px; }
    .stars-avg-num { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--accent); font-weight: 300; }
    .stars-avg-denom { font-size: 13px; color: var(--muted); }
    .stars-count { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; margin-left: 4px; }
    .stars-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .star-btn {
      font-size: 26px; background: none; border: none;
      color: rgba(26, 18, 16, 0.15); padding: 2px;
      transition: color 0.12s, transform 0.12s; line-height: 1;
      cursor: pointer;
    }
    .star-btn:hover { color: rgba(165,90,79,0.5); }
    .star-btn.lit { color: var(--accent); }
    .star-btn.lit:hover { color: color-mix(in srgb, var(--accent) 70%, #000); }
    .star-btn:active { transform: scale(1.2); }
    .stars-hint { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

    /* Features */
    .features-section { margin-bottom: 22px; }
    .feature-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .feature-chip {
      font-size: 12px; color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 100px;
      padding: 4px 11px; letter-spacing: 0.04em;
    }

    /* Maps link */
    .maps-link {
      display: inline-block; margin-bottom: 28px; font-size: 12px;
      color: var(--accent); letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(184, 121, 90, 0.35); padding-bottom: 1px;
    }

    /* Detail footer — 兩顆按鈕都用登入頁奶白款，無主次差別 */
    .detail-footer {
      display: flex; gap: 12px;
      padding: 18px 18px max(20px, env(safe-area-inset-bottom, 20px));
      border-top: 1px solid var(--border); flex-shrink: 0;
      max-width: 720px; margin: 0 auto; width: 100%; box-sizing: border-box;
      background: var(--bg);
    }
    .btn-nav, .btn-route-add {
      flex: 1; background: #f8f5ef; color: var(--ink);
      border: 1px solid rgba(181, 171, 160, 0.45);
      border-radius: 14px; padding: 15px 16px;
      font-family: 'Noto Serif TC', serif; font-weight: 400;
      font-size: 13px; letter-spacing: 0.2em;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .btn-nav:hover, .btn-route-add:hover {
      background: rgba(181, 171, 160, 0.15);
      border-color: var(--ink);
    }
    .btn-route-add.added {
      background: rgba(165,90,79,0.08); border-color: rgba(165,90,79,0.5); color: var(--highlight);
    }

    /* ── Plan sheet ── */
    #planSheet { z-index: 51; }
    .plan-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .plan-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.2em; color: var(--ink); }
    .plan-clear { background: none; border: none; font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }
    .plan-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .plan-empty {
      padding: 36px 20px; text-align: center;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--muted); letter-spacing: 0.08em;
    }
    .plan-item {
      display: flex; align-items: center; padding: 12px 20px; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .plan-item:last-child { border-bottom: none; }
    .plan-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: #486890; color: var(--bg);
      font-family: 'Cormorant Garamond', serif; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .plan-info { flex: 1; }
    .plan-iname { font-size: 14px; color: var(--ink); letter-spacing: 0.04em; }
    .plan-iarea { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; }
    .plan-remove { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px; line-height: 1; }
    .plan-footer { display: flex; gap: 10px; padding: 14px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .btn-start-nav {
      flex: 1; background: var(--ink); color: var(--bg); border: none;
      border-radius: 12px; padding: 13px;
      font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 13px; letter-spacing: 0.1em;
    }
    .btn-show-map {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 12px; padding: 13px 14px;
      font-family: 'Noto Serif TC', serif; font-weight: 300;
      font-size: 12px; letter-spacing: 0.06em; white-space: nowrap;
    }

    /* ── Route map overlay ── */
    .map-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 60;
      display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.32s ease;
    }
    .map-overlay.active { transform: translateY(0); }
    .map-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-back { background: none; border: none; font-size: 13px; color: var(--muted); letter-spacing: 0.08em; }
    .map-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; letter-spacing: 0.25em; color: var(--ink); }
    .map-gmaps { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); border-bottom: 1px solid rgba(184,121,90,0.4); padding-bottom: 1px; }
    #map { flex: 0 0 42vh; min-height: 180px; }
    .route-panel { flex: 1; overflow-y: auto; padding: 16px 20px 24px; -webkit-overflow-scrolling: touch; }
    .route-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .route-item:last-of-type { border-bottom: none; }
    .route-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--bg); }
    .dot-home { background: var(--ink); font-size: 12px; }
    .dot-stop { background: var(--accent); }
    .dot-harbor { background: #486890; font-size: 13px; line-height: 1; } /* 海洋藍 — 渡輪港口 */
    .route-info { flex: 1; }
    .route-name { font-size: 14px; font-weight: 400; color: var(--ink); letter-spacing: 0.04em; line-height: 1.5; }
    .route-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }
    .drive-line { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; padding: 5px 0 2px 40px; }
    .drive-line-ferry { color: #486890; font-style: italic; } /* 渡輪段差異化 */
    .route-summary { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); letter-spacing: 0.08em; line-height: 2; }

    /* ── Mode toggle ── */
    .mode-wrapper { display: flex; justify-content: center; margin-bottom: 14px; }
    .mode-pill {
      display: inline-flex;
      border: 1px solid rgba(181, 171, 160, 0.45);
      border-radius: 100px; overflow: hidden;
    }
    .mode-btn {
      padding: 6px 20px; font-size: 11px; border: none;
      background: transparent; color: var(--muted);
      letter-spacing: 0.18em; cursor: pointer;
      font-family: 'Noto Serif TC', serif;
      transition: background 0.2s, color 0.2s;
    }
    .mode-btn.active { background: #33352f; color: var(--bg); } /* 礁岩炭 */

    /* ── Explore map container ── */
    #explore-map-wrap {
      display: none; flex: 1; position: relative; overflow: hidden;
    }
    #explore-map-wrap.active { display: flex; flex-direction: column; }
    #explore-map { flex: 1; width: 100%; }

    /* ── GPS button ── */
    .gps-btn {
      position: absolute;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      right: 16px; width: 42px; height: 42px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      box-shadow: 0 2px 14px rgba(26, 18, 16, 0.14);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); cursor: pointer; z-index: 1000;
      transition: color 0.2s, border-color 0.2s;
    }
    .gps-btn.locating { color: var(--accent); border-color: rgba(184,121,90,0.5); animation: gps-pulse 1s infinite; }
    @keyframes gps-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* ── Leaflet tooltip 雫旅 style ── */
    .leaflet-tooltip.drift-tip {
      background: var(--ink); color: var(--bg); border: none;
      border-radius: 6px; font-family: 'Noto Serif TC', serif;
      font-size: 11px; letter-spacing: 0.06em; padding: 4px 10px;
      box-shadow: 0 3px 12px rgba(26,18,16,0.22); white-space: nowrap;
    }
    .leaflet-tooltip.drift-tip::before { border-top-color: var(--ink); }

    /* ── Desktop ── */
    @media (min-width: 640px) {
      /* Header 改成單行 flex：左 title+toggle、右 filter */
      header {
        padding: 20px 36px 14px;
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 20px;
      }
      .header-top {
        display: flex; align-items: center; gap: 24px;
      }
      .header-top .page-title { font-size: 28px; margin-bottom: 0; letter-spacing: 0.2em; }
      .header-top .drop-line { display: none; }
      .header-top .mode-wrapper { margin-bottom: 0; }
      .filter-wrapper { margin-bottom: 0; }
      .custom-select { font-size: 12px; max-width: 180px; }

      /* 卡片放大，desktop 不再小到 320px */
      .gallery-card { max-width: 460px; }

      .bottom-sheet { max-width: 480px; left: 50%; right: auto; transform: translateX(-50%) translateY(100%); }
      .bottom-sheet.active { transform: translateX(-50%) translateY(0); }
      #detailSheet { max-width: 520px; }
    }

    /* ── Mobile ── */
    @media (max-width: 639px) {
      /* 壓縮 header：title + toggle 同一列，drop-line 隱藏 */
      header { padding: 18px 16px 8px; }
      .header-top {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 10px;
      }
      .header-top .page-title { font-size: 22px; margin-bottom: 0; letter-spacing: 0.18em; }
      .header-top .drop-line { display: none; }
      .header-top .mode-wrapper { margin-bottom: 0; }
      .mode-btn { padding: 5px 14px; font-size: 10px; letter-spacing: 0.14em; }
      .filter-wrapper { margin-bottom: 0; }
      .custom-select { font-size: 11px; padding: 6px 26px 6px 14px; max-width: 140px; }

      /* 手機滑動就夠了，箭頭拿掉 */
      .nav-arrow { display: none !important; }

      /* 卡片可以更高（矮螢幕自動收，避免頂到 header / 蓋到藥丸） */
      .gallery-card { height: 70vh; max-height: calc(100dvh - 220px); max-width: none; width: 78%; }
      /* 有景點時藥丸浮現 → carousel 補底部留白，把置中卡片往上推空出藥丸 */
      body.drift-has-bag .carousel-container { padding-bottom: 112px; }

      /* 縮小 placeholder icon */
      .cat-icon-wrap { width: 48px; height: 48px; margin-bottom: 8px; }
      .cat-icon-wrap svg { width: 24px; height: 24px; }
      .cat-label { font-size: 11px; letter-spacing: 0.2em; }

      /* ── 底部 bar → 浮動藥丸 ── */
      .itinerary-drawer {
        /* 脫離 flex flow，浮在畫面底部 */
        position: fixed;
        bottom: calc(22px + env(safe-area-inset-bottom, 0px));
        left: 50%;
        transform: translateX(-50%) translateY(16px);
        width: auto;
        min-width: 180px;
        border-top: none;
        /* 藥丸外觀 */
        background: var(--ink);
        border-radius: 100px;
        padding: 11px 22px;
        gap: 16px;
        box-shadow: 0 8px 28px rgba(26, 18, 16, 0.28);
        /* 預設不可見 */
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
        z-index: 20;
      }
      /* 有景點時浮現 */
      .itinerary-drawer.has-items {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(0);
      }
      /* 文字顏色反轉（深底白字） */
      .itinerary-drawer .drawer-info {
        color: rgba(245, 241, 236, 0.65);
        font-size: 10px;
        letter-spacing: 0.18em;
      }
      .itinerary-drawer .bag-count {
        color: var(--bg);
        font-size: 16px;
      }
      /* 按鈕融入藥丸 */
      .itinerary-drawer .drawer-btn {
        background: rgba(245, 241, 236, 0.14);
        color: var(--bg);
        border-radius: 100px;
        padding: 7px 18px;
        font-size: 11px;
        border: none;
      }
      .itinerary-drawer .drawer-btn:active {
        background: rgba(245, 241, 236, 0.26);
      }
    }
  </style>
</head>
<body>

<!-- ── Auth overlay ── -->
<div id="driftAuthOverlay">
  <div style="text-align:center;color:var(--ink);">
    <div style="font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:0.4em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Drop Inn · Penghu</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:36px;letter-spacing:0.15em;font-weight:300;margin-bottom:6px;">Drift</div>
    <div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;">雫旅專屬好友空間</div>
  </div>
  <input id="driftCodeInput" type="text" placeholder="輸入代碼"
    style="border:1px solid rgba(181,171,160,0.5);background:rgba(245,240,234,0.6);border-radius:8px;padding:12px 24px;font-size:16px;font-family:'Cormorant Garamond',serif;color:var(--ink);text-align:center;outline:none;width:200px;letter-spacing:0.2em;"
    autocomplete="off" autocapitalize="none" spellcheck="false">
  <div id="driftCodeErr" style="font-size:12px;color:var(--accent);display:none;text-align:center;max-width:220px;min-height:16px;"></div>
  <button id="driftCodeBtn" style="background:#33352f;color:#f3efe8;border:none;border-radius:8px;padding:11px 36px;font-size:13px;font-family:'Noto Serif TC',serif;letter-spacing:0.15em;cursor:pointer;">進入</button>
</div>

<!-- ── Header ── -->
<header>
  <div class="header-top">
    <div class="page-title">Drift</div>
    <div class="drop-line"></div>
    <div class="mode-wrapper">
      <div class="mode-pill">
        <button class="mode-btn active" data-mode="card">卡片</button>
        <button class="mode-btn" data-mode="map">地圖</button>
      </div>
    </div>
  </div>
  <div class="filter-wrapper">
    <select class="custom-select" id="category-select">
      <option value="雫旅推薦" selected>雫旅推薦</option>
      <option value="最多星星">最多星星</option>
      <option value="全部">全部探索</option>
      <optgroup label="地區">
        <option value="馬公">馬公市</option>
        <option value="湖西">湖西鄉</option>
        <option value="白沙">白沙鄉</option>
        <option value="西嶼">西嶼鄉</option>
        <option value="望安">望安鄉</option>
        <option value="七美">七美鄉</option>
      </optgroup>
      <optgroup label="類型">
        <option value="早餐">靈魂早餐</option>
        <option value="小吃">在地小吃</option>
        <option value="宵夜">夜間宵夜</option>
        <option value="海鮮餐廳">私藏海鮮</option>
        <option value="咖啡甜點">咖啡甜點</option>
        <option value="景點">景點探索</option>
      </optgroup>
    </select>
  </div>
</header>

<!-- ── Carousel ── -->
<div class="carousel-container" id="carousel-container">
  <button class="nav-arrow left-arrow" id="prev-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <div id="empty-state">這個分類目前沒有名單。</div>
  <button class="nav-arrow right-arrow" id="next-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>
</div>

<!-- ── Explore map ── -->
<div id="explore-map-wrap">
  <div id="explore-map"></div>
  <button class="gps-btn" id="gps-btn" title="定位我的位置">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
    </svg>
  </button>
</div>

<!-- ── Itinerary drawer ── -->
<div class="itinerary-drawer">
  <div class="drawer-info">ITINERARY <span class="bag-count" id="bag-count">0</span></div>
  <button class="drawer-btn" id="nav-btn"
    style="background:#33352f;color:#f3efe8;"
    disabled>開始漂流</button>
</div>

<!-- ── Backdrop ── -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>

<!-- ── Detail sheet ── -->
<div class="bottom-sheet" id="detailSheet">
  <div class="detail-close-bar">
    <button class="detail-close-btn" id="detailCloseBtn">×</button>
  </div>
  <div class="detail-scroll">
    <div class="detail-body" id="detailBody"></div>
  </div>
  <div class="detail-footer">
    <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
      <button class="btn-nav" id="detailNavBtn">導航前往</button>
      <div style="text-align:center;font-size:10.5px;color:var(--muted);letter-spacing:0.04em;line-height:1.4;">
        <span id="detailNavSubtitleText"></span><a id="detailNavFromHomeLink" style="cursor:pointer;color:var(--muted);border-bottom:1px dotted rgba(120,100,80,0.3);">從民宿出發</a>
      </div>
    </div>
    <button class="btn-route-add" id="detailRouteBtn">加入行程</button>
  </div>
</div>

<!-- ── Plan sheet ── -->
<div class="bottom-sheet" id="planSheet">
  <div class="sheet-handle"></div>
  <div class="plan-head">
    <span class="plan-title">今日漂流路線</span>
    <button class="plan-clear" id="planClearBtn">清空</button>
  </div>
  <div class="plan-list" id="planList"></div>
  <div class="plan-footer">
    <button class="btn-start-nav" id="startNavBtn">開始導航</button>
    <button class="btn-show-map" id="showRouteMapBtn">路線圖</button>
  </div>
</div>

<!-- ── Route map overlay ── -->
<div class="map-overlay" id="mapOverlay">
  <div class="map-topbar">
    <button class="map-back" id="mapBackBtn">← 返回</button>
    <span class="map-title">Route</span>
    <a class="map-gmaps" id="gmapsLink" href="#" target="_blank" rel="noopener">導航</a>
  </div>
  <div id="map"></div>
  <div class="route-panel" id="routePanel"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="/drift/app.js?v=20260531f"></script>
</body>
</html>
