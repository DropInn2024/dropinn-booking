<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow" />
    <title>雫旅｜房務</title>
    <script src="/config.public.js"></script>
    <script>
      window.FRONTEND_CONFIG =
        window.FRONTEND_CONFIG || (typeof FRONTEND_CONFIG !== 'undefined' ? FRONTEND_CONFIG : {});
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ece8e1;
        --card: #f8f5ef;
        --ink: #1a1210;
        --muted: #8a7a6a;
        --accent: #b8795a;
        --border: rgba(181, 171, 160, 0.3);
        --checkout: rgba(184, 121, 90, 0.35);
        --checkin: rgba(90, 150, 184, 0.28);
        --both: rgba(145, 100, 60, 0.40);
        --pending: rgba(210, 200, 185, 0.85);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Noto Serif TC', serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100dvh;
        letter-spacing: 0.08em;
        line-height: 1.8;
        -webkit-font-smoothing: antialiased;
      }

      /* ── 登入畫面 ──────────────────────────────────────────────── */
      .login-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        z-index: 1000;
        padding: 40px 24px;
      }
      .login-screen.hidden { display: none; }
      .login-logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 0.4em;
        margin-bottom: 8px;
        color: var(--ink);
      }
      .login-sub {
        font-size: 11px;
        letter-spacing: 0.35em;
        color: var(--muted);
        margin-bottom: 48px;
      }
      .login-input {
        width: 100%;
        max-width: 280px;
        padding: 14px 0;
        border: none;
        border-bottom: 1px solid var(--border);
        background: transparent;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
        letter-spacing: 0.15em;
        outline: none;
        text-align: center;
        margin-bottom: 32px;
        transition: border-bottom-color 0.3s;
      }
      .login-input:focus { border-bottom-color: var(--ink); }
      .login-btn {
        all: unset;
        box-sizing: border-box;
        padding: 14px 48px;
        background: var(--ink);
        color: var(--bg);
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 0.25em;
        cursor: pointer;
        border-radius: 12px;
        transition: background 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .login-btn:hover { background: var(--accent); }
      .login-err {
        margin-top: 16px;
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 0.1em;
      }

      /* ── 主畫面 ────────────────────────────────────────────────── */
      .app { display: none; }
      .app.show { display: block; }

      .top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(248, 245, 239, 0.96);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
      }
      .top-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        letter-spacing: 0.25em;
        color: var(--ink);
      }
      .top-logout {
        all: unset;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 1px solid transparent;
        transition: color 0.2s, border-bottom-color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      .top-logout:hover { color: var(--ink); border-bottom-color: var(--border); }

      .container { max-width: 640px; margin: 0 auto; padding: 24px 20px 80px; }

      /* ── 月份導航 ──────────────────────────────────────────────── */
      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
      }
      .cal-nav-btn {
        all: unset;
        box-sizing: border-box;
        font-size: 18px;
        color: var(--muted);
        cursor: pointer;
        transition: color 0.2s;
        -webkit-tap-highlight-color: transparent;
        padding: 8px;
      }
      .cal-nav-btn:hover { color: var(--ink); }
      .month-title {
        text-align: center;
        min-width: 160px;
      }
      .month-main {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: var(--ink);
        display: block;
      }
      .month-year {
        font-size: 12px;
        letter-spacing: 0.3em;
        color: var(--muted);
        display: block;
        margin-top: 2px;
      }

      /* ── 日曆格 ────────────────────────────────────────────────── */
      .cal-header-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        margin-bottom: 3px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }
      .cal-header-cell {
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--muted);
        padding: 6px 0;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        max-width: 600px;
        margin: 0 auto 32px;
      }
      .cal-cell {
        border-radius: 6px;
        padding: 8px 4px;
        min-height: 64px;
        position: relative;
        background: rgba(255,255,255,0.4);
        border: 1px solid transparent;
        transition: background 0.15s;
      }
      .cal-cell.empty { background: transparent; border-color: transparent; }
      .cal-cell.past { opacity: 0.45; }
      .cal-cell.has-checkout { background: var(--checkout); border-color: rgba(184,121,90,0.55); }
      .cal-cell.has-checkin  { background: var(--checkin);  border-color: rgba(90,150,184,0.50); }
      .cal-cell.has-both     { background: var(--both);     border-color: rgba(145,100,60,0.60); }
      .cal-cell.has-pending  { border-left: 3px solid rgba(181,171,160,0.6); }
      .cal-day-num {
        font-family: 'Cormorant Garamond', serif;
        font-size: 18px;
        font-weight: 300;
        color: var(--ink);
        display: block;
        margin-bottom: 4px;
      }
      .cal-cell.weekend .cal-day-num { color: var(--accent); }
      .cal-event {
        font-size: 10px;
        letter-spacing: 0.05em;
        line-height: 1.5;
        color: var(--ink);
        margin-bottom: 2px;
      }
      .ev-checkout { color: #8a4a20; font-weight: 500; }
      .ev-checkin  { color: #1a5a7a; font-weight: 500; }
      .ev-pending  { color: #5a4a3a; }
      .ev-note {
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        display: block;
        margin-top: 3px;
        padding: 1px 4px;
        background: rgba(184, 121, 90, 0.1);
        border-radius: 3px;
        border-left: 2px solid var(--accent);
      }
      /* 手機版：備注縮成小圓點，顏色提示有備注 */
      .has-note .cal-day-num::after {
        content: '';
        display: inline-block;
        width: 5px;
        height: 5px;
        background: var(--accent);
        border-radius: 50%;
        margin-left: 3px;
        vertical-align: middle;
        flex-shrink: 0;
      }

      /* ── 圖例 ──────────────────────────────────────────────────── */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        margin-bottom: 32px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
      .legend-item { display: flex; align-items: center; gap: 6px; }
      .l-swatch {
        width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
      }

      /* ── 今日詳情區塊 ───────────────────────────────────────────── */
      .today-section {
        background: var(--card);
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 24px;
        border: 1px solid var(--border);
      }
      .today-title {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .order-card {
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        font-size: 13px;
      }
      .order-card:last-child { border-bottom: none; }
      .order-card-title {
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .order-card-detail { color: var(--muted); font-size: 12px; line-height: 1.8; }
      .tag {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 99px;
        font-size: 10px;
        letter-spacing: 0.1em;
        margin-left: 6px;
      }
      .tag-checkout { background: var(--checkout); color: #7a3a10; font-weight: 500; }
      .tag-checkin  { background: var(--checkin);  color: #0a4a6a; font-weight: 500; }
      .tag-pending  { background: rgba(181,171,160,0.25); color: #4a3a2a; }

      /* ── loading ────────────────────────────────────────────────── */
      .loading-wrap {
        display: flex; align-items: center; justify-content: center;
        padding: 60px; color: var(--muted); font-size: 13px; letter-spacing: 0.15em;
      }

      /* ── 手機 ────────────────────────────────────────────────────── */
      @media (max-width: 480px) {
        .cal-cell { min-height: 54px; padding: 6px 3px; }
        .cal-day-num { font-size: 15px; }
        .cal-event { font-size: 9px; }
        /* ev-note 改為小圓點提示，點擊日格可在今日摘要區看到備注內容 */
        .ev-note { font-size: 8px; white-space: normal; line-height: 1.3; }
        .container { padding: 16px 12px 60px; }
      }
    </style>
  </head>
  <body>
    <!-- ── 登入畫面 ──────────────────────────────────────────────── -->
    <div class="login-screen" id="loginScreen">
      <div class="login-logo">雫旅</div>
      <div class="login-sub">HOUSEKEEPING</div>
      <input type="password" class="login-input" id="loginPwd" placeholder="請輸入房務密碼" autocomplete="current-password" />
      <button class="login-btn" id="loginBtn">進入</button>
      <div class="login-err" id="loginErr"></div>
    </div>

    <!-- ── 主畫面 ────────────────────────────────────────────────── -->
    <div class="app" id="app">
      <div class="top-bar">
        <span class="top-title">房務日曆</span>
        <button class="top-logout" id="logoutBtn">登出</button>
      </div>

      <div class="container">
        <!-- 今日摘要 -->
        <div class="today-section" id="todaySection">
          <div class="today-title" id="todayTitle">今日</div>
          <div id="todayContent"><div class="loading-wrap">載入中…</div></div>
        </div>

        <!-- 月份導航 -->
        <div class="cal-nav">
          <button class="cal-nav-btn" id="prevBtn">←</button>
          <div class="month-title">
            <span class="month-main" id="monthMain">—</span>
            <span class="month-year" id="monthYear">—</span>
          </div>
          <button class="cal-nav-btn" id="nextBtn">→</button>
        </div>

        <!-- 圖例 -->
        <div class="legend">
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--checkout);border:1px solid rgba(184,121,90,0.3)"></div>
            退房（清潔）
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--checkin);border:1px solid rgba(90,150,184,0.25)"></div>
            入住
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:var(--both);border:1px solid rgba(145,100,60,0.35)"></div>
            退房＋入住
          </div>
          <div class="legend-item">
            <div class="l-swatch" style="background:rgba(181,171,160,0.1);border-left:3px solid rgba(181,171,160,0.6)"></div>
            洽談中
          </div>
        </div>

        <!-- 日曆 -->
        <div class="cal-header-row" id="calHeader"></div>
        <div id="calLoading" class="loading-wrap">載入中…</div>
        <div class="cal-grid" id="calGrid" style="display:none"></div>
      </div>
    </div>

    <script>
      (function () {
        var MONTHS = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
        var WEEKDAYS = ['日','一','二','三','四','五','六'];

        /* ── 登入邏輯 ────────────────────────────────────────────── */
        // 房務密碼：直接跟 Worker 拿（POST /api/housekeeping/auth）
        // 或在 sessionStorage 存 token
        var HK_TOKEN_KEY = 'hk_token';
        var hkToken = sessionStorage.getItem(HK_TOKEN_KEY) || '';

        var loginScreen = document.getElementById('loginScreen');
        var appEl = document.getElementById('app');

        function showApp() {
          loginScreen.classList.add('hidden');
          appEl.classList.add('show');
          initCalendar();
        }
        function showLogin() {
          loginScreen.classList.remove('hidden');
          appEl.classList.remove('show');
        }

        // 驗證 token（嘗試呼叫 API）
        if (hkToken) {
          fetch('/api/housekeeping/orders', {
            headers: { 'Authorization': 'Bearer ' + hkToken },
          }).then(function (r) {
            if (r.ok) showApp();
            else { sessionStorage.removeItem(HK_TOKEN_KEY); hkToken = ''; showLogin(); }
          }).catch(function () { showLogin(); });
        } else {
          showLogin();
        }

        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.getElementById('loginPwd').addEventListener('keydown', function (e) {
          if (e.key === 'Enter') doLogin();
        });

        function doLogin() {
          var pwd = document.getElementById('loginPwd').value;
          if (!pwd) return;
          var errEl = document.getElementById('loginErr');
          errEl.textContent = '';
          fetch('/api/housekeeping/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd }),
          }).then(function (r) { return r.json(); })
            .then(function (data) {
              if (data.success && data.token) {
                hkToken = data.token;
                sessionStorage.setItem(HK_TOKEN_KEY, hkToken);
                showApp();
              } else {
                errEl.textContent = '密碼錯誤';
              }
            })
            .catch(function () { errEl.textContent = '連線失敗'; });
        }

        document.getElementById('logoutBtn').addEventListener('click', function () {
          sessionStorage.removeItem(HK_TOKEN_KEY);
          hkToken = '';
          showLogin();
        });

        /* ── 日曆邏輯 ────────────────────────────────────────────── */
        var currentYear  = new Date().getFullYear();
        var currentMonth = new Date().getMonth();
        var ordersCache  = {}; // 'YYYY-MM' → orders array

        function _hkFetch(path) {
          return fetch(path, {
            headers: { 'Authorization': 'Bearer ' + hkToken },
          }).then(function (r) {
            if (r.status === 401) { showLogin(); throw new Error('unauth'); }
            return r.json();
          });
        }

        function todayStr() {
          return new Date().toISOString().slice(0, 10);
        }

        function dateStr(y, m, d) {
          return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        }

        function monthStr() {
          return currentYear + '-' + String(currentMonth + 1).padStart(2, '0');
        }

        function updateTitles() {
          document.getElementById('monthMain').textContent = MONTHS[currentMonth];
          document.getElementById('monthYear').textContent = String(currentYear);
        }

        /* 建立日曆表頭 */
        function buildHeader() {
          var h = document.getElementById('calHeader');
          var html = '';
          WEEKDAYS.forEach(function (d) {
            html += '<div class="cal-header-cell">' + d + '</div>';
          });
          h.innerHTML = html;
        }

        /* 載入訂單並渲染 */
        function loadAndRender() {
          var mk = monthStr();
          var grid = document.getElementById('calGrid');
          var loading = document.getElementById('calLoading');
          grid.style.display = 'none';
          loading.style.display = 'flex';

          function doRender(orders) {
            ordersCache[mk] = orders;
            loading.style.display = 'none';
            grid.style.display = 'grid';
            renderCal(orders);
          }

          if (ordersCache[mk]) {
            doRender(ordersCache[mk]);
            return;
          }

          // 拉本月 + 下月（確保退房日在下月的訂單也顯示）
          _hkFetch('/api/housekeeping/orders?month=' + mk)
            .then(function (data) {
              if (!data.success) { loading.style.display = 'none'; return; }
              doRender(data.orders || []);
            })
            .catch(function () { loading.style.display = 'none'; });
        }

        function renderCal(orders) {
          var y = currentYear, m = currentMonth;
          var firstDay = new Date(y, m, 1).getDay();
          var daysInMonth = new Date(y, m + 1, 0).getDate();
          var todayD = todayStr();

          // 建立 day → { checkouts, checkins, pendings, notes }
          var dayMap = {};
          function ensureDay(ds) {
            if (!dayMap[ds]) dayMap[ds] = { checkouts: [], checkins: [], pendings: [], notes: [] };
            return dayMap[ds];
          }

          orders.forEach(function (o) {
            var checkOut = o.checkOut || '';
            var checkIn  = o.checkIn  || '';
            var name = o.name || '—';
            var note = o.housekeepingNote || '';
            var isPending = o.status === '洽談中';

            // 退房日
            if (checkOut && checkOut.startsWith(monthStr())) {
              var day = ensureDay(checkOut);
              if (isPending) day.pendings.push(name + '（退・洽談中）');
              else day.checkouts.push(name);
              if (note) day.notes.push(note);
            }
            // 入住日
            if (checkIn && checkIn.startsWith(monthStr())) {
              var day2 = ensureDay(checkIn);
              if (isPending) day2.pendings.push(name + '（入・洽談中）');
              else day2.checkins.push(name);
            }
          });

          var grid = document.getElementById('calGrid');
          var html = '';
          for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

          for (var d = 1; d <= daysInMonth; d++) {
            var ds = dateStr(y, m, d);
            var dateObj = new Date(y, m, d);
            var dow = dateObj.getDay();
            var isWe = dow === 0 || dow === 6;
            var isPast = ds < todayD;
            var dayData = dayMap[ds];
            var hasOut  = dayData && dayData.checkouts.length > 0;
            var hasIn   = dayData && dayData.checkins.length > 0;
            var hasPend = dayData && dayData.pendings.length > 0;
            var hasNote = dayData && dayData.notes.length > 0;

            var cls = 'cal-cell';
            if (isWe) cls += ' weekend';
            if (isPast) cls += ' past';
            if (hasOut && hasIn) cls += ' has-both';
            else if (hasOut) cls += ' has-checkout';
            else if (hasIn) cls += ' has-checkin';
            if (hasPend) cls += ' has-pending';
            if (hasNote) cls += ' has-note';

            html += '<div class="' + cls + '">';
            html += '<span class="cal-day-num">' + d + '</span>';

            if (dayData) {
              dayData.checkouts.forEach(function (n) {
                html += '<div class="cal-event ev-checkout">↑ ' + n + '</div>';
              });
              dayData.checkins.forEach(function (n) {
                html += '<div class="cal-event ev-checkin">↓ ' + n + '</div>';
              });
              dayData.pendings.forEach(function (n) {
                html += '<div class="cal-event ev-pending">' + n + '</div>';
              });
              if (dayData.notes.length) {
                html += '<span class="ev-note">' + dayData.notes.join(' / ') + '</span>';
              }
            }

            html += '</div>';
          }
          grid.innerHTML = html;
        }

        /* 今日摘要 */
        function renderToday(orders) {
          var td = todayStr();
          var titleEl = document.getElementById('todayTitle');
          var contentEl = document.getElementById('todayContent');
          titleEl.textContent = '今日 ' + td;

          var relevant = orders.filter(function (o) {
            return o.checkOut === td || o.checkIn === td;
          });
          if (!relevant.length) {
            contentEl.innerHTML = '<div class="order-card-detail" style="padding:8px 0">今日無入退房</div>';
            return;
          }
          var html = '';
          relevant.forEach(function (o) {
            html += '<div class="order-card">';
            html += '<div class="order-card-title">' + (o.name || '—');
            if (o.checkOut === td) html += '<span class="tag tag-checkout">退房</span>';
            if (o.checkIn  === td) html += '<span class="tag tag-checkin">入住</span>';
            if (o.status === '洽談中') html += '<span class="tag tag-pending">洽談中</span>';
            html += '</div>';
            html += '<div class="order-card-detail">';
            html += '入住 ' + o.checkIn + '　退房 ' + o.checkOut + '<br>';
            if (o.rooms)     html += '棟別：' + o.rooms + ' 棟<br>';
            if (o.phone)     html += '電話：' + o.phone + '<br>';
            if (o.housekeepingNote) html += '房務備注：' + o.housekeepingNote + '<br>';
            html += '</div></div>';
          });
          contentEl.innerHTML = html;
        }

        function initCalendar() {
          buildHeader();
          updateTitles();

          // 先拉今日所在月份
          _hkFetch('/api/housekeeping/orders?month=' + monthStr())
            .then(function (data) {
              var orders = (data.success ? data.orders : []) || [];
              ordersCache[monthStr()] = orders;
              renderToday(orders);
              document.getElementById('calLoading').style.display = 'none';
              document.getElementById('calGrid').style.display = 'grid';
              renderCal(orders);
            })
            .catch(function () {
              document.getElementById('calLoading').style.display = 'none';
            });
        }

        document.getElementById('prevBtn').addEventListener('click', function () {
          currentMonth--;
          if (currentMonth < 0) { currentMonth = 11; currentYear--; }
          updateTitles();
          loadAndRender();
        });
        document.getElementById('nextBtn').addEventListener('click', function () {
          currentMonth++;
          if (currentMonth > 11) { currentMonth = 0; currentYear++; }
          updateTitles();
          loadAndRender();
        });
      })();
    </script>
  </body>
</html>
